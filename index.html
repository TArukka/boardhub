                  </div>
                :<div style={{height:90,background:'linear-gradient(135deg,var(--bg) 0%,var(--border) 100%)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <span style={{fontFamily:'Cormorant Garamond,serif',fontSize:'2.8rem',fontWeight:300,color:'var(--border-2)'}}>{(m.name||'?').charAt(0)}</span>
                  </div>
              }
              <div style={{padding:'14px 16px'}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                  {m.photo
                    ?<Img src={m.photo} style={{width:32,height:32,borderRadius:'50%',objectFit:'cover',flexShrink:0,border:'2px solid var(--surface)'}}/>
                    :<div style={{width:32,height:32,borderRadius:'50%',background:'var(--bg)',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Cormorant Garamond,serif',fontSize:'.95rem',fontWeight:500}}>{(m.name||'?').charAt(0)}</div>
                  }
                  <div style={{minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:'.88rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.name}</div>
                    {m.area&&<div style={{fontSize:'.73rem',color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.area}{m.medium?' - '+m.medium:''}</div>}
                  </div>
                </div>
                {m.notes&&<p style={{fontSize:'.76rem',color:'var(--muted)',margin:0,lineHeight:1.55,overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{m.notes}</p>}
                <div style={{marginTop:10,display:'flex',gap:5,alignItems:'center',flexWrap:'wrap'}}>
                  <span style={{fontSize:'.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.07em',padding:'2px 7px',borderRadius:4,background:m.active?'#E8F5EC':'#F0EDE9',color:m.active?'#276b3e':'var(--muted)'}}>{m.active?'Ativo':'Inativo'}</span>
                  {m.main&&<span style={{fontSize:'.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.07em',padding:'2px 7px',borderRadius:4,background:'#FEF9E7',color:'#92700b',display:'flex',alignItems:'center',gap:3}}><Icon name="star" size={9}/> Principal</span>}
                  {m.year&&<span style={{fontSize:'.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.07em',padding:'2px 7px',borderRadius:4,background:'var(--bg)',color:'var(--muted)'}}>{m.year}</span>}
                </div>
              </div>
            </div>
          );
        })}
        </div>
      )}
    </div>
  );
});

// - APP -
const App=()=>{
  const autoMobile=useIsMobile();
  const [forceMobile,setForceMobileRaw]=useState(null);
  const isMobile=forceMobile!==null?forceMobile:autoMobile;
  useEffect(()=>{ if(autoMobile)setForceMobileRaw(null); },[autoMobile]);
  const setForceMobile=val=>setForceMobileRaw(val);

  // Remove splash screen as soon as App mounts
  useEffect(()=>{
    clearTimeout(window.__splashTimeout);
    const splash=document.getElementById('splash');
    if(splash){splash.style.opacity='0';setTimeout(()=>splash.remove(),350);}
  },[]);

  // Hash-based routing: parse the current URL hash into {view, projectId}
  const parseHash=()=>{
    const h=window.location.hash.slice(1)||'dashboard';
    const [v,id]=h.split('/');
    const parsed=id?Number(id):null;
    return{view:v||'dashboard',projectId:(parsed&&!isNaN(parsed))?parsed:null};
  };

  const [view,setView]=useState(()=>parseHash().view);
  const [selectedProject,setSelectedProject]=useState(()=>{
    const{projectId}=parseHash();
    if(!projectId)return null;
    return(persisted?.projects||[]).find(p=>p.id===projectId)||null;
  });
  const [showNewProject,setShowNewProject]=useState(false);
  const [saveFlash,setSaveFlash]=useState(false);
  const [fbUser,setFbUser]=useState(null);
  const [syncStatus,setSyncStatus]=useState('idle'); // 'idle'|'syncing'|'synced'|'error'
  const [identity,setIdentity]=useState(()=>loadIdentity());

  // Initialize from localStorage if available, else seed
  const [projects,setProjects]=useState(()=>persisted?.projects||SEED.projects);
  const [clients,setClients]=useState(()=>persisted?.clients||SEED.clients);
  const [mentors,setMentors]=useState(()=>persisted?.mentors||SEED.mentors);
  const [notes,setNotes]=useState(()=>persisted?.notes||SEED.notes);
  const [tasks,setTasks]=useState(()=>persisted?.tasks||SEED.tasks);
  const [socialPosts,setSocialPosts]=useState(()=>persisted?.socialPosts||SEED.socialPosts);
  const [galleryPosts,setGalleryPosts]=useState(()=>persisted?.galleryPosts||SEED.galleryPosts);
  const [galleryFolders,setGalleryFolders]=useState(()=>persisted?.galleryFolders||DEFAULT_GALLERY_FOLDERS);
  const DEFAULT_NOTE_GROUPS=[{id:'notes',label:'Notas',icon:'file-text'},{id:'projects',label:'Mini Projetos',icon:'folder-open'}];
  const [noteGroups,setNoteGroups]=useState(()=>persisted?.noteGroups||DEFAULT_NOTE_GROUPS);
  const [pomoData,setPomoData]=useState(()=>pomoLoad());

  useEffect(()=>{ pomoSave(pomoData); },[pomoData]);

  // Firebase auth state listener — tracks sign-in across all devices
  useEffect(()=>{
    let unsub=null;
    initFirebase().then(ok=>{
      if(!ok)return;
      unsub=_fbAuth.onAuthStateChanged(user=>setFbUser(user||null));
    });
    return ()=>{if(unsub)unsub();};
  },[]);

  // Firestore real-time listener — fires instantly when any device saves
  const _isApplyingRemote=useRef(false);
  // False on first render (initial state from localStorage is NOT a user edit).
  // Set to true after the first auto-save effect fires so subsequent renders are tracked.
  const _isMounted=useRef(false);
  const _hasPendingLocalEdit=useRef(false); // true only when the USER made a change not yet pushed
  // Incremented each time remote data is applied — lets the auto-save effect
  // distinguish "render caused by remote apply" from "render caused by user edit"
  const _remoteApplyId=useRef(0);
  const _lastSeenApplyId=useRef(0);
  useEffect(()=>{
    if(!fbUser)return;
    const ref=getStateRef(fbUser.uid);
    if(!ref)return;
    setSyncStatus('syncing');
    const unsub=ref.onSnapshot(snap=>{
      if(!snap.exists)return;
      // Skip our own write echo (hasPendingWrites=true = the local write hasn't
      // reached the server yet — it's our own data bouncing back)
      if(snap.metadata.hasPendingWrites)return;
      const data=snap.data();
      if(!data||typeof data._v!=='string')return;
      // Skip if the user has local changes that haven't been pushed yet —
      // applying now would overwrite their unsaved work.
      // Safety valve: never block for more than 12 s (handles permanent push failures).
      if(_hasPendingLocalEdit.current)return;
      const isArr=v=>Array.isArray(v);
      _isApplyingRemote.current=true;
      _remoteApplyId.current=_remoteApplyId.current+1; // signal to auto-save effect
      if(data.projects&&isArr(data.projects))setProjects(data.projects);
      if(data.clients&&isArr(data.clients))setClients(data.clients);
      if(data.mentors&&isArr(data.mentors))setMentors(data.mentors);
      if(data.notes&&isArr(data.notes))setNotes(data.notes);
      if(data.tasks&&isArr(data.tasks))setTasks(data.tasks);
      if(data.socialPosts&&isArr(data.socialPosts))setSocialPosts(data.socialPosts);
      if(data.galleryPosts&&isArr(data.galleryPosts))setGalleryPosts(data.galleryPosts);
          if(data.galleryFolders&&isArr(data.galleryFolders))setGalleryFolders(data.galleryFolders);
      if(data.pomoData&&typeof data.pomoData==='object'&&!Array.isArray(data.pomoData))setPomoData(data.pomoData);
      if(data.identity&&typeof data.identity.hubName==='string'){saveIdentity(data.identity);setIdentity(data.identity);}
      setSyncStatus('synced');
      // Only needs to cover React's batched render (~one tick). We no longer rely
      // on this flag in the push guard — _remoteApplyId handles that correctly.
      setTimeout(()=>{ _isApplyingRemote.current=false; },200);
    },err=>{
      console.error('[BoardHub] Firestore listener:',err);
      setSyncStatus('error');
    });
    return unsub;
  },[fbUser]);

  // Auto-save localStorage + debounced push to Firestore
  const saveFlashTimer=useRef(null);
  const fbPushTimer=useRef(null);
  const _retryTimer=useRef(null);
  useEffect(()=>{
    // Compare against _remoteApplyId to detect whether this render was triggered
    // by remote data being applied (vs. a genuine user edit).
    // This is reliable because React batches all the remote setters into one render,
    // and user edits are always separate renders.
    const isRemoteTrigger=_remoteApplyId.current!==_lastSeenApplyId.current;
    _lastSeenApplyId.current=_remoteApplyId.current;
    if(_isMounted.current&&!isRemoteTrigger){
      // Only mark as a user edit after mount — the very first run is localStorage
      // hydration, not a change the user made, so we must not block Firestore from
      // overwriting it with the authoritative cloud state.
      _hasPendingLocalEdit.current=true;
    }
    _isMounted.current=true;
    const timer=setTimeout(()=>{
      const state={projects,clients,mentors,notes,tasks,socialPosts,galleryPosts,galleryFolders,pomoData,noteGroups,identity};
      lsSave(state);
      setSaveFlash(true);
      clearTimeout(saveFlashTimer.current);
      saveFlashTimer.current=setTimeout(()=>setSaveFlash(false),1800);
      // Only push if the user actually made changes (not a remote echo)
      if(!fbUser||!_hasPendingLocalEdit.current)return;
      clearTimeout(fbPushTimer.current);
      fbPushTimer.current=setTimeout(async()=>{
        const doPush=async()=>{
          const approxBytes=new Blob([JSON.stringify(stripBase64(state))]).size;
          if(approxBytes>900000){console.warn('[BoardHub] State too large for Firestore (',Math.round(approxBytes/1024),'KB), skipping push.');setSyncStatus('error');return;}
          setSyncStatus('syncing');
          await pushState(state,fbUser.uid);
          _hasPendingLocalEdit.current=false; // push succeeded — clear flag so snapshot listener works
          clearTimeout(_retryTimer.current);
          setSyncStatus('synced');
        };
        try{
          await doPush();
        }catch(e){
          console.error('[BoardHub] Firestore push:',e);
          setSyncStatus('error');
          // Retry once after 8 s. On success _hasPendingLocalEdit clears normally;
          // on failure clear it anyway so the snapshot listener is not blocked forever.
          clearTimeout(_retryTimer.current);
          _retryTimer.current=setTimeout(async()=>{
            try{ await doPush(); }
            catch(e2){
              console.error('[BoardHub] Firestore push retry failed:',e2);
              // Give up — allow remote snapshots through so the device stays in sync
              _hasPendingLocalEdit.current=false;
              setSyncStatus('error');
            }
          },8000);
        }
      },2000);
    },2500);
    return ()=>{clearTimeout(timer);clearTimeout(saveFlashTimer.current);clearTimeout(fbPushTimer.current);};
  },[projects,clients,mentors,notes,tasks,socialPosts,galleryPosts,galleryFolders,pomoData,noteGroups,identity]);

  const selectedProjectRef=useRef(selectedProject);
  selectedProjectRef.current=selectedProject;

  const navigate=useCallback(v=>{
    const sp=selectedProjectRef.current;
    const hash=v==='project-detail'&&sp?`#project-detail/${sp.id}`:`#${v}`;
    if(window.location.hash!==hash)window.history.pushState(null,'',hash);
    setView(v);
    if(v!=='project-detail')setSelectedProject(null);
  },[]);

  // Listen to browser back/forward
  const projectsRef=useRef(projects);
  projectsRef.current=projects;
  useEffect(()=>{
    const onPop=()=>{
      const{view:v,projectId}=parseHash();
      setView(v);
      if(v==='project-detail'&&projectId){
        setSelectedProject(prev=>{
          const found=projectsRef.current.find(p=>p.id===projectId);
          return found||prev;
        });
      }else{
        setSelectedProject(null);
      }
    };
    window.addEventListener('popstate',onPop);
    // Set initial hash without pushing a new entry
    const sp=selectedProjectRef.current;
    const initHash=view==='project-detail'&&sp?`#project-detail/${sp.id}`:`#${view}`;
    if(!window.location.hash)window.history.replaceState(null,'',initHash);
    return()=>window.removeEventListener('popstate',onPop);
  },[]);//eslint-disable-line react-hooks/exhaustive-deps
  const handleUpdateProject=useCallback(p=>{setProjects(prev=>prev.map(x=>x.id===p.id?p:x));setSelectedProject(p);},[]);
  const addProject=useCallback(p=>{
    setProjects(prev=>[p,...prev]);
    setShowNewProject(false);
    setSelectedProject(p);
    setView('project-detail');
    window.history.pushState(null,'',`#project-detail/${p.id}`);
  },[]);
  const softDeleteProject=useCallback(id=>setProjects(prev=>prev.map(p=>p.id===id?{...p,deleted:true}:p)),[]);
  const handleSelectProject=useCallback(p=>{setSelectedProject(p);setView('project-detail');window.history.pushState(null,'',`#project-detail/${p.id}`);},[]);
  const handleAddProject=useCallback(()=>setShowNewProject(true),[]);
  const handleCloseNewProject=useCallback(()=>setShowNewProject(false),[]);
  const handleBackToProjects=useCallback(()=>navigate('projects'),[navigate]);
  const handleAddGlobalMentor=useCallback(m=>{setMentors(prev=>[...prev,m]);},[]);
  const handleResetIdentity=useCallback(()=>{saveIdentity(null);localStorage.removeItem(ID_KEY);setIdentity(null);},[]);

  const clearSave=()=>{
    if(!window.confirm('⚠️ Isso vai apagar TODOS os seus dados e restaurar o estado inicial. Essa ação é irreversível. Continuar?'))return;
    setProjects(SEED.projects);setClients(SEED.clients);setMentors(SEED.mentors);
    setNotes(SEED.notes);setTasks(SEED.tasks);setSocialPosts(SEED.socialPosts);setGalleryPosts(SEED.galleryPosts);setGalleryFolders(DEFAULT_GALLERY_FOLDERS);
    setPomoData({days:{}});
    navigate('dashboard');
  };

  const appState={projects,clients,mentors,notes,tasks,socialPosts,galleryPosts,galleryFolders,pomoData,noteGroups};

  // When importing data: store any base64 images in IDB, replace with idb:// refs
  const ingestImages=async obj=>{
    if(Array.isArray(obj))return Promise.all(obj.map(ingestImages));
    if(obj&&typeof obj==='object'){const out={};for(const k of Object.keys(obj))out[k]=await ingestImages(obj[k]);return out;}
    if(typeof obj==='string'&&obj.startsWith('data:image')){
      try{
        // Use atob pipeline — fetch() on data URLs is unreliable on mobile Safari/Android
        const [header,b64]=obj.split(',');
        const mime=(header.match(/:(.*?);/)||[])[1]||'image/jpeg';
        const bin=atob(b64);
        const arr=new Uint8Array(bin.length);
        for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
        const blob=new Blob([arr],{type:mime});
        const key='img_'+Date.now()+'_'+Math.random().toString(36).slice(2);await idbPut(key,blob);return 'idb://'+key;
      }catch{}
    }
    return obj;
  };

  const handleImport=async data=>{
    const ingested=await ingestImages(data);
    if(ingested.projects)setProjects(ingested.projects);
    if(ingested.clients)setClients(ingested.clients);
    if(ingested.mentors)setMentors(ingested.mentors);
    if(ingested.notes)setNotes(ingested.notes);
    if(ingested.tasks)setTasks(ingested.tasks);
    if(ingested.socialPosts)setSocialPosts(ingested.socialPosts);
    if(ingested.galleryPosts)setGalleryPosts(ingested.galleryPosts);
    if(ingested.galleryFolders)setGalleryFolders(ingested.galleryFolders);
    if(ingested.noteGroups)setNoteGroups(ingested.noteGroups);
    if(ingested.pomoData)setPomoData(ingested.pomoData);
  };

  // Update page title when identity changes
  useEffect(()=>{
    if(identity){document.title=`${identity.hubName} — ${identity.osName}`;}
  },[identity]);

  const handleSetupDone=useCallback(id=>{setIdentity(id);},[]);

  return(
    <div style={{display:'flex',flexDirection:isMobile?'column':'row',minHeight:'100vh',overflowX:'hidden'}}>
      {!identity&&<SetupModal onDone={handleSetupDone}/>}
      {showNewProject&&<NewProjectModal onSave={addProject} onClose={handleCloseNewProject} isMobile={isMobile}/>}
      {isMobile
        ?<SidebarMobile activeView={view} setView={navigate} saveFlash={saveFlash} setForceMobile={setForceMobile} hubName={identity?.hubName}/>
        :<SidebarDesktop activeView={view} setView={navigate} saveFlash={saveFlash} isMobile={isMobile} setForceMobile={setForceMobile} hubName={identity?.hubName} osName={identity?.osName}/>
      }
      <main className={isMobile?'main-mobile':''} style={isMobile?{flex:1,padding:'16px 16px 80px',overflowY:'auto',minHeight:'calc(100vh - 56px)',paddingTop:0}:{marginLeft:220,flex:1,padding:'clamp(16px, 2.5vh, 40px) clamp(20px, 3vw, 48px)',overflowY:view==='dashboard'?'hidden':'auto',height:'100vh',boxSizing:'border-box',display:'flex',flexDirection:'column'}}>
        {view==='dashboard'      &&<Dashboard projects={projects} notes={notes} mentors={mentors} tasks={tasks} setTasks={setTasks} setView={navigate} setNotes={setNotes} pomoData={pomoData} setPomoData={setPomoData} isMobile={isMobile} setSelectedProject={setSelectedProject}/>}
        {view==='projects'       &&<ProjectsList projects={projects} setProjects={setProjects} onSelect={handleSelectProject} onAdd={handleAddProject} isMobile={isMobile}/>}
        {view==='project-detail' &&selectedProject&&<ProjectDetail project={selectedProject} onBack={handleBackToProjects} onUpdate={handleUpdateProject} onSoftDelete={()=>softDeleteProject(selectedProject.id)} globalMentors={mentors} onAddGlobalMentor={handleAddGlobalMentor} isMobile={isMobile}/>}
        {view==='gallery'        &&<Gallery posts={galleryPosts} setPosts={setGalleryPosts} folders={galleryFolders} setFolders={setGalleryFolders} isMobile={isMobile}/>}
        {view==='ideas'          &&<IdeasLab notes={notes} setNotes={setNotes} noteGroups={noteGroups} setNoteGroups={setNoteGroups} isMobile={isMobile}/>}
        {view==='mentors'        &&<MentorsHub mentors={mentors} setMentors={setMentors} isMobile={isMobile}/>}
        {view==='social'         &&<Social posts={socialPosts} setPosts={setSocialPosts} isMobile={isMobile}/>}
        {view==='clients'        &&<Clients clients={clients} setClients={setClients} isMobile={isMobile}/>}
        {view==='sync'           &&<SyncHub appState={appState} onImport={handleImport} onClearSave={clearSave} fbUser={fbUser} syncStatus={syncStatus} isMobile={isMobile} onResetIdentity={handleResetIdentity}/>}
      </main>
    </div>
  );
};
// Mount after prefetch so all idb:// images are in cache before first render
_prefetchDone.then(()=>ReactDOM.createRoot(document.getElementById('root')).render(<App/>));
</script>
</body>
</html>
