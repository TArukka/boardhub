  const [form,setForm]=useState(client);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const photoRef=useRef();
  const handlePhoto=async e=>{const file=e.target.files[0];if(!file)return;set('photo',await uploadImage(file));};
  return(
    <div className="fade-up" style={{maxWidth:680,margin:'0 auto',paddingBottom:60}}>
      <input ref={photoRef} type="file" accept="image/*" style={{display:'none'}} onChange={handlePhoto}/>
      <button className="btn btn-outline" onClick={onBack} style={{marginBottom:28}}><Icon name="arrow-left" size={13}/> Voltar</button>
      <div className="card" style={{padding:32,marginBottom:20}}>
        <div style={{display:'flex',alignItems:'flex-start',gap:20,marginBottom:24}}>
          <div onClick={()=>photoRef.current.click()} style={{width:72,height:72,borderRadius:'50%',cursor:'pointer',flexShrink:0,overflow:'hidden',border:'2px dashed var(--border)',display:'flex',alignItems:'center',justifyContent:'center',backgroundColor:'var(--bg)',position:'relative'}}
            onMouseEnter={e=>e.currentTarget.querySelector('.ch').style.opacity=1} onMouseLeave={e=>e.currentTarget.querySelector('.ch').style.opacity=0}>
            {form.photo?<img src={form.photo} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
              :<span style={{fontFamily:'Cormorant Garamond,serif',fontSize:'1.8rem',fontWeight:500,color:'var(--muted)'}}>{form.name.charAt(0)||'?'}</span>}
            <div className="ch" style={{position:'absolute',inset:0,background:'rgba(0,0,0,.4)',display:'flex',alignItems:'center',justifyContent:'center',opacity:0,transition:'opacity .2s'}}><Icon name="camera" size={18} style={{color:'white'}}/></div>
          </div>
          <div style={{flex:1,display:'flex',flexDirection:'column',gap:12}}>
            <Field label="Nome"><input className="input-box" value={form.name} onChange={e=>set('name',e.target.value)} style={{fontSize:'1rem',fontWeight:600}}/></Field>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <Field label="Empresa"><input className="input-box" value={form.company} onChange={e=>set('company',e.target.value)}/></Field>
              <Field label="Cargo"><input className="input-box" value={form.role} onChange={e=>set('role',e.target.value)}/></Field>
            </div>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
          <Field label="Email"><input className="input-box" type="email" value={form.email} onChange={e=>set('email',e.target.value)}/></Field>
          <Field label="Status"><select className="input-box" value={form.status} onChange={e=>set('status',e.target.value)} style={{cursor:'pointer'}}><option>Ativo</option><option>Lead</option><option>Inativo</option><option>Arquivado</option></select></Field>
        </div>
        <Field label="Notas & Histórico"><textarea className="input-box" rows={4} value={form.notes} onChange={e=>set('notes',e.target.value)} placeholder="Preferências, histórico de projetos..." style={{resize:'vertical',lineHeight:1.7,minHeight:100}}/></Field>
      </div>
      <div style={{display:'flex',justifyContent:'space-between'}}>
        <button className="btn btn-danger" onClick={onDelete}><Icon name="trash-2" size={14}/> Mover para Lixeira</button>
        <button className="btn btn-dark" onClick={()=>onSave(form)}><Icon name="check" size={14}/> Salvar</button>
      </div>
    </div>
  );
};

// ─── CLIENTS ──────────────────────────────────────────────────────────────────
const Clients=({clients,setClients,isMobile})=>{
  const [selected,setSelected]=useState(null);
  const [trash,setTrash]=useState(false);
  const tagColor=s=>({'Ativo':'tag-green','Lead':'tag-yellow','Inativo':'tag-gray','Arquivado':'tag-gray'}[s]||'tag-gray');
  const save=form=>{setClients(p=>p.map(c=>c.id===form.id?form:c));setSelected(null);};
  const softDelete=()=>{setClients(p=>p.map(c=>c.id===selected.id?{...c,deleted:true}:c));setSelected(null);};
  const restore=id=>setClients(p=>p.map(c=>c.id===id?{...c,deleted:false}:c));
  const hardDelete=id=>{if(window.confirm('Excluir permanentemente?')){setClients(p=>p.filter(c=>c.id!==id));}}
  const add=()=>{const n={id:Date.now(),name:'Novo Cliente',company:'',email:'',role:'',status:'Lead',notes:'',photo:'',deleted:false};setClients(p=>[n,...p]);setSelected(n);};
  const visible=clients.filter(c=>trash?c.deleted:!c.deleted);
  if(selected&&!trash)return <ClientDetail client={selected} onBack={()=>setSelected(null)} onSave={save} onDelete={softDelete}/>;
  return(
    <div className="fade-up" style={{maxWidth:900,margin:'0 auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:isMobile?'center':'flex-end',marginBottom:isMobile?16:24,gap:12,flexWrap:'wrap'}}>
        <h1 className="serif" style={{fontSize:isMobile?'1.75rem':'2.6rem',fontWeight:300,letterSpacing:'-0.02em'}}>Clientes</h1>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>setTrash(!trash)} className={`btn ${trash?'btn-danger':'btn-outline'}`}>
            <Icon name="trash-2" size={13}/>{trash?'Sair':'Lixeira'}{!trash&&clients.filter(c=>c.deleted).length>0&&` (${clients.filter(c=>c.deleted).length})`}
          </button>
          {!trash&&!isMobile&&<button className="btn btn-dark" onClick={add}><Icon name="user-plus" size={14}/> Adicionar</button>}
        </div>
      </div>
      {isMobile&&!trash&&<button className="fab" onClick={add}><Icon name="plus" size={24}/></button>}
      {trash&&<TrashBanner label="Clientes" onExit={()=>setTrash(false)}/>}
      {isMobile&&!trash?(
        <div className="card" style={{overflow:'hidden',borderRadius:12}}>
          {visible.map(c=>(
            <div key={c.id} className="compact-row" onClick={()=>setSelected(c)}>
              {c.photo?<img src={c.photo} style={{width:44,height:44,borderRadius:'50%',objectFit:'cover',flexShrink:0}}/>
                :<div style={{width:44,height:44,borderRadius:'50%',backgroundColor:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Cormorant Garamond,serif',fontSize:'1.1rem',fontWeight:500,flexShrink:0}}>{c.name.charAt(0)}</div>}
              <div className="compact-row-info">
                <div className="compact-row-title">{c.name}</div>
                <div className="compact-row-meta">{c.role}{c.role&&c.company?' · ':''}{c.company} · <span className={`tag ${tagColor(c.status)}`} style={{display:'inline',padding:'1px 6px',fontSize:'.62rem'}}>{c.status}</span></div>
              </div>
              <Icon name="chevron-right" size={16} style={{color:'var(--muted)',flexShrink:0}}/>
            </div>
          ))}
          {visible.length===0&&<div style={{textAlign:'center',padding:40,color:'var(--muted)'}}>Nenhum cliente.</div>}
        </div>
      ):(
        <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'repeat(auto-fill,minmax(260px,1fr))',gap:14}}>
        {visible.map(c=>(
          <div key={c.id} className="card" style={{padding:22,cursor:trash?'default':'pointer'}} onClick={()=>!trash&&setSelected(c)}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>
              {c.photo?<img src={c.photo} style={{width:40,height:40,borderRadius:'50%',objectFit:'cover',flexShrink:0}}/>
                :<div style={{width:40,height:40,borderRadius:'50%',backgroundColor:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Cormorant Garamond,serif',fontSize:'1.1rem',fontWeight:500,flexShrink:0}}>{c.name.charAt(0)}</div>}
              <div>
                <div style={{fontWeight:600,fontSize:'.88rem'}}>{c.name}</div>
                <div style={{fontSize:'.75rem',color:'var(--muted)'}}>{c.role}{c.role&&c.company?' · ':''}{c.company}</div>
              </div>
            </div>
            {c.notes&&<p style={{fontSize:'.78rem',color:'var(--muted)',lineHeight:1.6,margin:'0 0 12px',paddingBottom:12,borderBottom:'1px solid var(--border)',overflow:'hidden',textOverflow:'ellipsis',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{c.notes}</p>}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',borderTop:c.notes?'none':'1px solid var(--border)',paddingTop:c.notes?0:12}}>
              {!trash?<span className={`tag ${tagColor(c.status)}`}>{c.status}</span>:(
                <div style={{display:'flex',gap:5}}>
                  <button onClick={e=>{e.stopPropagation();restore(c.id);}} className="btn btn-outline" style={{padding:'4px 8px',fontSize:'.75rem'}}><Icon name="refresh-cw" size={11}/></button>
                  <button onClick={e=>{e.stopPropagation();hardDelete(c.id);}} className="btn btn-danger" style={{padding:'4px 8px',fontSize:'.75rem'}}><Icon name="trash-2" size={11}/></button>
                </div>
              )}
              <div style={{display:'flex',alignItems:'center',gap:5,fontSize:'.75rem',color:'var(--muted)',overflow:'hidden'}}>
                <Icon name="mail" size={11}/><span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.email}</span>
              </div>
            </div>
          </div>
        ))}
        {visible.length===0&&<div style={{gridColumn:'1/-1',textAlign:'center',padding:48,color:'var(--muted)'}}>{trash?'Lixeira vazia.':'Nenhum cliente.'}</div>}
        </div>
      )}
    </div>
  );
};

// ─── SYNC HUB (GitHub Gist) ───────────────────────────────────────────────────
const SyncHub=({appState,onImport,onClearSave,isMobile})=>{
  const GIST_LS_KEY='boardhub_gist_config';
  const loadConfig=()=>{try{return JSON.parse(localStorage.getItem(GIST_LS_KEY))||{};}catch{return{};}};
  const [token,setToken]=useState(()=>loadConfig().token||'');
  const [gistId,setGistId]=useState(()=>loadConfig().gistId||'');
  const [tokenInput,setTokenInput]=useState(()=>loadConfig().token||'');
  const [gistIdInput,setGistIdInput]=useState(()=>loadConfig().gistId||'');
  const [status,setStatus]=useState(null);
  const [loading,setLoading]=useState(false);
  const [showConfig,setShowConfig]=useState(false);
  const importRef=useRef();
  const configured=token&&gistId;
  const saveConfig=(t,g)=>{localStorage.setItem(GIST_LS_KEY,JSON.stringify({token:t,gistId:g}));setToken(t);setGistId(g);};
  const showStatus=(type,msg)=>{setStatus({type,msg});if(type!=='err')setTimeout(()=>setStatus(null),5000);};

  // Single sync: push local data to Gist
  const syncNow=async()=>{
    if(!configured){showStatus('err','Configure o token e o Gist ID antes de sincronizar.');setShowConfig(true);return;}
    setLoading(true);
    try{
      const data=JSON.stringify({...stripBase64(appState),_v:'2.0',_exported:new Date().toISOString()},null,2);
      const res=await fetch(`https://api.github.com/gists/${gistId}`,{method:'PATCH',headers:{Authorization:`token ${token}`,'Content-Type':'application/json'},body:JSON.stringify({files:{'boardhub-data.json':{content:data}}})});
      if(!res.ok)throw new Error(`Erro ${res.status}`);
      const json=await res.json();
      showStatus('ok',`✓ Sincronizado com sucesso! ${new Date(json.updated_at).toLocaleString('pt-BR')}`);
    }catch(e){showStatus('err',`Falha na sincronização: ${e.message}`);}
    finally{setLoading(false);}
  };

  // Pull: load data from Gist into local
  const pullFromGist=async()=>{
    if(!configured){showStatus('err','Configure o token e o Gist ID primeiro.');return;}
    if(!window.confirm('Isso vai substituir todos os seus dados locais pelos dados do Gist. Confirmar?'))return;
    setLoading(true);
    try{
      const res=await fetch(`https://api.github.com/gists/${gistId}`,{headers:{Authorization:`token ${token}`}});
      if(!res.ok)throw new Error(`Erro ${res.status}`);
      const json=await res.json();
      const file=json.files['boardhub-data.json'];
      if(!file)throw new Error('Arquivo boardhub-data.json não encontrado no Gist.');
      // GitHub truncates large files — fetch raw content if needed
      let content=file.content;
      if(file.truncated){
        const rawRes=await fetch(file.raw_url,{headers:{Authorization:`token ${token}`}});
        if(!rawRes.ok)throw new Error(`Erro ao buscar conteúdo raw: ${rawRes.status}`);
        content=await rawRes.text();
      }
      const data=JSON.parse(content);
      onImport(data);
      showStatus('ok',`✓ Dados carregados do Gist! Exportado em: ${data._exported?new Date(data._exported).toLocaleString('pt-BR'):'data desconhecida'}.`);
    }catch(e){showStatus('err',`Falha ao carregar: ${e.message}`);}
    finally{setLoading(false);}
  };

  const createGist=async()=>{
    if(!tokenInput){showStatus('err','Insira o token antes de criar o Gist.');return;}
    setLoading(true);
    try{
      const data=JSON.stringify({...stripBase64(appState),_v:'2.0',_exported:new Date().toISOString()},null,2);
      const res=await fetch('https://api.github.com/gists',{method:'POST',headers:{Authorization:`token ${tokenInput}`,'Content-Type':'application/json'},body:JSON.stringify({description:'BoardHub — Storyboard OS data backup',public:false,files:{'boardhub-data.json':{content:data}}})});
      if(!res.ok)throw new Error(`Erro ${res.status}`);
      const json=await res.json();
      setGistIdInput(json.id);
      saveConfig(tokenInput,json.id);
      showStatus('ok',`✓ Gist criado e configurado!`);
      setShowConfig(false);
    }catch(e){showStatus('err',`Falha ao criar Gist: ${e.message}`);}
    finally{setLoading(false);}
  };

  const exportData=()=>{
    const data=JSON.stringify({...appState,_v:'2.0',_exported:new Date().toISOString()},null,2);
    const blob=new Blob([data],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`boardhub-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);
  };
  const handleImportFile=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{const data=JSON.parse(ev.target.result);onImport(data);showStatus('ok',`✓ Importado com sucesso!`);}
      catch{showStatus('err','Arquivo inválido.');}
    };
    reader.readAsText(file);e.target.value='';
  };

  const counts=[
    {label:'Projetos',value:(appState.projects||[]).filter(p=>!p.deleted).length},
    {label:'Clientes',value:(appState.clients||[]).filter(c=>!c.deleted).length},
    {label:'Mentores',value:(appState.mentors||[]).filter(m=>!m.deleted).length},
    {label:'Notas',value:(appState.notes||[]).filter(n=>!n.deleted).length},
    {label:'Atividades',value:(appState.tasks||[]).length},
    {label:'Posts',value:(appState.socialPosts||[]).filter(p=>!p.deleted).length},
  ];

  return(
    <div className="fade-up" style={{maxWidth:680,margin:'0 auto'}}>
      <h1 className="serif" style={{fontSize:isMobile?'1.75rem':'2.6rem',fontWeight:300,letterSpacing:'-0.02em',marginBottom:4}}>Sincronizar</h1>
      <p style={{color:'var(--muted)',fontSize:'.85rem',marginBottom:isMobile?20:28}}>Salve e carregue seus dados via GitHub Gist para usar em qualquer computador.</p>

      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'repeat(3,1fr)',gap:10,marginBottom:isMobile?16:24}}>
        {counts.map(s=>(
          <div key={s.label} className="card" style={{padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:'.75rem',color:'var(--muted)'}}>{s.label}</span>
            <span style={{fontFamily:'Cormorant Garamond,serif',fontSize:'1.4rem',fontWeight:500}}>{s.value}</span>
          </div>
        ))}
      </div>

      {/* Status message */}
      {status&&(
        <div style={{padding:'12px 18px',borderRadius:10,marginBottom:20,background:status.type==='ok'?'#E8F5EC':'#FDEDED',border:`1px solid ${status.type==='ok'?'#bbf7d0':'#FECACA'}`,color:status.type==='ok'?'#276b3e':'#9B1C1C',fontSize:'.85rem',display:'flex',alignItems:'center',gap:10}}>
          <Icon name={status.type==='ok'?'check-circle':'alert-circle'} size={16}/>{status.msg}
          <button onClick={()=>setStatus(null)} style={{marginLeft:'auto',background:'none',border:'none',cursor:'pointer',color:'inherit',padding:2}}><Icon name="x" size={14}/></button>
        </div>
      )}

      {/* Main sync button */}
      <div className="card" style={{padding:28,marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:20}}>
          <div style={{width:48,height:48,borderRadius:12,background:configured?'var(--text)':'var(--border)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <Icon name="refresh-cw" size={20} style={{color:configured?'white':'var(--muted)'}}/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:'1rem',marginBottom:2}}>Sincronizar com GitHub Gist</div>
            <div style={{fontSize:'.78rem',color:'var(--muted)'}}>{configured?`Gist configurado · ID: ${gistId.slice(0,12)}…`:'Nenhum Gist configurado ainda.'}</div>
          </div>
          {configured&&<a href={`https://gist.github.com/${gistId}`} target="_blank" rel="noopener noreferrer" style={{color:'var(--muted)',display:'flex',alignItems:'center',gap:4,fontSize:'.75rem',textDecoration:'none'}} className="text-link"><Icon name="external-link" size={13}/></a>}
        </div>
        <div style={{display:'flex',gap:10}}>
          <button className="btn btn-dark" style={{flex:1,justifyContent:'center',padding:'10px 0',fontSize:'.9rem'}} onClick={syncNow} disabled={loading}>
            <Icon name={loading?'loader':'upload-cloud'} size={15}/> {loading?'Sincronizando…':'Salvar no Gist'}
          </button>
          {configured&&(
            <button className="btn btn-outline" style={{padding:'10px 16px'}} onClick={pullFromGist} disabled={loading} title="Carregar dados do Gist para este computador">
              <Icon name="download-cloud" size={15}/>
            </button>
          )}
        </div>
        {configured&&<p style={{fontSize:'.72rem',color:'var(--muted)',marginTop:10,marginBottom:0}}>"Salvar no Gist" envia os dados deste computador. O botão <Icon name="download-cloud" size={11}/> carrega os dados do Gist (sobrescreve o local).</p>}
      </div>

      {/* Config section (collapsible) */}
      <div className="card" style={{marginBottom:16,overflow:'hidden'}}>
        <button onClick={()=>setShowConfig(!showConfig)} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'18px 24px',background:'none',border:'none',cursor:'pointer',fontFamily:'Figtree,sans-serif',fontSize:'.88rem',fontWeight:600,color:'var(--text)'}}>
          <span style={{display:'flex',alignItems:'center',gap:8}}><Icon name="settings" size={15}/> Configuração do Gist</span>
          <Icon name={showConfig?'chevron-up':'chevron-down'} size={15} style={{color:'var(--muted)'}}/>
        </button>
        {showConfig&&(
          <div style={{padding:'0 24px 24px',display:'flex',flexDirection:'column',gap:14,borderTop:'1px solid var(--border)'}}>
            <div style={{paddingTop:16}}>
              <div style={{fontWeight:600,fontSize:'.85rem',marginBottom:6}}>Token do GitHub</div>
              <div style={{fontSize:'.75rem',color:'var(--muted)',marginBottom:10}}>Gere em <a href="https://github.com/settings/tokens" target="_blank" rel="noopener noreferrer" style={{color:'var(--text)'}}>github.com/settings/tokens</a> com escopo <code style={{background:'var(--border)',padding:'1px 5px',borderRadius:4}}>gist</code>.</div>
              <input type="password" className="input-box" value={tokenInput} onChange={e=>setTokenInput(e.target.value)} placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" style={{fontFamily:'monospace'}}/>
            </div>
            <div>
              <div style={{fontWeight:600,fontSize:'.85rem',marginBottom:6}}>Gist ID</div>
              <div style={{fontSize:'.75rem',color:'var(--muted)',marginBottom:10}}>Se já tem um Gist do BoardHub, cole o ID. Senão, clique "Criar Gist".</div>
              <input className="input-box" value={gistIdInput} onChange={e=>setGistIdInput(e.target.value)} placeholder="abc123def456..." style={{fontFamily:'monospace'}}/>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-outline" style={{flex:1,justifyContent:'center'}} onClick={createGist} disabled={loading}>
                <Icon name="plus-circle" size={13}/> {loading?'Criando…':'Criar novo Gist'}
              </button>
              <button className="btn btn-dark" style={{flex:1,justifyContent:'center'}} onClick={()=>{saveConfig(tokenInput,gistIdInput);showStatus('ok','✓ Configuração salva!');setShowConfig(false);}}>
                <Icon name="check" size={13}/> Salvar
              </button>
            </div>
            {configured&&<button className="btn btn-danger" style={{alignSelf:'flex-start'}} onClick={()=>{localStorage.removeItem(GIST_LS_KEY);setToken('');setGistId('');setTokenInput('');setGistIdInput('');}}>
              <Icon name="trash-2" size={13}/> Desconectar Gist
            </button>}
          </div>
        )}
      </div>

      {/* Manual backup */}
      <input ref={importRef} type="file" accept=".json" style={{display:'none'}} onChange={handleImportFile}/>
      <div className="card" style={{padding:'18px 24px',marginBottom:16,display:'flex',alignItems:'center',gap:16}}>
        <Icon name="hard-drive" size={18} style={{color:'var(--muted)',flexShrink:0}}/>
        <div style={{flex:1}}>
          <div style={{fontWeight:600,fontSize:'.85rem',marginBottom:2}}>Backup manual</div>
          <div style={{fontSize:'.75rem',color:'var(--muted)'}}>Exportar ou importar um arquivo JSON local.</div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-outline" style={{padding:'6px 14px',fontSize:'.8rem'}} onClick={exportData}><Icon name="download" size={13}/> Exportar</button>
          <button className="btn btn-outline" style={{padding:'6px 14px',fontSize:'.8rem'}} onClick={()=>importRef.current.click()}><Icon name="upload" size={13}/> Importar</button>
        </div>
      </div>

      {/* Danger zone */}
      <div className="card" style={{padding:'16px 24px',display:'flex',alignItems:'center',gap:16}}>
        <Icon name="alert-triangle" size={16} style={{color:'#9B1C1C',flexShrink:0}}/>
        <div style={{flex:1}}>
          <div style={{fontWeight:600,fontSize:'.85rem',marginBottom:1}}>Limpar dados locais</div>
          <div style={{fontSize:'.75rem',color:'var(--muted)'}}>Apaga tudo e restaura os exemplos.</div>
        </div>
        <button className="btn btn-danger" style={{flexShrink:0,padding:'6px 14px',fontSize:'.8rem'}} onClick={()=>{if(window.confirm('Isso apagará todos os seus dados. Confirmar?')){localStorage.removeItem(LS_KEY);onClearSave();}}}>
          <Icon name="trash-2" size={13}/> Limpar
        </button>
      </div>
    </div>
  );
};

// ─── MENTORS HUB ─────────────────────────────────────────────────────────────
const MentorModal=({mentor,onClose,onSave,onDelete})=>{
  const [form,setForm]=useState({...mentor});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const photoRef=useRef();
  const imgRefs=[useRef(),useRef(),useRef(),useRef()];

  const handlePhoto=async e=>{const file=e.target.files[0];if(!file)return;set('photo',await uploadImage(file));};
  const handleRefImg=async(idx,e)=>{
    const file=e.target.files[0];if(!file)return;
    const url=await uploadImage(file);
    const imgs=[...(form.photos||[null,null,null,null])];
    imgs[idx]=url;set('photos',imgs);
  };
  const removeRefImg=idx=>{
    const imgs=[...(form.photos||[null,null,null,null])];
    imgs[idx]=null;set('photos',imgs);
  };
  const photos=form.photos||[null,null,null,null];

  return(
    <div className="overlay-offset" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:580}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:24}}>
          <h2 className="serif" style={{fontSize:'1.6rem',fontWeight:400,margin:0}}>{form.name||'Mentor'}</h2>
          <button className="btn btn-ghost" onClick={onClose} style={{padding:6}}><Icon name="x" size={18}/></button>
        </div>
        <div style={{display:'flex',gap:16,alignItems:'flex-start',marginBottom:20}}>
          <input ref={photoRef} type="file" accept="image/*" style={{display:'none'}} onChange={handlePhoto}/>
          <div onClick={()=>photoRef.current.click()} style={{width:64,height:64,borderRadius:'50%',cursor:'pointer',flexShrink:0,overflow:'hidden',border:'2px dashed var(--border)',display:'flex',alignItems:'center',justifyContent:'center',backgroundColor:'var(--bg)',position:'relative'}}
            onMouseEnter={e=>e.currentTarget.querySelector('.mh').style.opacity=1}
            onMouseLeave={e=>e.currentTarget.querySelector('.mh').style.opacity=0}>
            {form.photo
              ?<img src={form.photo} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
              :<span style={{fontFamily:'Cormorant Garamond,serif',fontSize:'1.8rem',fontWeight:500,color:'var(--muted)'}}>{(form.name||'?').charAt(0)}</span>}
            <div className="mh" style={{position:'absolute',inset:0,background:'rgba(0,0,0,.4)',display:'flex',alignItems:'center',justifyContent:'center',opacity:0,transition:'opacity .2s'}}><Icon name="camera" size={16} style={{color:'white'}}/></div>
          </div>
          <div style={{flex:1,display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <Field label="Nome"><input className="input-box" value={form.name} onChange={e=>set('name',e.target.value)} style={{fontWeight:600}}/></Field>
            <Field label="Area"><input className="input-box" value={form.area||''} onChange={e=>set('area',e.target.value)} placeholder="Ex: Narrativa Visual"/></Field>
            <Field label="Meio"><input className="input-box" value={form.medium||''} onChange={e=>set('medium',e.target.value)} placeholder="Ex: Animacao, HQ..."/></Field>
            <Field label="Status">
              <select className="input-box" value={form.active?'Ativo':'Inativo'} onChange={e=>set('active',e.target.value==='Ativo')} style={{cursor:'pointer'}}>
                <option>Ativo</option><option>Inativo</option>
              </select>
            </Field>
          </div>
        </div>
        <div style={{marginBottom:20}}>
          <button onClick={()=>set('main',!form.main)}
            style={{display:'inline-flex',alignItems:'center',gap:8,padding:'8px 16px',borderRadius:10,border:'1.5px solid '+(form.main?'#92700b':'var(--border)'),background:form.main?'#FEF9E7':'transparent',color:form.main?'#92700b':'var(--muted)',cursor:'pointer',fontFamily:'Figtree,sans-serif',fontSize:'.82rem',fontWeight:600,transition:'all .15s'}}>
            <Icon name="star" size={14}/>
            {form.main?'Mentor Principal (ativo)':'Marcar como Principal'}
          </button>
          <p style={{fontSize:'.72rem',color:'var(--muted)',margin:'6px 0 0 2px'}}>Ate 3 mentores principais aparecem na pagina inicial.</p>
        </div>
        <Field label="Notas e Estudos">
          <textarea className="input-box" rows={3} value={form.notes||''} onChange={e=>set('notes',e.target.value)}
            placeholder="Insights, tecnicas, o que aprender..." style={{resize:'vertical',lineHeight:1.7,marginBottom:16}}/>
        </Field>
        <Field label="Links de Referencia">
          <input className="input-box" value={form.links||''} onChange={e=>set('links',e.target.value)}
            placeholder="https://... (separe com virgula)" style={{marginBottom:16}}/>
        </Field>
        <div style={{marginBottom:20}}>
          <span className="label" style={{display:'block',marginBottom:10}}>Imagens de Referencia</span>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
            {[0,1,2,3].map(idx=>(
              <div key={idx} style={{position:'relative',aspectRatio:'1',borderRadius:10,overflow:'hidden',background:'var(--bg)',border:'1px solid var(--border)',cursor:'pointer'}}
                onClick={()=>!photos[idx]&&imgRefs[idx].current.click()}>
                <input ref={imgRefs[idx]} type="file" accept="image/*" style={{display:'none'}} onChange={e=>handleRefImg(idx,e)}/>
                {photos[idx]
                  ?<>
                    <img src={photos[idx]} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
                    <button onClick={e=>{e.stopPropagation();removeRefImg(idx);}}
                      style={{position:'absolute',top:4,right:4,width:20,height:20,borderRadius:'50%',background:'rgba(0,0,0,.55)',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'white'}}>
                      <Icon name="x" size={10}/>
                    </button>
                  </>
                  :<div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,color:'var(--muted)',fontSize:'.65rem',textAlign:'center',padding:4}}>
                    <Icon name="image-plus" size={18}/><span>Adicionar</span>
                  </div>
                }
              </div>
            ))}
          </div>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',paddingTop:4,borderTop:'1px solid var(--border)'}}>
          <button className="btn btn-danger" onClick={onDelete}><Icon name="trash-2" size={14}/> Excluir</button>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-outline" onClick={onClose}>Cancelar</button>
            <button className="btn btn-dark" onClick={()=>onSave(form)}><Icon name="check" size={14}/> Salvar</button>
          </div>
        </div>
      </div>
    </div>
  );
};

const MentorsHub=({mentors,setMentors,isMobile})=>{
  const [selected,setSelected]=useState(null);
  const [search,setSearch]=useState('');

  const visible=mentors.filter(m=>!m.deleted&&(
    !search||m.name.toLowerCase().includes(search.toLowerCase())||
    (m.area||'').toLowerCase().includes(search.toLowerCase())
  ));

  const add=()=>{
    const n={id:Date.now(),name:'Novo Mentor',area:'',medium:'',notes:'',links:'',active:true,main:false,photo:'',photos:[null,null,null,null],deleted:false};
    setMentors(p=>[n,...p]);
    setSelected(n);
  };

  const save=form=>{
    if(form.main){
      const mainCount=mentors.filter(m=>!m.deleted&&m.main&&m.id!==form.id).length;
      if(mainCount>=3){alert('Voce ja tem 3 mentores principais.');return;}
    }
    setMentors(p=>p.map(m=>m.id===form.id?form:m));
    setSelected(null);
  };

  const del=()=>{
    if(!window.confirm('Excluir mentor permanentemente?'))return;
    setMentors(p=>p.filter(m=>m.id!==selected.id));
    setSelected(null);
  };

  const selectedFresh=selected?mentors.find(m=>m.id===selected.id)||null:null;

  return(
    <div className="fade-up" style={{maxWidth:900,margin:'0 auto'}}>
      {selectedFresh&&<MentorModal mentor={selectedFresh} onClose={()=>setSelected(null)} onSave={save} onDelete={del}/>}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:isMobile?'center':'flex-end',marginBottom:isMobile?20:28,gap:12,flexWrap:'wrap'}}>
        <div>
          <h1 className="serif" style={{fontSize:isMobile?'1.75rem':'2.6rem',fontWeight:300,letterSpacing:'-0.02em',marginBottom:4}}>Mentores</h1>
          {!isMobile&&<p style={{color:'var(--muted)',fontSize:'.85rem',margin:0}}>Referencias, influencias e guias de estudo.</p>}
        </div>
        <button className="btn btn-dark" onClick={add}><Icon name="user-plus" size={14}/> Adicionar</button>
      </div>
      {mentors.filter(m=>!m.deleted).length>0&&(
        <div style={{position:'relative',marginBottom:24}}>
          <Icon name="search" size={14} style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'var(--muted)',pointerEvents:'none'}}/>
          <input className="input-box" value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Buscar mentores..." style={{paddingLeft:36}}/>
        </div>
      )}
      {visible.length===0&&(
        <div style={{textAlign:'center',padding:'60px 0',color:'var(--muted)'}}>
          <Icon name="book-open" size={36} style={{marginBottom:12,opacity:.3}}/>
          <p style={{fontSize:'.9rem',margin:0}}>{search?'Nenhum mentor encontrado.':'Adicione seu primeiro mentor acima.'}</p>
        </div>
      )}
      {isMobile?(
        <div className="card" style={{overflow:'hidden',borderRadius:12}}>
          {visible.map(m=>(
            <div key={m.id} className="compact-row" onClick={()=>setSelected(m)}>
              {m.photo
                ?<img src={m.photo} style={{width:44,height:44,borderRadius:'50%',objectFit:'cover',flexShrink:0}}/>
                :<div style={{width:44,height:44,borderRadius:'50%',background:'var(--bg)',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Cormorant Garamond,serif',fontSize:'1.2rem',fontWeight:500}}>{(m.name||'?').charAt(0)}</div>
              }
              <div className="compact-row-info">
                <div className="compact-row-title">{m.name}</div>
                <div className="compact-row-meta">{m.area}{m.medium?' · '+m.medium:''}</div>
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:2,flexShrink:0}}>
                <span style={{fontSize:'.6rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',padding:'2px 6px',borderRadius:4,background:m.active?'#E8F5EC':'#F0EDE9',color:m.active?'#276b3e':'var(--muted)'}}>{m.active?'Ativo':'Inativo'}</span>
                {m.main&&<Icon name="star" size={11} style={{color:'#92700b'}}/>}
              </div>
            </div>
          ))}
          {visible.length===0&&<div style={{textAlign:'center',padding:40,color:'var(--muted)'}}>Nenhum mentor.</div>}
        </div>
      ):(
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:14}}>
        {visible.map(m=>{
          const photos=(m.photos||[]).filter(Boolean);
          return(
            <div key={m.id} className="card card-click" style={{padding:0,overflow:'hidden',cursor:'pointer'}} onClick={()=>setSelected(m)}>
              {photos.length>0
                ?<div style={{height:90,display:'grid',gridTemplateColumns:'repeat('+Math.min(photos.length,4)+',1fr)',gap:1,background:'var(--border)'}}>
                    {photos.slice(0,4).map((img,i)=><img key={i} src={img} style={{width:'100%',height:90,objectFit:'cover',display:'block'}}/>)}
                  </div>
                :<div style={{height:90,background:'linear-gradient(135deg,var(--bg) 0%,var(--border) 100%)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <span style={{fontFamily:'Cormorant Garamond,serif',fontSize:'2.8rem',fontWeight:300,color:'var(--border-2)'}}>{(m.name||'?').charAt(0)}</span>
                  </div>
              }
              <div style={{padding:'14px 16px'}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                  {m.photo
                    ?<img src={m.photo} style={{width:32,height:32,borderRadius:'50%',objectFit:'cover',flexShrink:0,border:'2px solid var(--surface)'}}/>
                    :<div style={{width:32,height:32,borderRadius:'50%',background:'var(--bg)',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Cormorant Garamond,serif',fontSize:'.95rem',fontWeight:500}}>{(m.name||'?').charAt(0)}</div>
                  }
                  <div style={{minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:'.88rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.name}</div>
                    {m.area&&<div style={{fontSize:'.73rem',color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.area}{m.medium?' - '+m.medium:''}</div>}
                  </div>
                </div>
                {m.notes&&<p style={{fontSize:'.76rem',color:'var(--muted)',margin:0,lineHeight:1.55,overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{m.notes}</p>}
                <div style={{marginTop:10,display:'flex',gap:5,alignItems:'center'}}>
                  <span style={{fontSize:'.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.07em',padding:'2px 7px',borderRadius:4,background:m.active?'#E8F5EC':'#F0EDE9',color:m.active?'#276b3e':'var(--muted)'}}>{m.active?'Ativo':'Inativo'}</span>
                  {m.main&&<span style={{fontSize:'.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.07em',padding:'2px 7px',borderRadius:4,background:'#FEF9E7',color:'#92700b',display:'flex',alignItems:'center',gap:3}}><Icon name="star" size={9}/> Principal</span>}
                </div>
              </div>
            </div>
          );
        })}
        </div>
      )}
    </div>
  );
};

// ─── APP ──────────────────────────────────────────────────────────────────────
const App=()=>{
  const [isMobile,toggleLayout]=useLayoutMode();
  const [view,setView]=useState('dashboard');
  const [selectedProject,setSelectedProject]=useState(null);
  const [showNewProject,setShowNewProject]=useState(false);
  const [saveFlash,setSaveFlash]=useState(false);

  // Initialize from localStorage if available, else seed
  const [projects,setProjects]=useState(()=>persisted?.projects||SEED.projects);
  const [clients,setClients]=useState(()=>persisted?.clients||SEED.clients);
  const [mentors,setMentors]=useState(()=>persisted?.mentors||SEED.mentors);
  const [notes,setNotes]=useState(()=>persisted?.notes||SEED.notes);
  const [tasks,setTasks]=useState(()=>persisted?.tasks||SEED.tasks);
  const [socialPosts,setSocialPosts]=useState(()=>persisted?.socialPosts||SEED.socialPosts);
  const [galleryPosts,setGalleryPosts]=useState(()=>persisted?.galleryPosts||SEED.galleryPosts);
  const [pomoData,setPomoData]=useState(()=>pomoLoad());

  // Persist pomoData whenever it changes
  useEffect(()=>{ pomoSave(pomoData); },[pomoData]);

  // Auto-save to localStorage — debounced to avoid thrashing on every keystroke
  const saveFlashTimer=useRef(null);
  useEffect(()=>{
    const timer=setTimeout(()=>{
      const state={projects,clients,mentors,notes,tasks,socialPosts,galleryPosts};
      lsSave(state);
      setSaveFlash(true);
      clearTimeout(saveFlashTimer.current);
      saveFlashTimer.current=setTimeout(()=>setSaveFlash(false),1800);
    },800);
    return ()=>clearTimeout(timer);
  },[projects,clients,mentors,notes,tasks,socialPosts,galleryPosts]);

  // Lucide icons: no longer needed — Icon component caches SVG paths on first use

  const navigate=v=>{setView(v);if(v!=='project-detail')setSelectedProject(null);};
  const handleUpdateProject=p=>{setProjects(prev=>prev.map(x=>x.id===p.id?p:x));setSelectedProject(p);};
  const addProject=p=>{setProjects(prev=>[p,...prev]);setShowNewProject(false);setSelectedProject(p);setView('project-detail');};
  const softDeleteProject=id=>setProjects(prev=>prev.map(p=>p.id===id?{...p,deleted:true}:p));

  const clearSave=()=>{
    setProjects(SEED.projects);setClients(SEED.clients);setMentors(SEED.mentors);
    setNotes(SEED.notes);setTasks(SEED.tasks);setSocialPosts(SEED.socialPosts);setGalleryPosts(SEED.galleryPosts);
    setPomoData({days:{}});
    navigate('dashboard');
  };

  const appState={projects,clients,mentors,notes,tasks,socialPosts,galleryPosts,pomoData};
  const handleImport=data=>{
    if(data.projects)setProjects(data.projects);
    if(data.clients)setClients(data.clients);
    if(data.mentors)setMentors(data.mentors);
    if(data.notes)setNotes(data.notes);
    if(data.tasks)setTasks(data.tasks);
    if(data.socialPosts)setSocialPosts(data.socialPosts);
    if(data.galleryPosts)setGalleryPosts(data.galleryPosts);
    if(data.pomoData)setPomoData(data.pomoData);
  };

  return(
    <div style={{display:'flex',flexDirection:isMobile?'column':'row',minHeight:'100vh',overflowX:'hidden'}}>
      {showNewProject&&<NewProjectModal onSave={addProject} onClose={()=>setShowNewProject(false)} isMobile={isMobile}/>}
      {isMobile
        ? <SidebarMobile activeView={view} setView={navigate} saveFlash={saveFlash} onToggleLayout={toggleLayout}/>
        : <SidebarDesktop activeView={view} setView={navigate} saveFlash={saveFlash} onToggleLayout={toggleLayout}/>
      }
      <main className={isMobile?'main-mobile':''} style={isMobile?{flex:1,padding:'16px 16px 80px',overflowY:'auto',minHeight:'calc(100vh - 56px)',paddingTop:0}:{marginLeft:220,flex:1,padding:'48px 40px',overflowY:'auto',minHeight:'100vh'}}>
        {view==='dashboard'      && <Dashboard projects={projects} notes={notes} mentors={mentors} tasks={tasks} setTasks={setTasks} setView={navigate} setNotes={setNotes} pomoData={pomoData} setPomoData={setPomoData} isMobile={isMobile}/>}
        {view==='projects'       && <ProjectsList projects={projects} setProjects={setProjects} onSelect={p=>{setSelectedProject(p);setView('project-detail');}} onAdd={()=>setShowNewProject(true)} isMobile={isMobile}/>}
        {view==='project-detail' && selectedProject && <ProjectDetail project={selectedProject} onBack={()=>setView('projects')} onUpdate={handleUpdateProject} onSoftDelete={()=>softDeleteProject(selectedProject.id)} globalMentors={mentors} onAddGlobalMentor={m=>{setMentors(prev=>[...prev,m]);}} isMobile={isMobile}/>}
        {view==='gallery'        && <Gallery posts={galleryPosts} setPosts={setGalleryPosts} isMobile={isMobile}/>}
        {view==='ideas'          && <IdeasLab notes={notes} setNotes={setNotes} tasks={tasks} setTasks={setTasks} isMobile={isMobile}/>}
        {view==='mentors'       && <MentorsHub mentors={mentors} setMentors={setMentors} isMobile={isMobile}/>}
        {view==='social'         && <Social posts={socialPosts} setPosts={setSocialPosts} isMobile={isMobile}/>}
        {view==='clients'        && <Clients clients={clients} setClients={setClients} isMobile={isMobile}/>}
        {view==='sync'           && <SyncHub appState={appState} onImport={handleImport} onClearSave={clearSave} isMobile={isMobile}/>}
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
