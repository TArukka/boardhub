};

// - GANTT TIMELINE -
const PTASK_STATUSES=['Pendente','Fazendo','Concluído','Atrasado'];
const PTASK_NEXT={'Pendente':'Fazendo','Fazendo':'Concluído','Concluído':'Atrasado','Atrasado':'Pendente'};

const GANTT_COLORS={
  'Pendente': {bar:'#EDE8E1',text:'#6B6460',border:'#C8BEB4',dot:'#B5ABA0'},
  'Fazendo':  {bar:'#FEF3C7',text:'#92700B',border:'#FCD34D',dot:'#F59E0B'},
  'Concluído':{bar:'#D1FAE5',text:'#065F46',border:'#6EE7B7',dot:'#10B981'},
  'Atrasado': {bar:'#FEE2E2',text:'#991B1B',border:'#FCA5A5',dot:'#EF4444'},
};

const daysBetween=(a,b)=>Math.round((new Date(b)-new Date(a))/86400000);
const addDays=(dateStr,days)=>{const d=new Date(dateStr+'T12:00:00');d.setDate(d.getDate()+days);return d.toISOString().slice(0,10);};
const todayISO=()=>new Date().toISOString().slice(0,10);
const fmtShort=d=>{if(!d)return'';const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});};

const GanttTimeline=({tasks,onUpdateTasks,projectStart,projectEnd})=>{
  const today=useMemo(()=>todayISO(),[]);
  const [selectedId,setSelectedId]=useState(null);
  const [editDraft,setEditDraft]=useState(null);
  const [newTaskName,setNewTaskName]=useState('');
  const [thisWeek,setThisWeek]=useState(true);
  const [expanded,setExpanded]=useState(false);
  const scrollRef=useRef(null);
  const dragRef=useRef(null);
  const [, forceUpdate]=useState(0);

  // Compute this week Mon-Sun
  const getWeekBounds=()=>{
    const d=new Date(today+'T12:00:00');
    const day=d.getDay(); // 0=Sun
    const mon=new Date(d);mon.setDate(d.getDate()-(day===0?6:day-1));
    const sun=new Date(mon);sun.setDate(mon.getDate()+6);
    return{start:mon.toISOString().slice(0,10),end:sun.toISOString().slice(0,10)};
  };

  // - Compute chart bounds -
  let chartStart=projectStart||today;
  let chartEnd=projectEnd||addDays(today,45);
  tasks.forEach(t=>{
    if(t.startDate&&t.startDate<chartStart)chartStart=t.startDate;
    if(t.dueDate&&t.dueDate>chartEnd)chartEnd=t.dueDate;
  });
  if(thisWeek){const wb=getWeekBounds();chartStart=wb.start;chartEnd=wb.end;}
  else{chartStart=addDays(chartStart,-5);chartEnd=addDays(chartEnd,12);}
  // When showing "this week", only render tasks that overlap the visible window.
  // A task overlaps [chartStart, chartEnd] if its start <= chartEnd AND its end >= chartStart.
  const visibleTasks=thisWeek
    ? tasks.filter(t=>{
        // Always show overdue tasks regardless of date range — they need attention
        if(t.status==='Atrasado')return true;
        const s=t.startDate||(projectStart||today);
        const e=t.dueDate||(projectEnd||addDays(today,7));
        return s<=chartEnd&&e>=chartStart;
      })
    : tasks;
  const totalDays=Math.max(1,daysBetween(chartStart,chartEnd));
  const DAY_W=36;
  const ROW_H=38;
  const HEADER_H=44;
  const LEFT_W=200;

  // - Month + week header data -
  const months=[];
  let cur=new Date(chartStart+'T12:00:00');
  const endDt=new Date(chartEnd+'T12:00:00');
  while(cur<=endDt){
    const mStart=cur.toISOString().slice(0,10);
    const label=cur.toLocaleDateString('pt-BR',{month:'short',year:'2-digit'}).replace('.',' ');
    const next=new Date(cur.getFullYear(),cur.getMonth()+1,1);
    const mEnd=next>endDt?chartEnd:next.toISOString().slice(0,10);
    months.push({label,days:daysBetween(mStart,mEnd)});
    cur=next;
  }

  const weekMarkers=[];
  for(let i=0;i<=totalDays;i+=7){
    const d=addDays(chartStart,i);
    const dt=new Date(d+'T12:00:00');
    weekMarkers.push({offset:i*DAY_W,label:dt.getDate()+'/'+(dt.getMonth()+1)});
  }

  // Weekend columns (Sat=6, Sun=0)
  const weekendCols=[];
  for(let i=0;i<=totalDays;i++){
    const dt=new Date(chartStart+'T12:00:00');dt.setDate(dt.getDate()+i);
    const dow=dt.getDay();
    if(dow===0||dow===6)weekendCols.push(i);
  }

  const todayOffset=daysBetween(chartStart,today)*DAY_W;
  const gridW=totalDays*DAY_W;

  // - Bar geometry -
  const barGeom=t=>{
    const s=t.startDate||(projectStart||today);
    const e=t.dueDate||(projectEnd||addDays(today,7));
    const visStart=s<chartStart?chartStart:s;
    const left=Math.max(0,daysBetween(chartStart,s))*DAY_W;
    const width=Math.max(DAY_W,(daysBetween(visStart,e)+1)*DAY_W);
    return{left,width};
  };

  // - Drag -
  const startDrag=(e,taskId,type)=>{
    e.preventDefault();e.stopPropagation();
    const t=tasks.find(x=>x.id===taskId);if(!t)return;
    const origStart=t.startDate||(projectStart||today);
    const origEnd=t.dueDate||(projectEnd||addDays(today,7));
    dragRef.current={taskId,type,startX:e.clientX,origStart,origEnd};
    const onMove=me=>{
      if(!dragRef.current)return;
      const dx=me.clientX-dragRef.current.startX;
      const delta=Math.round(dx/DAY_W);
      const{taskId,type,origStart,origEnd}=dragRef.current;
      let ns,ne;
      if(type==='move'){ns=addDays(origStart,delta);ne=addDays(origEnd,delta);}
      else if(type==='left'){ns=addDays(origStart,delta);ne=origEnd;if(ns>=ne)ns=addDays(ne,-1);}
      else{ns=origStart;ne=addDays(origEnd,delta);if(ne<=ns)ne=addDays(ns,1);}
      onUpdateTasks(tasks.map(x=>x.id===taskId?{...x,startDate:ns,dueDate:ne}:x));
    };
    const onUp=()=>{dragRef.current=null;window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
  };

  // - Edit -
  const selectTask=t=>{setSelectedId(t.id);setEditDraft({...t,startDate:t.startDate||(projectStart||today),dueDate:t.dueDate||(projectEnd||addDays(today,7)),notes:t.notes||''});};
  const saveEdit=()=>{if(!editDraft)return;onUpdateTasks(tasks.map(t=>t.id===editDraft.id?{...editDraft}:t));setSelectedId(null);setEditDraft(null);};
  const deleteTask=()=>{if(!editDraft)return;onUpdateTasks(tasks.filter(t=>t.id!==editDraft.id));setSelectedId(null);setEditDraft(null);};
  const cycleStatus=id=>{const upd=tasks.map(t=>t.id===id?{...t,status:PTASK_NEXT[t.status]||'Pendente'}:t);onUpdateTasks(upd);if(editDraft&&editDraft.id===id)setEditDraft(d=>({...d,status:PTASK_NEXT[d.status]||'Pendente'}));};
  const addTask=()=>{
    if(!newTaskName.trim())return;
    const id=Date.now();
    // When "this week" view is active, default to today so the task is visible immediately.
    const s=thisWeek ? today : (projectStart||today);
    const e=thisWeek ? addDays(today,7) : (projectEnd||addDays(today,7));
    onUpdateTasks([...tasks,{id,text:newTaskName.trim(),status:'Pendente',startDate:s,dueDate:e,notes:''}]);
    setNewTaskName('');
  };

  // Auto-scroll to center "today" in the visible area
  useEffect(()=>{
    const el=scrollRef.current;
    if(!el)return;
    const targetX=todayOffset-(el.clientWidth/2);
    el.scrollLeft=Math.max(0,targetX);
  },[todayOffset,thisWeek,expanded]);

  return(
    <div className="card" style={{padding:0,overflow:'hidden',marginBottom:12,flexShrink:0}}>
      {/* Top bar */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 16px',borderBottom:'1px solid var(--border)',background:'var(--surface)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span className="label">Timeline do Projeto</span>
          <button onClick={()=>setThisWeek(w=>!w)} className="btn btn-outline" style={{padding:'3px 8px',fontSize:'.7rem',background:thisWeek?'var(--text)':'transparent',color:thisWeek?'white':'var(--muted)',borderColor:thisWeek?'var(--text)':'var(--border)'}}>
            <Icon name="calendar" size={10}/> Esta semana
          </button>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <input value={newTaskName} onChange={e=>setNewTaskName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addTask()}
            placeholder="Nome da tarefa..."
            style={{border:'1px solid var(--border)',borderRadius:7,padding:'5px 10px',fontSize:'.78rem',fontFamily:'Figtree,sans-serif',outline:'none',backgroundColor:'var(--bg)',color:'var(--text)',width:160,transition:'border-color .2s'}}
            onFocus={e=>e.target.style.borderColor='var(--text)'} onBlur={e=>e.target.style.borderColor='var(--border)'}/>
          <button onClick={addTask} className="btn btn-dark" style={{padding:'5px 12px',fontSize:'.78rem'}}><Icon name="plus" size={12}/> Adicionar</button>
        </div>
      </div>

      {/* Grid */}
      <div style={{display:'flex',position:'relative',maxHeight:expanded?2000:180,overflow:'hidden',transition:'max-height .3s ease'}}>
        {/* Left panel */}
        <div style={{width:LEFT_W,flexShrink:0,borderRight:'1px solid var(--border)',zIndex:2,background:'var(--surface)',overflowY:'auto'}}>
          <div style={{height:HEADER_H,borderBottom:'1px solid var(--border)',background:'var(--bg)',display:'flex',alignItems:'flex-end',padding:'0 14px 8px',flexShrink:0}}>
            <span style={{fontSize:'.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--muted)'}}>Tarefa</span>
          </div>
          {visibleTasks.length===0&&(
            <div style={{padding:'28px 16px',textAlign:'center',color:'var(--muted)',fontSize:'.82rem'}}>
              <Icon name="calendar-plus" size={24} style={{display:'block',margin:'0 auto 10px',opacity:.3}}/>
              Adicione tarefas para começar.
            </div>
          )}
          {visibleTasks.map(t=>{
            const colors=GANTT_COLORS[t.status]||GANTT_COLORS['Pendente'];
            const isSelected=selectedId===t.id;
            return(
              <div key={t.id} onClick={()=>isSelected?(setSelectedId(null),setEditDraft(null)):selectTask(t)}
                style={{height:ROW_H,display:'flex',alignItems:'center',gap:8,padding:'0 14px',borderBottom:'1px solid var(--border)',cursor:'pointer',
                  background:isSelected?'rgba(28,25,23,.05)':'transparent',transition:'background .15s'}}>
                <button onClick={e=>{e.stopPropagation();cycleStatus(t.id);}} style={{width:12,height:12,borderRadius:'50%',background:colors.dot,border:'none',cursor:'pointer',flexShrink:0,padding:0,transition:'transform .15s'}}
                  title={`Status: ${t.status}`} onMouseEnter={e=>e.currentTarget.style.transform='scale(1.4)'} onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}/>
                <span style={{fontSize:'.83rem',fontWeight:500,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                  textDecoration:t.status==='Concluído'?'line-through':'none',color:t.status==='Concluído'?'var(--muted)':'var(--text)'}}>{t.text}</span>
              </div>
            );
          })}
        </div>

        {/* Scrollable chart */}
        <div ref={scrollRef} style={{flex:1,overflowX:'auto',overflowY:'auto',position:'relative'}}>
          <div style={{width:gridW,position:'relative',minWidth:'100%'}}>
            {/* Month row */}
            <div style={{height:HEADER_H/2,display:'flex',borderBottom:'1px solid var(--border)',background:'var(--bg)'}}>
              {months.map((m,i)=>(
                <div key={i} style={{width:m.days*DAY_W,flexShrink:0,borderRight:'1px solid var(--border)',display:'flex',alignItems:'center',padding:'0 10px',
                  fontSize:'.68rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--muted)'}}>
                  {m.label}
                </div>
              ))}
            </div>
            {/* Week sub-header */}
            <div style={{height:HEADER_H/2,background:'var(--bg)',borderBottom:'2px solid var(--border)',position:'relative'}}>
              {weekMarkers.map((mk,i)=>(
                <div key={i} style={{position:'absolute',left:mk.offset,height:'100%',display:'flex',alignItems:'center',paddingLeft:5,
                  fontSize:'.62rem',color:'var(--muted)',borderLeft:'1px solid var(--border)'}}>
                  {mk.label}
                </div>
              ))}
              {weekendCols.map(d=>{
                const dt=new Date(chartStart+'T12:00:00');dt.setDate(dt.getDate()+d);
                const lbl=dt.getDay()===0?'Dom':'Sáb';
                return <div key={'wl'+d} style={{position:'absolute',left:d*DAY_W,width:DAY_W,height:'100%',display:'flex',alignItems:'center',justifyContent:'center',
                  fontSize:'.55rem',fontWeight:700,color:'var(--muted)',opacity:.7,pointerEvents:'none',letterSpacing:'.03em'}}>{lbl}</div>;
              })}
            </div>

            {/* Weekend columns */}
            {weekendCols.map(d=>(
              <div key={'we'+d} style={{position:'absolute',left:d*DAY_W,top:0,bottom:0,width:DAY_W,background:'rgba(28,25,23,.045)',pointerEvents:'none',zIndex:0}}/>
            ))}

            {/* Task rows */}
            {visibleTasks.map((t,i)=>{
              const{left,width}=barGeom(t);
              const colors=GANTT_COLORS[t.status]||GANTT_COLORS['Pendente'];
              const isSelected=selectedId===t.id;
              return(
                <div key={t.id} style={{height:ROW_H,position:'relative',borderBottom:'1px solid var(--border)',background:i%2===0?'transparent':'rgba(28,25,23,.015)'}}>
                  {/* Day-by-day grid lines — subtle for each day, stronger at week boundaries */}
                  {Array.from({length:totalDays+1},(_,d)=>(
                    <div key={'d'+d} style={{position:'absolute',left:d*DAY_W,top:0,bottom:0,borderLeft:d%7===0?'1px dashed var(--border)':'1px solid var(--border)',opacity:d%7===0?.55:.15,pointerEvents:'none'}}/>
                  ))}
                  {/* Bar */}
                  <div
                    onMouseDown={e=>startDrag(e,t.id,'move')}
                    onClick={e=>{e.stopPropagation();isSelected?(setSelectedId(null),setEditDraft(null)):selectTask(t);}}
                    title={`${t.text}\n${fmtShort(t.startDate)} \u2192 ${fmtShort(t.dueDate)}`}
                    style={{
                      position:'absolute',left,width,height:28,top:(ROW_H-28)/2,
                      background:colors.bar,border:`1.5px solid ${isSelected?'var(--text)':colors.border}`,borderRadius:7,
                      cursor:'grab',display:'flex',alignItems:'center',
                      boxShadow:isSelected?'0 0 0 2px var(--text)':'0 1px 4px rgba(28,25,23,.09)',
                      userSelect:'none',transition:'box-shadow .15s,border-color .15s',
                    }}>
                    {/* Left resize */}

// - PROJECT DETAIL -

// Auto-mark tasks as Atrasado if past their dueDate and not Concluído
const applyAutoLate=tasks=>{
  const today=new Date();today.setHours(0,0,0,0);
  return (tasks||[]).map(t=>{
    if(t.status==='Concluído')return t;
    if(!t.dueDate)return t;
    const due=new Date(t.dueDate);due.setHours(0,0,0,0);
    if(due<today&&t.status!=='Atrasado')return{...t,status:'Atrasado'};
    return t;
  });
};

const ProjectDetail=React.memo(({project,onBack,onUpdate,onSoftDelete,globalMentors,onAddGlobalMentor,isMobile})=>{
  const [local,setLocal]=useState(()=>{
    const tasks=applyAutoLate(project.projectTasks);
    return{...project,projectTasks:tasks};
  });
  const [tab,setTab]=useState('Visão Geral');
  const [showTimelineModal,setShowTimelineModal]=useState(false);
  const coverRef=useRef();

  const projectRef=useRef(project);
  // On mount: persist auto-late status changes back to parent
  useEffect(()=>{
    const original=project.projectTasks||[];
    const updated=applyAutoLate(original);
    const changed=updated.some((t,i)=>t.status!==original[i]?.status);
    if(changed)onUpdate({...project,projectTasks:updated});
  },[]);// runs once on mount
  useEffect(()=>{
    // Only update local if the project changed externally (not from our own upd())
    if(projectRef.current!==project){
      const updated={...project,projectTasks:applyAutoLate(project.projectTasks)};
      setLocal(updated);
      projectRef.current=project;
    }
  },[project]);

  // Safe update — defers onUpdate to avoid calling parent setter inside child setState
  const _pendingUpdate=useRef(null);
  const upd=(field,value)=>{
    setLocal(prev=>{
      const updated={...prev,[field]:value};
      projectRef.current=updated;
      _pendingUpdate.current=updated;
      return updated;
    });
  };

    if(_pendingUpdate.current){

// - GALLERY -
const DEFAULT_GALLERY_FOLDERS=[
  {id:'work',label:'Work',deleted:false},
  {id:'movie-studies',label:'Movie Studies',deleted:false},
  {id:'sketchbooks',label:'Sketchbook',deleted:false},
  {id:'gestures',label:'Gesture',deleted:false},
];
const Gallery=React.memo(({posts,setPosts,folders,setFolders,isMobile})=>{
  const liveFolders=useMemo(()=>(folders||DEFAULT_GALLERY_FOLDERS).filter(f=>!f.deleted),[folders]);
  const trashedFolders=useMemo(()=>(folders||DEFAULT_GALLERY_FOLDERS).filter(f=>f.deleted),[folders]);
  const FOLDERS=liveFolders;
  const [activeFolder,setActiveFolder]=useState(()=>(liveFolders[0]||{id:'work'}).id);
  const [folderTrash,setFolderTrash]=useState(false);
  const [editingFolderId,setEditingFolderId]=useState(null);

  const folderDragRef=useRef(null);

  const [lightbox,setLightbox]=useState(null);

  const addFolder=()=>{const n={id:'folder-'+Date.now(),label:'Nova Pasta',deleted:false};setFolders(p=>[...(p||[]),n]);setActiveFolder(n.id);setEditingFolderId(n.id);setEditingLabel(n.label);};
  const renameFolder=(id,label)=>{if(label.trim())setFolders(p=>p.map(f=>f.id===id?{...f,label:label.trim()}:f));};
  const trashFolder=id=>{setFolders(p=>p.map(f=>f.id===id?{...f,deleted:true}:f));if(activeFolder===id){const next=liveFolders.find(f=>f.id!==id);setActiveFolder(next?.id||'');}};
  const restoreFolder=id=>setFolders(p=>p.map(f=>f.id===id?{...f,deleted:false}:f));
  const hardDeleteFolder=id=>{if(window.confirm('Excluir pasta permanentemente?'))setFolders(p=>p.filter(f=>f.id!==id));};
  const reorderFolders=(from,to)=>{if(from===to)return;setFolders(prev=>{const live=prev.filter(f=>!f.deleted);const dead=prev.filter(f=>f.deleted);const next=[...live];const[m]=next.splice(from,1);next.splice(to,0,m);return[...next,...dead];});};

  const [trash,setTrash]=useState(false);
  const [uploading,setUploading]=useState(false);
  const addImgRef=useRef();
  const active=useMemo(()=>posts.filter(p=>trash?p.deleted:(!p.deleted&&p.folder===activeFolder)),[posts,trash,activeFolder]);
  const grouped=useMemo(()=>active.reduce((acc,p)=>{const key=new Date(p.date).toLocaleString('pt-BR',{month:'long',year:'numeric'});if(!acc[key])acc[key]=[];acc[key].push(p);return acc;},{}),[active]);
  const upd=(field,value)=>{
    const updated={...selected,[field]:value};
    setSelected(updated);
    setPosts(prev=>prev.map(p=>p.id===updated.id?updated:p));

  const [uploadProgress,setUploadProgress]=useState(null); // {done,total}|null
  const handleAddImages=async e=>{
    const files=Array.from(e.target.files);

    setUploadProgress({done:0,total:files.length});

    setUploadProgress(null);
    setUploading(false);
    const merged=[...(selected.images||[]),...urls];
    upd('images',merged);
    e.target.value='';
  };
  const removeImg=idx=>{const imgs=[...selected.images];imgs.splice(idx,1);upd('images',imgs);};
  const softDelete=id=>setPosts(p=>p.map(x=>x.id===id?{...x,deleted:true}:x));
  const restore=id=>setPosts(p=>p.map(x=>x.id===id?{...x,deleted:false}:x));
  const hardDelete=id=>{if(window.confirm('Excluir permanentemente?')){setPosts(p=>p.filter(x=>x.id!==id));}};

  // Keyboard escape for lightbox
  useEffect(()=>{
    if(!lightbox)return;
    const handleKeyDown=e=>{if(e.key==='Escape')setLightbox(null);};

    return()=>document.removeEventListener('keydown',handleKeyDown);
  },[lightbox]);


  if(lightbox)return(
    <div className="lightbox" onClick={()=>setLightbox(null)}>
      <Img src={lightbox} onClick={e=>e.stopPropagation()} alt="" style={{maxWidth:'90vw',maxHeight:'90vh',objectFit:'contain',borderRadius:8}}/>

              {!isVideoSrc(img)&&<button onClick={e=>{e.stopPropagation();upd('bannerImage',img);}} title="Usar como banner"

                <Icon name="star" size={11} style={{fill:selected.bannerImage===img?'white':'none'}}/></button>}
            </div>
          ))}
          <div className="upload-zone" style={{aspectRatio:'16/9',minHeight:0,opacity:uploading?.6:1,pointerEvents:uploading?'none':'auto'}} onClick={()=>addImgRef.current.click()}>
            <Icon name={uploading?'loader':'plus'} size={20} style={{marginBottom:6}}/><span style={{fontSize:'.75rem'}}>{uploadProgress?`${uploadProgress.done}/${uploadProgress.total} enviando...`:uploading?'Enviando...':'Adicionar'}</span>
          </div>
          {uploadProgress&&uploadProgress.total>1&&(
            <div style={{marginTop:8}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:'.72rem',color:'var(--muted)',marginBottom:4}}>
                <span>Enviando para nuvem...</span>
                <span>{Math.round(uploadProgress.done/uploadProgress.total*100)}%</span>
              </div>
              <div style={{height:4,background:'var(--border)',borderRadius:2}}>
                <div style={{height:'100%',background:'var(--text)',borderRadius:2,transition:'width .3s',width:`${Math.round(uploadProgress.done/uploadProgress.total*100)}%`}}/>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );

  return(<>
    <div className="fade-up" style={{maxWidth:'100%',boxSizing:'border-box',height:isMobile?'auto':'calc(100vh - clamp(32px,5vh,80px))',display:'flex',flexDirection:'column',overflowY:isMobile?'visible':'auto',paddingBottom:isMobile?0:24}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:isMobile?'center':'flex-end',marginBottom:isMobile?10:14,gap:10,flexWrap:'wrap',flexShrink:0}}>
        <div><h1 className="serif" style={{fontSize:isMobile?'1.75rem':'clamp(1.6rem,2.8vh,2.6rem)',fontWeight:300,letterSpacing:'-0.02em',marginBottom:2}}>Galeria</h1>

        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>{setTrash(!trash);setSelected(null);}} className={`btn ${trash?'btn-danger':'btn-outline'}`}>
            <Icon name="trash-2" size={13}/>{trash?'Sair':'Lixeira'}{!trash&&posts.filter(p=>p.deleted).length>0&&` (${posts.filter(p=>p.deleted).length})`}
          </button>
          {!trash&&<button className="btn btn-dark" onClick={()=>{const n={id:Date.now(),folder:activeFolder,title:"Novo Estudo",date:new Date().toISOString().slice(0,10),content:"",images:[],deleted:false};setPosts([n,...posts]);setSelected(n);}}><Icon name="plus" size={14}/> Criar</button>}
        </div>
      </div>
      {trash&&<TrashBanner label="Galeria" onExit={()=>setTrash(false)}/>}
      {/* Tab bar with folder trash toggle */}
      {!trash&&(
        <div style={{display:'flex',alignItems:'stretch',borderBottom:'1px solid var(--border)',marginBottom:'clamp(10px,1.5vh,18px)',flexShrink:0,gap:0,overflowX:'auto'}}>
          {liveFolders.map((f,idx)=>(
            <div key={f.id}
              className="drag-item"
              draggable
              onDragStart={e=>{e.dataTransfer.effectAllowed='move';folderDragRef.current=idx;e.currentTarget.style.opacity='0.45';}}
              onDragEnd={e=>{e.currentTarget.style.opacity='1';folderDragRef.current=null;document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));}}
              onDragOver={e=>{e.preventDefault();e.currentTarget.classList.add('drag-over');}}
              onDragLeave={e=>{e.currentTarget.classList.remove('drag-over');}}
              onDrop={e=>{e.preventDefault();e.currentTarget.classList.remove('drag-over');if(folderDragRef.current!=null&&folderDragRef.current!==idx){reorderFolders(folderDragRef.current,idx);folderDragRef.current=null;}}}
              style={{display:'flex',alignItems:'center',gap:4,paddingRight:2,marginRight:4,borderBottom:activeFolder===f.id?'2px solid var(--text)':'2px solid transparent',marginBottom:-1}}
            >
              <Icon name="grip-vertical" size={11} className="drag-handle" style={{color:'var(--muted)',opacity:0,transition:'opacity .12s'}}
                onMouseEnter={e=>e.currentTarget.style.opacity='1'} onMouseLeave={e=>e.currentTarget.style.opacity='0'}/>
              {editingFolderId===f.id
                ? <input autoFocus value={editingLabel} onChange={e=>setEditingLabel(e.target.value)}
                    onBlur={()=>{renameFolder(f.id,editingLabel);setEditingFolderId(null);}}
                    onKeyDown={e=>{if(e.key==='Enter'||e.key==='Escape'){renameFolder(f.id,editingLabel);setEditingFolderId(null);}}}
                    style={{background:'transparent',border:'none',outline:'none',fontFamily:'Figtree,sans-serif',fontSize:'.85rem',fontWeight:activeFolder===f.id?600:500,color:'var(--text)',width:Math.max(60,editingLabel.length*9)+'px',padding:'10px 0'}}
                  />
                : <button className="tab-btn" onClick={()=>setActiveFolder(f.id)}
                    onDoubleClick={()=>{setEditingFolderId(f.id);setEditingLabel(f.label);}}
                    style={{color:activeFolder===f.id?'var(--text)':'var(--muted)',borderBottom:'none',margin:0,padding:'10px 6px 10px 2px',whiteSpace:'nowrap',userSelect:'none'}}
                  >{f.label}</button>
              }
              <button onClick={()=>trashFolder(f.id)} title="Mover para lixeira"
                style={{background:'none',border:'none',cursor:'pointer',color:'var(--muted)',padding:'2px 3px',borderRadius:4,opacity:0,transition:'opacity .12s',lineHeight:0}}
                onMouseEnter={e=>e.currentTarget.style.opacity='1'} onMouseLeave={e=>e.currentTarget.style.opacity='0'}
              ><Icon name="x" size={11}/></button>
            </div>
          ))}
          <button onClick={addFolder} className="tab-btn"
            style={{color:'var(--muted)',borderBottom:'2px solid transparent',marginBottom:-1,padding:'10px 10px',whiteSpace:'nowrap',opacity:.6}}
            title="Nova pasta"><Icon name="plus" size={13}/></button>
          {trashedFolders.length>0&&(
            <button onClick={()=>setFolderTrash(t=>!t)} className="tab-btn"
              style={{color:folderTrash?'var(--text)':'var(--muted)',borderBottom:folderTrash?'2px solid var(--text)':'2px solid transparent',marginBottom:-1,marginLeft:'auto',padding:'10px 10px',whiteSpace:'nowrap',fontSize:'.75rem'}}
            ><Icon name="trash-2" size={12}/> {trashedFolders.length}</button>
          )}
        </div>
      )}
      {/* Trashed folders panel */}
      {folderTrash&&!trash&&(
        <div style={{background:'var(--bg)',borderRadius:10,padding:'12px 16px',marginBottom:16,display:'flex',flexWrap:'wrap',gap:8,alignItems:'center'}}>
          <span style={{fontSize:'.75rem',color:'var(--muted)',fontWeight:600,marginRight:4}}>Pastas na lixeira</span>
          {trashedFolders.map(f=>(
            <div key={f.id} style={{display:'flex',alignItems:'center',gap:4,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:20,padding:'3px 10px',fontSize:'.78rem'}}>
              <span style={{color:'var(--text)'}}>{f.label}</span>
              <button onClick={()=>restoreFolder(f.id)} title="Restaurar" style={{background:'none',border:'none',cursor:'pointer',color:'var(--muted)',lineHeight:0,padding:'0 2px'}}><Icon name="refresh-cw" size={11}/></button>
              <button onClick={()=>hardDeleteFolder(f.id)} title="Excluir" style={{background:'none',border:'none',cursor:'pointer',color:'#991B1B',lineHeight:0,padding:'0 2px'}}><Icon name="trash-2" size={11}/></button>
            </div>
          ))}
        </div>
      )}
      {Object.keys(grouped).length===0&&<div style={{textAlign:'center',padding:isMobile?40:60,color:'var(--muted)',fontSize:'.9rem'}}><Icon name="image" size={28} style={{display:'block',margin:'0 auto 12px',opacity:.3}}/>{trash?'Lixeira vazia.':'Pasta vazia.'}</div>}
      {Object.entries(grouped).map(([month,monthPosts])=>(
        <div key={month} style={{marginBottom:isMobile?16:'clamp(16px,3vh,36px)'}}>
          <div style={{borderBottom:'1px solid var(--border)',paddingBottom:8,marginBottom:16}}><span className="label">{month}</span></div>
          <div style={{display:'grid',gridTemplateColumns:isMobile?'repeat(2,1fr)':'repeat(4,1fr)',gap:isMobile?10:14}}>
            {monthPosts.map(post=>(
              <div key={post.id} className="card" style={{overflow:'hidden',cursor:trash?'default':'pointer'}} onClick={()=>!trash&&setSelected(post)}>
                <div className="cover-wrap" style={{aspectRatio:'16/9',overflow:'hidden',backgroundColor:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center',position:'relative'}}>
                  {post.images.length>0
                    ?(()=>{const src=post.bannerImage||(post.images[0]||post.images[post.images.length-1]);
                      return isVideoSrc(src)
                        ?<><Vid src={src} muted playsInline loop preload="metadata" style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}
                            onMouseEnter={e=>{try{e.target.play();}catch{}}} onMouseLeave={e=>{try{e.target.pause();e.target.currentTime=0;}catch{}}}/>
                          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
                            <div style={{width:32,height:32,borderRadius:'50%',background:'rgba(0,0,0,.45)',display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(2px)'}}>
                              <Icon name="play" size={14} style={{color:'white',marginLeft:2}}/></div></div></>
                        :<Img src={src} className={trash?'':'img-zoom'} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
                    ;})()
                    :<Icon name="image" size={28} style={{opacity:.2}}/>}
                </div>
                <div style={{padding:'12px 14px'}}>
                  <div style={{fontWeight:600,fontSize:'.82rem',marginBottom:2}}>{post.title}</div>
                  <div style={{fontSize:'.72rem',color:'var(--muted)',marginBottom:trash?8:0}}>{post.date}</div>
                  {trash&&(
                    <div style={{display:'flex',gap:5}}>
                      <button onClick={e=>{e.stopPropagation();restore(post.id);}} className="btn btn-outline" style={{flex:1,justifyContent:'center',padding:'4px 0',fontSize:'.72rem'}}><Icon name="undo-2" size={10}/> Restaurar</button>
                      <button onClick={e=>{e.stopPropagation();hardDelete(post.id);}} className="btn btn-danger" style={{flex:1,justifyContent:'center',padding:'4px 0',fontSize:'.72rem'}}><Icon name="trash-2" size={10}/> Excluir</button>
                    </div>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  </>);
});

// - IDEAS -
const IdeasLab=React.memo(({notes,setNotes,noteGroups,setNoteGroups,isMobile})=>{
  // ── STATE ──
  const [selectedId,setSelectedId]=useState(null);
  const [showTrash,setShowTrash]=useState(false);
  const [showCreateMenu,setShowCreateMenu]=useState(false);
  // Close dropdown on Escape or click outside
  useEffect(()=>{
    if(!showCreateMenu)return;
    const close=e=>{if(e.key==='Escape')setShowCreateMenu(false);};
    const clickOut=()=>setShowCreateMenu(false);
    document.addEventListener('keydown',close);
    // Delay to avoid catching the click that opened the menu
    const t=setTimeout(()=>document.addEventListener('click',clickOut),0);
    return()=>{document.removeEventListener('keydown',close);clearTimeout(t);document.removeEventListener('click',clickOut);};
  },[showCreateMenu]);
  const {start:dStart,over:dOver,drop:dDrop,end:dEnd,dragId:dDragId,overId:dOverId}=useDragReorder(setNotes);

  // note fields
  const [localTitle,setLocalTitle]=useState('');
  const [localContent,setLocalContent]=useState('');
  const flushTitleRef=useRef(null);
  const flushContentRef=useRef(null);
  const contentAreaRef=useRef(null);
  const newNoteCooldownRef=useRef(0);
  const dragIdxRef=useRef(null);
  const reorderNotes=(from,to)=>{
    if(from===to)return;
    setNotes(prev=>{
      const live=prev.filter(n=>!n.deleted);
      const dead=prev.filter(n=>n.deleted);
      const next=[...live];const[m]=next.splice(from,1);next.splice(to,0,m);
      return[...next,...dead];
    });
  };

  // entry fields
  const [activeEntryId,setActiveEntryId]=useState(null);
  const [entryTitle,setEntryTitle]=useState('');
  const [entryContent,setEntryContent]=useState('');
  const flushEntryTitleRef=useRef(null);
  const flushEntryContentRef=useRef(null);
  const entryAreaRef=useRef(null);

  // ── DERIVED ──
  const allItems=useMemo(()=>notes.filter(n=>!n.deleted),[notes]);
  const trashed=useMemo(()=>notes.filter(n=>n.deleted),[notes]);
  const selectedItem=useMemo(()=>notes.find(n=>n.id===selectedId)||null,[notes,selectedId]);
  const isGroup=selectedItem?.type==='project';
  const activeEntry=useMemo(()=>isGroup?(selectedItem?.entries||[]).find(e=>e.id===activeEntryId)||null:null,[selectedItem,activeEntryId,isGroup]);

  // ── SYNC NOTE ──
  useEffect(()=>{
    clearTimeout(flushTitleRef.current);clearTimeout(flushContentRef.current);
    if(selectedItem&&!isGroup){setLocalTitle(selectedItem.title);setLocalContent(selectedItem.content||'');}
  },[selectedId]);

  useEffect(()=>{
    if(contentAreaRef.current){contentAreaRef.current.style.height='auto';contentAreaRef.current.style.height=contentAreaRef.current.scrollHeight+'px';}
  },[localContent,selectedId]);

  // ── SYNC ENTRY ──
  useEffect(()=>{
    clearTimeout(flushEntryTitleRef.current);clearTimeout(flushEntryContentRef.current);
    if(activeEntry){setEntryTitle(activeEntry.title);setEntryContent(activeEntry.content||'');}
    else{setEntryTitle('');setEntryContent('');}
  },[activeEntryId]);

  useEffect(()=>{
    if(entryAreaRef.current){entryAreaRef.current.style.height='auto';entryAreaRef.current.style.height=entryAreaRef.current.scrollHeight+'px';}
  },[entryContent,activeEntryId]);

  // ── NOTE HANDLERS ──
  const flushNote=(field,value)=>setNotes(p=>p.map(n=>n.id===selectedId?{...n,[field]:value}:n));
  const handleTitleChange=e=>{const v=e.target.value;setLocalTitle(v);clearTimeout(flushTitleRef.current);flushTitleRef.current=setTimeout(()=>flushNote('title',v),1200);};
  const handleContentChange=e=>{
    const v=e.target.value;setLocalContent(v);
    if(e.target){e.target.style.height='auto';e.target.style.height=e.target.scrollHeight+'px';}
    clearTimeout(flushContentRef.current);flushContentRef.current=setTimeout(()=>flushNote('content',v),1200);
  };
  const handleNoteBlur=(field,value)=>{clearTimeout(field==='title'?flushTitleRef.current:flushContentRef.current);flushNote(field,value);};

  const newNote=()=>{
    const n={id:Date.now(),type:'note',title:'Nova Nota',content:'',date:new Date().toLocaleDateString('pt-BR'),deleted:false};
    newNoteCooldownRef.current=Date.now();setNotes(p=>[n,...p]);setSelectedId(n.id);setShowCreateMenu(false);
  };
  const trashItem=id=>{
    if(Date.now()-newNoteCooldownRef.current<600)return;
    setNotes(p=>p.map(n=>n.id===id?{...n,deleted:true}:n));
    if(selectedId===id)setSelectedId(null);
  };
  const restoreItem=id=>setNotes(p=>p.map(n=>n.id===id?{...n,deleted:false}:n));
  const hardDeleteItem=id=>{if(window.confirm('Excluir permanentemente?')){setNotes(p=>p.filter(n=>n.id!==id));if(selectedId===id)setSelectedId(null);}};

  // ── GROUP HANDLERS ──
  const updProj=(id,fn)=>setNotes(p=>p.map(n=>n.id===id&&n.type==='project'?fn(n):n));
  const flushEntry=(field,value)=>{
    if(!selectedId||!activeEntryId)return;
    updProj(selectedId,proj=>({...proj,entries:(proj.entries||[]).map(e=>e.id===activeEntryId?{...e,[field]:value}:e)}));
  };
  const handleEntryTitleChange=e=>{const v=e.target.value;setEntryTitle(v);clearTimeout(flushEntryTitleRef.current);flushEntryTitleRef.current=setTimeout(()=>flushEntry('title',v),1200);};
  const handleEntryContentChange=e=>{
    const v=e.target.value;setEntryContent(v);
    if(e.target){e.target.style.height='auto';e.target.style.height=e.target.scrollHeight+'px';}

              <button onClick={()=>hardDeleteItem(n.id)} className="btn btn-danger" style={{padding:'4px 8px',fontSize:'.73rem'}}><Icon name="trash-2" size={10}/></button>

      )}

});
// - SOCIAL -
const SOCIAL_PLATFORMS=['Instagram','LinkedIn','Twitter/X','TikTok','YouTube','Behance'];

const Social=React.memo(({posts,setPosts,isMobile})=>{
  const [text,setText]=useState('');
  const [platform,setPlatform]=useState('Instagram');
  const [editId,setEditId]=useState(null);
  const [trash,setTrash]=useState(false);
  const [templates,setTemplates]=useState(()=>{
    try{const s=localStorage.getItem('boardhub_social_templates');return s?JSON.parse(s):socialTemplates;}catch{return socialTemplates;}
  });
  const [editingTpl,setEditingTpl]=useState(null); // {index,label,text} or {index:-1,...} for new
  const saveTemplates=t=>{setTemplates(t);try{localStorage.setItem('boardhub_social_templates',JSON.stringify(t));}catch{}};

  const activePosts=posts.filter(p=>!p.deleted);
  const trashedPosts=posts.filter(p=>p.deleted);

  const savePost=()=>{
    if(!text.trim())return;
    if(editId){setPosts(p=>p.map(x=>x.id===editId?{...x,text,platform}:x));setEditId(null);}
    else setPosts(p=>[{id:Date.now(),text,date:new Date().toLocaleDateString('pt-BR'),platform,deleted:false},...p]);
    setText('');setPlatform('Instagram');
  };
  const startEdit=p=>{setText(p.text);setPlatform(p.platform||'Instagram');setEditId(p.id);setTrash(false);};
  const cancelEdit=()=>{setText('');setEditId(null);setPlatform('Instagram');};
  const softDelete=id=>setPosts(p=>p.map(x=>x.id===id?{...x,deleted:true}:x));
  const restore=id=>setPosts(p=>p.map(x=>x.id===id?{...x,deleted:false}:x));
  const hardDelete=id=>{if(window.confirm('Excluir permanentemente?')){setPosts(p=>p.filter(x=>x.id!==id));}};
  const changePostPlatform=(id,pl)=>setPosts(p=>p.map(x=>x.id===id?{...x,platform:pl}:x));
  const displayed=trash?trashedPosts:activePosts;

  // Template modal
  const openNewTpl=()=>setEditingTpl({index:-1,label:'',text:''});

    if(!editingTpl.label.trim())return;
    const next=[...templates];
    if(editingTpl.index===-1)next.push({label:editingTpl.label,text:editingTpl.text});
    else next[editingTpl.index]={label:editingTpl.label,text:editingTpl.text};
    saveTemplates(next);setEditingTpl(null);
  };
  const deleteTpl=i=>{const next=templates.filter((_,idx)=>idx!==i);saveTemplates(next);};

  const platformColor=pl=>({Instagram:'#833AB4',LinkedIn:'#0A66C2','Twitter/X':'#000000',TikTok:'#010101',YouTube:'#FF0000',Behance:'#053EFF'}[pl]||'var(--text)');

  return(

      {/* Template edit modal */}
      {editingTpl&&(
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setEditingTpl(null)}>
          <div className="modal" style={{maxWidth:480}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <h2 className="serif" style={{fontSize:'1.5rem',fontWeight:400,margin:0}}>{editingTpl.index===-1?'Novo Template':'Editar Template'}</h2>
              <button className="btn btn-ghost" onClick={()=>setEditingTpl(null)} style={{padding:6}}><Icon name="x" size={18}/></button>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <Field label="Nome do template">
                <input className="input-box" value={editingTpl.label} onChange={e=>setEditingTpl(t=>({...t,label:e.target.value}))} placeholder="Ex: Bastidores"/>
              </Field>
              <Field label="Texto">
                <textarea className="input-box" rows={6} value={editingTpl.text} onChange={e=>setEditingTpl(t=>({...t,text:e.target.value}))} placeholder="Escreva o template..." style={{resize:'vertical',lineHeight:1.7}}/>
              </Field>
              <div style={{display:'flex',justifyContent:'flex-end',gap:8}}>
                <button className="btn btn-outline" onClick={()=>setEditingTpl(null)}>Cancelar</button>

            </div>

        <button onClick={()=>{setTrash(!trash);cancelEdit();}} className={`btn ${trash?'btn-danger':'btn-outline'}`}>

            </div>}
            <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="Escreva seu post..." style={{flex:1,minHeight:180,resize:'none',background:'transparent',border:'none',outline:'none',fontSize:'.95rem',fontFamily:'Figtree,sans-serif',lineHeight:1.8,color:'var(--text)',width:'100%',boxSizing:'border-box'}}/>
            <div style={{borderTop:'1px solid var(--border)',paddingTop:12,marginTop:8,display:'flex',flexDirection:'column',gap:10}}>
              {/* Platform selector */}
              {isMobile?(
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span className="label" style={{flexShrink:0}}>Plataforma</span>
                  <select value={platform} onChange={e=>setPlatform(e.target.value)}

                    {SOCIAL_PLATFORMS.map(pl=><option key={pl}>{pl}</option>)}
                  </select>
                </div>
              ):(
                <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap',paddingBottom:0}}>
                  <span className="label" style={{flexShrink:0}}>Plataforma</span>
                  {SOCIAL_PLATFORMS.map(pl=>(
                    <button key={pl} onClick={()=>setPlatform(pl)}
                      style={{padding:'5px 12px',borderRadius:20,border:`1px solid ${platform===pl?platformColor(pl):'var(--border)'}`,background:platform===pl?platformColor(pl):'transparent',color:platform===pl?'white':'var(--muted)',fontSize:'.74rem',fontWeight:600,cursor:'pointer',fontFamily:'Figtree,sans-serif',transition:'all .15s',flexShrink:0,whiteSpace:'nowrap'}}>
                      {pl}
                    </button>
                  ))}
                </div>
              )}
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:isMobile?'wrap':'nowrap',gap:isMobile?8:0}}>
                <span style={{fontSize:'.75rem',color:'var(--muted)'}}>{text.length} caracteres</span>
                <button className="btn btn-dark" onClick={savePost} disabled={!text.trim()} style={{opacity:text.trim()?1:.5,width:isMobile?'100%':'auto',justifyContent:isMobile?'center':'flex-start'}}><Icon name={editId?'check':'save'} size={13}/> {editId?'Atualizar':'Salvar Post'}</button>
              </div>
            </div>
          </div>
          {/* Templates */}
          <div style={{minWidth:0,overflow:'hidden'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
              <span className="label">Templates</span>
              <button className="btn btn-ghost" style={{padding:'3px 8px',fontSize:'.72rem',gap:4}} onClick={openNewTpl}><Icon name="plus" size={12}/> Novo</button>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {templates.map((t,i)=>(
                <div key={i} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 14px',transition:'border-color .15s',position:'relative',minWidth:0,overflow:'hidden'}}

                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
                    <button onClick={()=>setText(t.text)} style={{fontWeight:600,fontSize:'.82rem',background:'none',border:'none',cursor:'pointer',fontFamily:'Figtree,sans-serif',color:'var(--text)',padding:0,textAlign:'left'}}>{t.label}</button>
                    <div style={{display:'flex',gap:2,flexShrink:0}}>
                      <button className="btn btn-ghost" style={{padding:'2px 5px'}} onClick={()=>openEditTpl(i)} title="Editar"><Icon name="pencil" size={12}/></button>
                      <button className="btn btn-ghost text-link-danger" style={{padding:'2px 5px'}} onClick={()=>deleteTpl(i)} title="Excluir"><Icon name="x" size={12}/></button>

      {displayed.length>0&&(
        <div style={{width:'100%',minWidth:0}}>
          <span className="label" style={{display:'block',marginBottom:16}}>{trash?'Posts na Lixeira':'Posts Salvos'}</span>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {displayed.map(p=>(
              <div key={p.id} className="card" style={{padding:isMobile?'14px 16px':'18px 22px',display:'flex',gap:16,alignItems:'flex-start',flexDirection:'row',width:'100%',boxSizing:'border-box'}}>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{margin:0,fontSize:'.88rem',lineHeight:1.7,color:'var(--text)',whiteSpace:'pre-wrap',wordBreak:'break-word'}}>{p.text}</p>
                  <div style={{marginTop:10,display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                    {/* Platform badge - clickable when not in trash */}
                    {!trash?(
                      isMobile?(
                        <select value={p.platform||'Instagram'} onChange={e=>changePostPlatform(p.id,e.target.value)}
                          style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:20,padding:'4px 10px',fontFamily:'Figtree,sans-serif',fontSize:'.78rem',fontWeight:600,color:'var(--text)',outline:'none',cursor:'pointer',maxWidth:'100%'}}>

                      ):(
                        <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                          {SOCIAL_PLATFORMS.map(pl=>(
                            <button key={pl} onClick={()=>changePostPlatform(p.id,pl)}

                              {pl}
                            </button>

                        </div>
                      )
                    ):(
                      <span style={{fontSize:'.75rem',fontWeight:600,padding:'2px 9px',borderRadius:20,background:'var(--bg)',color:'var(--muted)',border:'1px solid var(--border)'}}>{p.platform||'Instagram'}</span>
                    )}
                    <span style={{fontSize:'.72rem',color:'var(--muted)'}}>{p.date}</span>
                  </div>
                </div>
                <div style={{display:'flex',gap:4,flexShrink:0,flexDirection:isMobile&&trash?'column':'row',alignItems:isMobile&&trash?'stretch':'center'}}>
                  {!trash?(
                    <><button className="btn btn-ghost" style={{padding:5}} onClick={()=>startEdit(p)}><Icon name="pencil" size={14}/></button>
                    <button className="btn btn-ghost" style={{padding:5}} onClick={()=>softDelete(p.id)}><Icon name="trash-2" size={14}/></button></>
                  ):(
                    <><button className="btn btn-outline" style={{padding:'4px 10px',fontSize:'.78rem'}} onClick={()=>restore(p.id)}><Icon name="undo-2" size={12}/>{isMobile?' Restaurar':' Restaurar'}</button>
                    <button className="btn btn-danger" style={{padding:'4px 10px',fontSize:'.78rem'}} onClick={()=>hardDelete(p.id)}><Icon name="trash-2" size={12}/>{isMobile?' Excluir':' Excluir'}</button></>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
      {trash&&trashedPosts.length===0&&<div style={{textAlign:'center',padding:40,color:'var(--muted)',fontSize:'.85rem'}}>Lixeira vazia.</div>}
    </div>
  );
});

// - CLIENT DETAIL -
const ClientDetail=({client,onBack,onSave,onDelete,isMobile})=>{

    <div className="fade-up" style={{maxWidth:'min(680px,100%)',boxSizing:'border-box',height:isMobile?'auto':'calc(100vh - clamp(32px,5vh,80px))',overflowY:isMobile?'visible':'auto'}}>

            onMouseEnter={e=>{const el=e.currentTarget.querySelector('.ch');if(el)el.style.opacity=1;}} onMouseLeave={e=>{const el=e.currentTarget.querySelector('.ch');if(el)el.style.opacity=0;}}>
            {form.photo?<Img src={form.photo} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
              :<span style={{fontFamily:'Cormorant Garamond,serif',fontSize:'1.8rem',fontWeight:500,color:'var(--muted)'}}>{(form.name||'?').charAt(0)}</span>}

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>

          <Field label="Status"><select className="input-box" value={form.status||'Lead'} onChange={e=>set('status',e.target.value)} style={{cursor:'pointer'}}><option>Ativo</option><option>Lead</option><option>Inativo</option><option>Arquivado</option></select></Field>
        </div>
        <Field label="Notas & Histórico"><textarea className="input-box" rows={4} value={form.notes||''} onChange={e=>set('notes',e.target.value)} placeholder="Preferências, histórico de projetos..." style={{resize:'vertical',lineHeight:1.7,minHeight:100}}/></Field>

// - CLIENTS -
const Clients=React.memo(({clients,setClients,isMobile})=>{
  const [selected,setSelected]=useState(null);
  const [trash,setTrash]=useState(false);
  const tagColor=s=>({'Ativo':'tag-green','Lead':'tag-yellow','Inativo':'tag-gray','Arquivado':'tag-gray'}[s]||'tag-gray');
  const save=form=>{setClients(p=>p.map(c=>c.id===form.id?form:c));setSelected(null);};
  const softDelete=()=>{setClients(p=>p.map(c=>c.id===selected.id?{...c,deleted:true}:c));setSelected(null);};
  const restore=id=>setClients(p=>p.map(c=>c.id===id?{...c,deleted:false}:c));
  const hardDelete=id=>{if(window.confirm('Excluir permanentemente?')){setClients(p=>p.filter(c=>c.id!==id));}}
  const add=()=>{const n={id:Date.now(),name:'Novo Cliente',company:'',email:'',role:'',status:'Lead',notes:'',photo:'',deleted:false};setClients(p=>[n,...p]);setSelected(n);};
  const visible=clients.filter(c=>trash?c.deleted:!c.deleted);
  const dragIdxRef=useRef(null);
  const reorderClients=(from,to)=>{
    if(from===to)return;
    setClients(prev=>{
      const live=prev.filter(c=>!c.deleted);
      const dead=prev.filter(c=>c.deleted);
      const next=[...live];const[m]=next.splice(from,1);next.splice(to,0,m);
      return[...next,...dead];
    });
  };
  const dragProps=(idx)=>({
    className:'drag-item',
    draggable:!trash,
    onDragStart:e=>{e.dataTransfer.effectAllowed='move';dragIdxRef.current=idx;e.currentTarget.style.opacity='0.45';},
    onDragEnd:e=>{e.currentTarget.style.opacity='1';dragIdxRef.current=null;document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));},
    onDragOver:e=>{e.preventDefault();e.currentTarget.classList.add('drag-over');},
    onDragLeave:e=>{e.currentTarget.classList.remove('drag-over');},
    onDrop:e=>{e.preventDefault();e.currentTarget.classList.remove('drag-over');if(dragIdxRef.current!=null&&dragIdxRef.current!==idx){reorderClients(dragIdxRef.current,idx);dragIdxRef.current=null;}},
  });
  if(selected&&!trash)return <ClientDetail client={selected} onBack={()=>setSelected(null)} onSave={save} onDelete={softDelete} isMobile={isMobile}/>;
  return(
    <div className="fade-up" style={{maxWidth:'100%',boxSizing:'border-box',height:isMobile?'auto':'calc(100vh - clamp(32px,5vh,80px))',overflowY:isMobile?'visible':'auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:isMobile?'center':'flex-end',marginBottom:isMobile?10:14,gap:10,flexWrap:'wrap'}}>
        <h1 className="serif" style={{fontSize:isMobile?'1.75rem':'clamp(1.6rem,2.8vh,2.6rem)',fontWeight:300,letterSpacing:'-0.02em'}}>Clientes</h1>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>setTrash(!trash)} className={`btn ${trash?'btn-danger':'btn-outline'}`}>
            <Icon name="trash-2" size={13}/>{trash?'Sair':'Lixeira'}{!trash&&clients.filter(c=>c.deleted).length>0&&` (${clients.filter(c=>c.deleted).length})`}
          </button>
          {!trash&&!isMobile&&<button className="btn btn-dark" onClick={add}><Icon name="user-plus" size={14}/> Adicionar</button>}
        </div>
      </div>
      {isMobile&&!trash&&<button className="fab" onClick={add}><Icon name="plus" size={24}/></button>}
      {trash&&<TrashBanner label="Clientes" onExit={()=>setTrash(false)}/>}
      {isMobile&&!trash?(
        <div className="card" style={{overflow:'hidden',borderRadius:12}}>
          {visible.map((c,idx)=>(
            <div key={c.id} {...(trash?{}:dragProps(idx))} className={`compact-row${trash?'':' drag-item'}`} onClick={()=>setSelected(c)}>
              {!trash&&<span className="drag-handle" style={{color:'var(--muted)',marginRight:2,lineHeight:0,flexShrink:0}}><Icon name="grip-vertical" size={12}/></span>}
              {c.photo?<Img src={c.photo} style={{width:44,height:44,borderRadius:'50%',objectFit:'cover',flexShrink:0}}/>
                :<div style={{width:44,height:44,borderRadius:'50%',backgroundColor:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Cormorant Garamond,serif',fontSize:'1.1rem',fontWeight:500,flexShrink:0}}>{c.name.charAt(0)}</div>}
              <div className="compact-row-info">
                <div className="compact-row-title">{c.name}</div>
                <div className="compact-row-meta">{c.role}{c.role&&c.company?' · ':''}{c.company} · <span className={`tag ${tagColor(c.status)}`} style={{display:'inline',padding:'1px 6px',fontSize:'.62rem'}}>{c.status}</span></div>
              </div>
              <Icon name="chevron-right" size={16} style={{color:'var(--muted)',flexShrink:0}}/>
            </div>
          ))}
          {visible.length===0&&<div style={{textAlign:'center',padding:40,color:'var(--muted)'}}>Nenhum cliente.</div>}
        </div>
      ):(
        <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'repeat(3,1fr)',gap:14}}>
        {visible.map((c,idx)=>(
          <div key={c.id} {...(trash?{}:dragProps(idx))} className={`card drag-item`} style={{padding:22,cursor:trash?'default':'pointer',position:'relative'}} onClick={()=>!trash&&setSelected(c)}>
            {!trash&&<span className="drag-handle" style={{position:'absolute',top:8,right:8,color:'var(--muted)',lineHeight:0,zIndex:1}}><Icon name="grip-vertical" size={13}/></span>}
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>

            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',borderTop:c.notes?'none':'1px solid var(--border)',paddingTop:c.notes?0:12}}>
              {!trash?<span className={`tag ${tagColor(c.status)}`}>{c.status}</span>:(
                <div style={{display:'flex',gap:5}}>
                  <button onClick={e=>{e.stopPropagation();restore(c.id);}} className="btn btn-outline" style={{padding:'4px 8px',fontSize:'.75rem'}}><Icon name="refresh-cw" size={11}/></button>
                  <button onClick={e=>{e.stopPropagation();hardDelete(c.id);}} className="btn btn-danger" style={{padding:'4px 8px',fontSize:'.75rem'}}><Icon name="trash-2" size={11}/></button>

              )}

                <Icon name="mail" size={11}/><span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.email}</span>

        ))}
        {visible.length===0&&<div style={{gridColumn:'1/-1',textAlign:'center',padding:48,color:'var(--muted)'}}>{trash?'Lixeira vazia.':'Nenhum cliente.'}</div>}
        </div>
      )}
    </div>
  );
});

// - SYNC HUB -
const SyncHub=React.memo(({appState,onImport,onClearSave,fbUser,syncStatus,isMobile,onResetIdentity})=>{
  const [status,setStatus]=useState(null);
  const [loading,setLoading]=useState(false);
  const [reuploadProgress,setReuploadProgress]=useState(null);
  const importRef=useRef();

  const showStatus=(type,msg)=>{setStatus({type,msg});if(type!=='err')setTimeout(()=>setStatus(null),8000);};
  const localImgCount=collectIdbKeys(appState).size;

  const signIn=async()=>{
    try{
      await initFirebase();
      if(!_fbReady){showStatus('err','Firebase não carregou. Tente de novo em instantes.');return;}
      const provider=new firebase.auth.GoogleAuthProvider();
      await _fbAuth.signInWithPopup(provider);
      showStatus('ok','✓ Conectado! Dados sincronizarão em tempo real entre todos os dispositivos.');
    }catch(e){showStatus('err','Falha no login: '+e.message);}
  };

  const signOut=async()=>{
    if(!window.confirm('Sair? Seus dados continuarão salvos localmente.'))return;
    await _fbAuth.signOut();
    showStatus('ok','Desconectado.');
  };

  const handleManualPush=async()=>{
    if(!fbUser){showStatus('err','Faça login com Google primeiro.');return;}
    setLoading(true);
    try{
      await pushState(appState,fbUser.uid);
      showStatus('ok','✓ Dados enviados!');
    }catch(e){showStatus('err','Falha: '+e.message);}
    finally{setLoading(false);}
  };

  const handleReupload=async()=>{
    const keys=[...collectIdbKeys(appState)];
    if(keys.length===0){showStatus('ok','✓ Nenhuma imagem local — tudo já está na nuvem!');return;}
    if(!fbUser&&!window.confirm(`${keys.length} imagem(ns) local(is). Sem login ativo, serão enviadas ao Imgur. Continuar?`))return;
    setLoading(true);
    setReuploadProgress({done:0,total:keys.length});
    try{
      const updatedState=await reuploadLocalImages(appState,(done,total)=>setReuploadProgress({done,total}));
      onImport(updatedState);
      setReuploadProgress(null);
      showStatus('ok','✓ Imagens enviadas para a nuvem!');
    }catch(e){setReuploadProgress(null);showStatus('err','Falha: '+e.message);}
    finally{setLoading(false);}
  };

  const exportData=async()=>{
    const data=await buildSyncPayload(appState,true);
    const blob=new Blob([data],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`boardhub-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);
  };
  const handleImportFile=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{const data=JSON.parse(ev.target.result);onImport(data);showStatus('ok','✓ Importado!');}
      catch{showStatus('err','Arquivo inválido.');}
    };
    reader.readAsText(file);e.target.value='';
  };

  const counts=[
    {label:'Projetos',value:(appState.projects||[]).filter(p=>!p.deleted).length},
    {label:'Clientes',value:(appState.clients||[]).filter(c=>!c.deleted).length},
    {label:'Mentores',value:(appState.mentors||[]).filter(m=>!m.deleted).length},
    {label:'Notas',value:(appState.notes||[]).filter(n=>!n.deleted).length},
    {label:'Atividades',value:(appState.tasks||[]).length},
    {label:'Posts',value:(appState.socialPosts||[]).filter(p=>!p.deleted).length},
  ];

  const syncColor={'synced':'#276b3e','syncing':'#92700b','error':'#9B1C1C','idle':'var(--muted)'}[syncStatus]||'var(--muted)';
  const syncLabel={'synced':'Sincronizado ✓','syncing':'Sincronizando...','error':'Erro de sincronização','idle':fbUser?'Aguardando alterações':'Faça login para sincronizar'}[syncStatus]||'';
  const syncIcon={'synced':'check-circle','syncing':'loader','error':'alert-circle','idle':'cloud'}[syncStatus]||'cloud';

  return(
    <div className="fade-up" style={{maxWidth:'min(640px,100%)',boxSizing:'border-box',height:isMobile?'auto':'calc(100vh - clamp(32px,5vh,80px))',overflowY:isMobile?'visible':'auto',margin:'0 auto'}}>
      <h1 className="serif" style={{fontSize:isMobile?'1.75rem':'clamp(1.6rem,2.8vh,2.6rem)',fontWeight:300,letterSpacing:'-0.02em',marginBottom:2}}>Sincronizar</h1>
      <p style={{color:'var(--muted)',fontSize:'clamp(.75rem,1.1vh,.85rem)',marginBottom:isMobile?10:12}}>Sync em tempo real entre dispositivos via Google.</p>

      <div style={{display:'flex',gap:6,marginBottom:isMobile?8:10,flexWrap:isMobile?'wrap':'nowrap'}}>
        {counts.map(s=>(
          <div key={s.label} className="card" style={{padding:'8px 12px',display:'flex',alignItems:'center',gap:8,flex:isMobile?'1 1 45%':'1'}}>
            <span style={{fontFamily:'Cormorant Garamond,serif',fontSize:'1.2rem',fontWeight:500,flexShrink:0}}>{s.value}</span>
            <span style={{fontSize:'.68rem',color:'var(--muted)',lineHeight:1.2}}>{s.label}</span>
          </div>
        ))}
      </div>

      {localImgCount>0&&(
        <div style={{background:'#FEF9E7',border:'1px solid #fde68a',borderRadius:10,padding:'8px 14px',marginBottom:8,display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
          <Icon name="image" size={14} style={{color:'#92700b',flexShrink:0}}/>
          <div style={{flex:1,fontSize:'.8rem',color:'#78350F'}}>
            <strong>{localImgCount} imagem(ns)</strong> apenas localmente. Use <strong>"Re-enviar Imagens"</strong> abaixo.
          </div>
        </div>
      )}

      {status&&(
        <div style={{padding:'8px 14px',borderRadius:10,marginBottom:10,background:status.type==='ok'?'#E8F5EC':'#FDEDED',border:`1px solid ${status.type==='ok'?'#bbf7d0':'#FECACA'}`,color:status.type==='ok'?'#276b3e':'#9B1C1C',fontSize:'.82rem',display:'flex',alignItems:'center',gap:10}}>
          <Icon name={status.type==='ok'?'check-circle':'alert-circle'} size={15}/>{status.msg}
          <button onClick={()=>setStatus(null)} style={{marginLeft:'auto',background:'none',border:'none',cursor:'pointer',color:'inherit',padding:2}}><Icon name="x" size={13}/></button>
        </div>
      )}

      {reuploadProgress&&(
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'14px 18px',marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8,fontSize:'.82rem',fontWeight:600}}>
            <span>Enviando imagens...</span>
            <span style={{color:'var(--muted)'}}>{reuploadProgress.done}/{reuploadProgress.total}</span>
          </div>
          <div style={{height:6,background:'var(--bg)',borderRadius:3,overflow:'hidden'}}>
            <div style={{height:'100%',background:'var(--text)',borderRadius:3,transition:'width .3s',width:`${Math.round(reuploadProgress.done/reuploadProgress.total*100)}%`}}/>
          </div>
        </div>
      )}

      {/* Google Account Card */}
      <div className="card" style={{padding:isMobile?20:18,marginBottom:10,display:'flex',flexDirection:'column',alignItems:'center',gap:12}}>
        {fbUser ? (
          <>
            <div style={{display:'flex',alignItems:'center',gap:16,width:'100%'}}>
              <div style={{width:56,height:56,borderRadius:'50%',overflow:'hidden',flexShrink:0,background:'var(--bg)',border:'2px solid var(--border)'}}>
                {fbUser.photoURL
                  ?<img src={fbUser.photoURL} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/>
                  :<div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Cormorant Garamond,serif',fontSize:'1.4rem',fontWeight:500,color:'var(--muted)'}}>{(fbUser.displayName||fbUser.email||'?').charAt(0)}</div>
                }
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:'1rem',marginBottom:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{fbUser.displayName||fbUser.email}</div>
                <div style={{fontSize:'.78rem',color:syncColor,display:'flex',alignItems:'center',gap:5}}>
                  <Icon name={syncIcon} size={12}/>{syncLabel}
                </div>
              </div>
            </div>
            <div style={{display:'flex',gap:8,width:'100%'}}>
              <button className="btn btn-outline" style={{flex:1,justifyContent:'center'}} onClick={handleManualPush} disabled={loading}>
                <Icon name="upload-cloud" size={14}/> Forçar sync
              </button>
              <button className="btn btn-ghost" style={{fontSize:'.8rem',color:'var(--muted)'}} onClick={signOut}>
                <Icon name="log-out" size={13}/> Sair
              </button>
            </div>
          </>
        ) : (
          <>
            <div style={{textAlign:'center'}}>
              <div style={{width:64,height:64,borderRadius:'50%',background:'var(--bg)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px'}}>
                <Icon name="cloud" size={26} style={{color:'var(--muted)'}}/>
              </div>
              <div style={{fontWeight:600,fontSize:'1rem',marginBottom:6}}>Entre com sua conta Google</div>
              <div style={{fontSize:'.82rem',color:'var(--muted)',maxWidth:340,lineHeight:1.6}}>Seus dados ficam sincronizados automaticamente em todos os seus dispositivos.</div>
            </div>
            <button style={{
              display:'flex',alignItems:'center',justifyContent:'center',gap:10,
              width:'100%',maxWidth:320,padding:'13px 20px',borderRadius:10,
              border:'1px solid var(--border)',background:'white',cursor:'pointer',
              fontFamily:'Figtree,sans-serif',fontSize:'.95rem',fontWeight:600,color:'#1C1917',
              boxShadow:'0 1px 4px rgba(0,0,0,.08)',transition:'box-shadow .15s',
            }}
            onMouseEnter={e=>e.currentTarget.style.boxShadow='0 2px 10px rgba(0,0,0,.12)'}
            onMouseLeave={e=>e.currentTarget.style.boxShadow='0 1px 4px rgba(0,0,0,.08)'}
            onClick={signIn}>
              <svg width="20" height="20" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              Entrar com Google
            </button>
          </>
        )}
      </div>

      {/* Actions */}
      <div className="card" style={{padding:isMobile?16:18,marginBottom:10}}>
        <span className="label" style={{display:'block',marginBottom:10}}>Backup Manual</span>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <button className="btn btn-outline" style={{flex:1,justifyContent:'center'}} onClick={exportData} disabled={loading}>
              <Icon name="download" size={14}/> Exportar JSON
            </button>
            <button className="btn btn-outline" style={{flex:1,justifyContent:'center'}} onClick={()=>importRef.current.click()} disabled={loading}>
              <Icon name="upload" size={14}/> Importar JSON
            </button>
            <input ref={importRef} type="file" accept=".json" style={{display:'none'}} onChange={handleImportFile}/>
          </div>
          {localImgCount>0&&(
            <button className="btn btn-outline" style={{width:'100%',justifyContent:'center'}} onClick={handleReupload} disabled={loading}>
              <Icon name="cloud-upload" size={14}/> Re-enviar Imagens ({localImgCount})
            </button>
          )}
        </div>
      </div>

      {/* Danger zone */}
      <div style={{borderTop:'1px solid var(--border)',paddingTop:12}}>
        <span className="label" style={{display:'block',marginBottom:8,color:'#9B1C1C'}}>Zona Perigosa</span>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button className="btn btn-outline" onClick={onResetIdentity} style={{fontSize:'.82rem'}}>
            <Icon name="pencil" size={13}/> Renomear Hub
          </button>
          <button className="btn btn-danger" onClick={()=>{if(window.confirm('Resetar todos os dados para o estado inicial? Esta ação não pode ser desfeita.'))onClearSave();}}>
            <Icon name="alert-triangle" size={14}/> Resetar tudo
          </button>
        </div>
      </div>

    </div>
  );
});

const MentorModal=({mentor,onClose,onSave,onDelete})=>{

    imgs[idx]=url;set('photos',imgs);

  return(

          <h2 className="serif" style={{fontSize:'1.6rem',fontWeight:400,margin:0}}>{form.name||'Mentor'}</h2>

            onMouseEnter={e=>e.currentTarget.querySelector('.mh').style.opacity=1}
            onMouseLeave={e=>e.currentTarget.querySelector('.mh').style.opacity=0}>
            {form.photo

              :<span style={{fontFamily:'Cormorant Garamond,serif',fontSize:'1.8rem',fontWeight:500,color:'var(--muted)'}}>{(form.name||'?').charAt(0)}</span>}
            <div className="mh" style={{position:'absolute',inset:0,background:'rgba(0,0,0,.4)',display:'flex',alignItems:'center',justifyContent:'center',opacity:0,transition:'opacity .2s'}}><Icon name="camera" size={16} style={{color:'white'}}/></div>
          </div>
          <div style={{flex:1,display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>

            <Field label="Meio"><input className="input-box" value={form.medium||''} onChange={e=>set('medium',e.target.value)} placeholder="Ex: Animacao, HQ..."/></Field>
            <Field label="Ano">
              <input className="input-box" type="number" value={form.year||''} onChange={e=>set('year',e.target.value?Number(e.target.value):'')} placeholder={new Date().getFullYear()} min="1900" max="2099"/>
            </Field>
            <Field label="Status">
              <select className="input-box" value={form.active?'Ativo':'Inativo'} onChange={e=>set('active',e.target.value==='Ativo')} style={{cursor:'pointer'}}>
                <option>Ativo</option><option>Inativo</option>

            </Field>
          </div>
        </div>
        <div style={{marginBottom:12}}>
          <button onClick={()=>set('main',!form.main)}

        </div>
        <div style={{display:'flex',justifyContent:'space-between',paddingTop:4,borderTop:'1px solid var(--border)'}}>
          <button className="btn btn-danger" onClick={onDelete}><Icon name="trash-2" size={14}/> Excluir</button>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-outline" onClick={onClose}>Cancelar</button>
            <button className="btn btn-dark" onClick={()=>onSave(form)}><Icon name="check" size={14}/> Salvar</button>
          </div>
        </div>
      </div>
    </div>
  );
};

const MentorsHub=React.memo(({mentors,setMentors,isMobile})=>{
  const [selected,setSelected]=useState(null);
  const [search,setSearch]=useState('');
  const currentYear=new Date().getFullYear();
  const [activeYear,setActiveYear]=useState('all');

  // Collect all distinct years present in mentors
  const years=useMemo(()=>{
    const ys=[...new Set(mentors.filter(m=>!m.deleted&&m.year).map(m=>Number(m.year)))];
    ys.sort((a,b)=>b-a);
    return ys;
  },[mentors]);

  const visible=mentors.filter(m=>!m.deleted&&
    (activeYear==='all'||String(m.year)===String(activeYear))&&
    (!search||m.name.toLowerCase().includes(search.toLowerCase())||(m.area||'').toLowerCase().includes(search.toLowerCase()))
  );

  const dragIdxRef=useRef(null);
  const reorderMentors=(from,to)=>{
    if(from===to)return;
    setMentors(prev=>{const live=prev.filter(m=>!m.deleted);const dead=prev.filter(m=>m.deleted);const next=[...live];const[mv]=next.splice(from,1);next.splice(to,0,mv);return[...next,...dead];});
  };
  const dp=(idx)=>({
    className:'card card-click drag-item',
    draggable:true,
    onDragStart:e=>{e.dataTransfer.effectAllowed='move';dragIdxRef.current=idx;e.currentTarget.style.opacity='0.45';},
    onDragEnd:e=>{e.currentTarget.style.opacity='1';dragIdxRef.current=null;document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));},
    onDragOver:e=>{e.preventDefault();e.currentTarget.classList.add('drag-over');},
    onDragLeave:e=>{e.currentTarget.classList.remove('drag-over');},
    onDrop:e=>{e.preventDefault();e.currentTarget.classList.remove('drag-over');if(dragIdxRef.current!=null&&dragIdxRef.current!==idx){reorderMentors(dragIdxRef.current,idx);dragIdxRef.current=null;}},
  });
  const add=()=>{

  const save=form=>{

  const del=()=>{

      </div>
      {mentors.filter(m=>!m.deleted).length>0&&(

          <input className="input-box" value={search} onChange={e=>setSearch(e.target.value)}

      {/* Year tabs */}
      {years.length>0&&(

          <button onClick={()=>setActiveYear('all')} className="tab-btn"
            style={{color:activeYear==='all'?'var(--text)':'var(--muted)',borderBottom:activeYear==='all'?'2px solid var(--text)':'2px solid transparent',whiteSpace:'nowrap'}}>

          {years.map(y=>(
            <button key={y} onClick={()=>setActiveYear(String(y))} className="tab-btn"
              style={{color:String(activeYear)===String(y)?'var(--text)':'var(--muted)',borderBottom:String(activeYear)===String(y)?'2px solid var(--text)':'2px solid transparent',whiteSpace:'nowrap'}}>

      {visible.length===0&&(

          <p style={{fontSize:'.9rem',margin:0}}>{search?'Nenhum mentor encontrado.':'Adicione seu primeiro mentor acima.'}</p>
        </div>
      )}
      {isMobile?(
        <div className="card" style={{overflow:'hidden',borderRadius:12}}>
          {visible.map((m,idx)=>(
            <div key={m.id} draggable className="compact-row drag-item"
              onDragStart={e=>{e.dataTransfer.effectAllowed='move';dragIdxRef.current=idx;e.currentTarget.style.opacity='0.45';}}
              onDragEnd={e=>{e.currentTarget.style.opacity='1';dragIdxRef.current=null;document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));}}
              onDragOver={e=>{e.preventDefault();e.currentTarget.classList.add('drag-over');}}
              onDragLeave={e=>{e.currentTarget.classList.remove('drag-over');}}
              onDrop={e=>{e.preventDefault();e.currentTarget.classList.remove('drag-over');if(dragIdxRef.current!=null&&dragIdxRef.current!==idx){reorderMentors(dragIdxRef.current,idx);dragIdxRef.current=null;}}}

              }
              <div className="compact-row-info">

              {photos.length>0
