<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover">
<title>BoardHub — Storyboard OS</title>
<!-- Preconnect FIRST — browser starts DNS/TLS before any scripts -->
<link rel="preconnect" href="https://unpkg.com">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://www.gstatic.com">
<!--
  BoardHub v19 — Optimized Build
  • P0: XSS fix in splash error handler, mobile data URL crash, clearSave confirmation
  • P1: useCallback on App handlers (React.memo now effective), shared AudioContext,
        content-visibility scoped to .fade-up, Pomodoro "Hoje" counter live updates
  • P2: ProjectDetail upd() deferred parent update, applyAutoLate persisted,
        parseHash NaN guard, GanttTimeline todayISO memoized, stale popstate closure fixed
  • P3: Dynamic seed dates, icon pre-resolve, CSS hover classes, dropdown Escape handler
  • Firebase lazy-loaded after first paint (~400KB off critical path)
  • Babel runs JSX-only transform (skips unnecessary env polyfills)
  • Preconnect hints at top of <head> for parallel DNS/TLS
-->
<!-- Critical render-path scripts only -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.js"></script>
<!-- Firebase loaded LAZILY after first paint — see _lazyFirebase() below -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F4F1ED;--surface:#FDFCFA;--border:#E8E3DC;--border-2:#D5CCBF;--text:#1C1917;--muted:#78716C;--accent:#4A3728;--focus-ring:rgba(28,25,23,.18);}
*,*::before,*::after{box-sizing:border-box;}
/* Selection color */
::selection{background:rgba(28,25,23,.12);color:var(--text);}
/* Smooth scroll for scrollable containers */
html{scroll-behavior:smooth;}
/* Offscreen rendering optimization - scoped to view containers only (not overlays/modals) */
main>.fade-up{content-visibility:auto;contain-intrinsic-size:auto 500px;}
/* Image performance: prevent layout shift, smooth decode */
img{max-width:100%;display:block;}
body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--text);margin:0;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
h1,h2,h3,.serif{font-family:'Cormorant Garamond',serif;}
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:10px;}::-webkit-scrollbar-thumb:hover{background:var(--muted);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;transition:border-color .2s,box-shadow .2s,transform .15s;}
.card:hover{border-color:var(--border-2);box-shadow:0 4px 20px rgba(28,25,23,.05);}
.card .card-delete-btn{position:absolute;top:8px;left:8px;background:rgba(28,25,23,.55);backdrop-filter:blur(4px);border:none;border-radius:6px;padding:4px 6px;cursor:pointer;color:white;opacity:0;transition:opacity .2s;z-index:2;}
.card:hover .card-delete-btn{opacity:1;}
.card-click{cursor:pointer;}.card-click:hover{border-color:var(--text)!important;box-shadow:0 4px 20px rgba(28,25,23,.07)!important;}
.card-click:active{transform:scale(.985);box-shadow:0 1px 8px rgba(28,25,23,.06)!important;}
/* Buttons — improved hover lift + press feedback */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:8px;font-family:'Figtree',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .18s;border:none;outline:none;position:relative;}
.btn:focus-visible{box-shadow:0 0 0 2.5px var(--focus-ring);}
.btn-dark{background:var(--text);color:white;}.btn-dark:hover{box-shadow:0 2px 10px rgba(28,25,23,.2);transform:translateY(-1px);}.btn-dark:active{transform:translateY(0);box-shadow:none;opacity:.9;}
.btn-outline{background:transparent;color:var(--muted);border:1px solid var(--border);}.btn-outline:hover{border-color:var(--text);color:var(--text);}.btn-outline:active{background:var(--bg);}
.btn-ghost{background:transparent;color:var(--muted);border:none;padding:6px 10px;border-radius:6px;}.btn-ghost:hover{color:var(--text);background:var(--bg);}.btn-ghost:active{background:var(--border);}
.btn-danger{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA;}.btn-danger:hover{background:#FEE2E2;}.btn-danger:active{background:#FECACA;}
/* Nav items with subtle left accent on active */
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:.85rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;background:transparent;border:none;outline:none;width:100%;font-family:'Figtree',sans-serif;letter-spacing:.01em;}
.nav-item:hover{background:rgba(28,25,23,.05);color:var(--text);}.nav-item.active{background:var(--text);color:white;box-shadow:0 1px 4px rgba(28,25,23,.15);}
.nav-item:focus-visible{box-shadow:0 0 0 2.5px var(--focus-ring);}
.tag{display:inline-block;font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;padding:3px 8px;border-radius:4px;}
.tag-green{background:#E8F5EC;color:#276b3e;}.tag-yellow{background:#FEF9E7;color:#92700b;}.tag-gray{background:#F0EDE9;color:var(--muted);}.tag-red{background:#FDEDED;color:#9B1C1C;}.tag-blue{background:#EFF6FF;color:#1e40af;}
.input-bare{background:transparent;outline:none;border-bottom:1px solid var(--border);font-family:'Figtree',sans-serif;color:var(--text);transition:border-color .2s,box-shadow .2s;}.input-bare:focus{border-color:var(--text);box-shadow:0 1px 0 0 var(--text);}
/* Input — subtle focus glow */
.input-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-family:'Figtree',sans-serif;font-size:.85rem;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;width:100%;}.input-box:focus{border-color:var(--text);box-shadow:0 0 0 3px rgba(28,25,23,.06);}
input[type="date"]{font-family:'Figtree',sans-serif;}
.label{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
.tab-btn{padding:10px 0;margin-right:24px;background:none;border:none;cursor:pointer;font-family:'Figtree',sans-serif;font-size:.85rem;font-weight:500;transition:all .15s;margin-bottom:-1px;}
.tab-btn:focus-visible{box-shadow:0 0 0 2.5px var(--focus-ring);border-radius:4px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp .35s ease both;}
@keyframes overlayIn{from{opacity:0;}to{opacity:1;}}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
/* Overlay now has a visible backdrop */
.overlay{position:fixed;inset:0;height:100vh;background:rgba(28,25,23,.3);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);z-index:100;display:flex;align-items:center;justify-content:center;animation:overlayIn .2s ease;padding-top:0px;padding-bottom:160px;padding-left:80px;padding-right:160px;}
.modal{background:var(--surface);border-radius:18px;border:1px solid var(--border);padding:24px 28px;width:100%;animation:modalIn .25s ease;box-shadow:0 20px 60px rgba(28,25,23,.18);max-height:95vh;overflow-y:auto;}
.upload-zone{border:2px dashed var(--border);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s,background .2s,transform .15s;padding:24px;text-align:center;color:var(--muted);}
.upload-zone:hover{border-color:var(--text);background:rgba(28,25,23,.02);color:var(--text);}.upload-zone:active{transform:scale(.98);}
.cover-wrap{position:relative;}.cover-edit-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;opacity:0;transition:all .25s;cursor:pointer;}
.cover-wrap:hover .cover-edit-overlay{background:rgba(0,0,0,.45);opacity:1;}
.task-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);transition:background .1s;}.task-row:last-child{border-bottom:none;}
/* Task checkbox with smooth fill animation */
.task-check{width:18px;height:18px;border-radius:5px;border:2px solid var(--border-2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s cubic-bezier(.4,0,.2,1);background:transparent;}
.task-check:hover{border-color:var(--muted);}
.task-check.done{background:var(--text);border-color:var(--text);transform:scale(1);animation:checkPop .25s cubic-bezier(.34,1.56,.64,1);}
.task-check.done::after{content:'';width:5px;height:9px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px);display:block;animation:checkDraw .2s ease .05s both;}
@keyframes checkPop{0%{transform:scale(.8);}50%{transform:scale(1.1);}100%{transform:scale(1);}}
@keyframes checkDraw{from{opacity:0;transform:rotate(45deg) translate(-1px,-1px) scale(.5);}to{opacity:1;transform:rotate(45deg) translate(-1px,-1px) scale(1);}}
@keyframes lbIn{from{opacity:0;transform:scale(.94);}to{opacity:1;transform:scale(1);}}
.lightbox{position:fixed;inset:0;background:rgba(10,8,6,.92);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);z-index:200;display:flex;align-items:center;justify-content:center;cursor:zoom-out;}
.lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:8px;animation:lbIn .2s ease;cursor:default;}
.ptask-pill{display:inline-flex;align-items:center;gap:4px;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:3px 9px;border-radius:20px;cursor:pointer;border:none;font-family:'Figtree',sans-serif;transition:all .12s;}
.ptask-pill:active{transform:scale(.92);}
.ptask-Pendente{background:#F0EDE9;color:var(--muted);}.ptask-Fazendo{background:#FEF9E7;color:#92700b;}.ptask-Concluído{background:#E8F5EC;color:#276b3e;}.ptask-Atrasado{background:#FDEDED;color:#9B1C1C;}
@keyframes toastPop{from{opacity:0;transform:translateX(-50%) translateY(8px) scale(.95);}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}}
.save-toast{position:fixed;bottom:20px;left:calc(220px + 50%);transform:translateX(-50%);background:var(--text);color:white;padding:8px 18px;border-radius:30px;font-size:.78rem;font-weight:500;z-index:999;animation:toastPop .3s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;gap:7px;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(28,25,23,.2);}
.drag-handle{cursor:grab;color:var(--border-2);opacity:0;transition:opacity .15s;display:flex;align-items:center;flex-shrink:0;padding:2px 3px;}
.drag-handle:active{cursor:grabbing;}
.drag-row:hover .drag-handle,.drag-card:hover .drag-handle{opacity:1;}
.drag-over-top{border-top:2px solid var(--text)!important;}
.drag-over-left{outline:2px solid var(--text)!important;}

/* Gantt styles */
.gantt-bar{transition:opacity .12s,box-shadow .12s;}.gantt-bar:hover{opacity:.88;}
.gantt-row-left:hover{background:rgba(28,25,23,.04)!important;}
/* Gallery image hover zoom — replaces JS onMouseEnter/Leave handlers */
.img-zoom{transition:transform .4s;}.img-zoom:hover{transform:scale(1.06);}
.img-zoom-sm{transition:transform .3s;}.img-zoom-sm:hover{transform:scale(1.03);}

/* Hover utilities - replaces onMouseEnter/Leave JS handlers */
.hover-text:hover{color:var(--text)!important;}
.hover-danger:hover{color:#DC2626!important;}
.hover-surface:hover{background:var(--surface);}
.hover-border-text:hover{border-color:var(--text)!important;}
.text-link{color:var(--muted);transition:color .15s;}.text-link:hover{color:var(--text)!important;}
.text-link-danger{color:var(--muted);transition:color .15s;}.text-link-danger:hover{color:#DC2626!important;}

/* Pomodoro stats slide-in panel */
@keyframes slideInStats{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}

/* - BOTTOM TAB BAR - */
.bottom-tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:80;background:rgba(253,252,250,.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;align-items:stretch;justify-content:space-around;padding:4px 0 env(safe-area-inset-bottom,0);height:56px;}
.bottom-tab-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;flex:1;border:none;background:none;cursor:pointer;font-family:'Figtree',sans-serif;font-size:.62rem;font-weight:600;color:var(--muted);padding:6px 2px;transition:color .15s,transform .1s;-webkit-tap-highlight-color:transparent;letter-spacing:.02em;}
.bottom-tab-item.active{color:var(--text);}
.bottom-tab-item:active{transform:scale(.9);opacity:.7;}
@keyframes moreSheetIn{from{opacity:0;transform:translateY(100%);}to{opacity:1;transform:translateY(0);}}
@keyframes moreOverlayIn{from{opacity:0;}to{opacity:1;}}
.more-sheet-overlay{position:fixed;inset:0;background:rgba(28,25,23,.45);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);z-index:90;animation:moreOverlayIn .2s ease;}
.more-sheet{position:fixed;bottom:0;left:0;right:0;z-index:91;background:var(--surface);border-radius:18px 18px 0 0;padding:12px 16px env(safe-area-inset-bottom,16px);animation:moreSheetIn .3s cubic-bezier(.32,0.72,.5,1.02);max-height:70vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(28,25,23,.15);}
.more-sheet-handle{width:36px;height:4px;border-radius:4px;background:var(--border-2);margin:0 auto 16px;}
.more-sheet-item{display:flex;align-items:center;gap:14px;padding:14px 12px;border-radius:10px;border:none;background:none;cursor:pointer;font-family:'Figtree',sans-serif;font-size:.95rem;font-weight:500;color:var(--text);width:100%;transition:background .15s,transform .1s;-webkit-tap-highlight-color:transparent;}
.more-sheet-item:active{background:var(--bg);transform:scale(.97);}
.more-sheet-item.active-sheet{background:var(--bg);font-weight:600;}
/* Mobile header bar — frosted glass */
.mobile-header{position:sticky;top:0;z-index:50;background:rgba(253,252,250,.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.mobile-header-title{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:500;letter-spacing:-.02em;}
/* FAB */
.fab{position:fixed;bottom:72px;right:16px;width:56px;height:56px;border-radius:50%;background:var(--text);color:white;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(28,25,23,.25),0 1px 3px rgba(28,25,23,.1);z-index:70;transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent;}
.fab:active{transform:scale(.88);box-shadow:0 2px 8px rgba(28,25,23,.2);}

/* - MOBILE-LAYOUT COMPONENT STYLES (always applied - used whenever isMobile=true) - */
/* Compact list rows */
.compact-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);background:var(--surface);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .1s,transform .1s;min-height:64px;}
.compact-row:active{background:var(--bg);transform:scale(.985);}
.compact-row:last-child{border-bottom:none;}
.compact-row-thumb{width:44px;height:44px;border-radius:8px;flex-shrink:0;background-size:cover;background-position:center;background-color:var(--bg);overflow:hidden;}
.compact-row-info{flex:1;min-width:0;}
.compact-row-title{font-weight:600;font-size:.92rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px;}
.compact-row-meta{font-size:.78rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
/* Segmented tabs */
.seg-tabs{display:flex;background:var(--bg);border-radius:10px;padding:3px;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:16px;}
.seg-tab{flex:1;min-width:0;padding:10px 8px;border-radius:8px;border:none;cursor:pointer;font-family:'Figtree',sans-serif;font-size:.84rem;font-weight:600;text-align:center;white-space:nowrap;transition:all .2s cubic-bezier(.4,0,.2,1);background:transparent;color:var(--muted);}
.seg-tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.seg-tab:active:not(.active){background:rgba(28,25,23,.04);}
/* Vertical timeline */
.vtimeline-item{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--border);min-height:48px;}
.vtimeline-item:last-child{border-bottom:none;}
.vtimeline-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:2px solid var(--border-2);}
.vtimeline-dot.done{background:var(--text);border-color:var(--text);}
.vtimeline-text{flex:1;font-size:.9rem;font-weight:500;}
.vtimeline-date{font-size:.78rem;color:var(--muted);flex-shrink:0;}
.drag-item .drag-handle{opacity:0;transition:opacity .12s;}
.drag-item:hover .drag-handle{opacity:1;}
.drag-item.drag-over{outline:2px dashed var(--text);outline-offset:-2px;border-radius:8px;background:rgba(28,25,23,.02);}

/* - RESPONSIVE - */
@media(max-width:768px){
  /* Prevent horizontal scroll */
  html,body{overflow-x:hidden!important;max-width:100vw!important;}
  /* Global spacing - room for bottom tab */
  .main-mobile{margin-left:0!important;padding:16px 16px 72px!important;padding-top:0!important;min-height:calc(100vh - 56px)!important;overflow-x:hidden!important;width:100%!important;box-sizing:border-box!important;}
  .fade-up{animation:none!important;max-width:100%!important;box-sizing:border-box!important;}
  
  /* Overlay / Modals — slide up from bottom on mobile */
  .overlay,.overlay-offset{padding:0!important;padding-left:0!important;align-items:flex-end!important;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);}
  .modal{border-radius:18px 18px 0 0!important;max-height:92vh!important;padding:24px 20px!important;}
  
  /* Save toast - above tab bar */
  .save-toast{left:50%!important;bottom:72px!important;}
  
  /* Cards */
  .card{border-radius:12px;overflow:hidden;}
  
  /* Tag - readable on mobile */
  .tag{padding:5px 10px;font-size:.72rem;}
  
  /* Buttons - 48px touch targets */
  .btn{padding:12px 18px;font-size:.9rem;min-height:44px;}
  .btn-ghost{padding:10px 12px;min-height:44px;}
  .nav-item{padding:14px 16px;font-size:.95rem;}
  
  /* Input - 16px prevents iOS zoom */
  .input-box{padding:12px 14px;font-size:16px!important;min-height:48px;}
  textarea{font-size:16px!important;}
  select{font-size:16px!important;min-height:44px;}
  input{font-size:16px!important;}
  
  /* Label - readable */
  .label{font-size:.72rem;}
  
  /* Tab buttons - larger tap area */
  .tab-btn{margin-right:0;font-size:.88rem;padding:12px 16px;}
  
  /* Upload zone */
  .upload-zone{padding:20px;}
  
  /* Cover edit - always show on mobile (no hover) */
  .cover-wrap .cover-edit-overlay{background:rgba(0,0,0,.3)!important;opacity:1!important;}
}
</style>
</head>
<body>
<div id="root">
  <!-- Instant loading screen — pure CSS, renders before any JS loads -->
  <div id="splash" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#F4F1ED;font-family:serif;gap:10px">
    <div style="font-size:2.4rem;font-weight:500;letter-spacing:-0.02em;color:#1C1917">Board<span style="font-style:italic;font-weight:300">Hub</span></div>
    <div style="font-size:.65rem;color:#78716C;letter-spacing:.1em;text-transform:uppercase">Carregando...</div>
    <div style="width:120px;height:3px;background:#E8E3DC;border-radius:3px;overflow:hidden;margin-top:8px">
      <div style="width:40%;height:100%;background:#1C1917;border-radius:3px;animation:splashBar 1.2s ease infinite"></div>
    </div>
  </div>
  <style>#splash{transition:opacity .4s ease}@keyframes splashBar{0%{transform:translateX(-100%)}50%{transform:translateX(150%)}100%{transform:translateX(250%)}}</style>
  <script>
    window.__splashTimeout=setTimeout(function(){
      var s=document.getElementById('splash');if(!s)return;
      s.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;gap:12px;font-family:sans-serif;padding:24px;text-align:center"><div style="font-size:2.4rem;font-weight:500;font-family:serif;color:#1C1917">BoardHub</div><div style="font-size:.8rem;color:#DC2626">Erro ao carregar. Verifique sua conexao e recarregue.</div><button onclick="location.reload()" style="margin-top:8px;padding:8px 20px;background:#1C1917;color:white;border:none;border-radius:8px;cursor:pointer">Recarregar</button></div>';
    },12000);
    window.addEventListener('error',function(e){
      clearTimeout(window.__splashTimeout);
      var s=document.getElementById('splash');if(!s)return;
      var safeMsg=document.createElement('div');
      safeMsg.textContent=e.message||'Erro desconhecido';
      s.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;gap:12px;font-family:sans-serif;padding:24px;text-align:center"><div style="font-size:2.4rem;font-weight:500;font-family:serif;color:#1C1917">BoardHub</div><div style="font-size:.8rem;color:#DC2626;max-width:400px">Erro: '+safeMsg.innerHTML+'</div><button onclick="location.reload()" style="margin-top:8px;padding:8px 20px;background:#1C1917;color:white;border:none;border-radius:8px;cursor:pointer">Recarregar</button></div>';
    });
  </script>
</div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// - LOCAL STORAGE -
const LS_KEY = 'boardhub_v2';

const lsSave = s => {

// Prefetch all idb:// image refs from persisted state into the object URL cache
// so BgImg/Img components get their URL synchronously on first render (no flash).
const _prefetchDone = (()=>{
  if(!persisted)return Promise.resolve();
  const keys=[];
  const collect=obj=>{
    if(Array.isArray(obj)){obj.forEach(collect);}
    else if(obj&&typeof obj==='object'){Object.values(obj).forEach(collect);}
    else if(typeof obj==='string'&&obj.startsWith('idb://'))keys.push(obj.slice(6));
  };
  collect(persisted);
  if(!keys.length)return Promise.resolve();
  return openIdb().then(db=>new Promise(res=>{
    try{
      // Single transaction for all keys — much faster than one tx per image
      const tx=db.transaction('images','readonly');
      const store=tx.objectStore('images');
      let pending=keys.length;
      const done=()=>{ if(--pending===0)res(); };
      keys.forEach(key=>{
        if(_objUrlCache[key]){done();return;}
        const req=store.get(key);
        req.onsuccess=e=>{
          const blob=e.target.result;
          if(blob&&!_objUrlCache[key])_objUrlCache[key]=URL.createObjectURL(blob);
          done();
        };
        req.onerror=()=>done();
      });
    }catch{res();}
  })).catch(()=>{});
})();

// Icon: renders lucide icons as pure React SVGs with one-time caching per icon name.
// Two strategies: (1) read directly from lucide.icons registry (fast, no DOM)
// (2) fallback: temporarily inject into document, let createIcons process, extract SVG.
const _svgCache={};
const _resolveIcon=(name)=>{
  if(_svgCache[name])return;
  // Strategy 1: lucide.icons registry — each entry is [tag, defaultAttrs, children]
  try{
    const pascal=name.replace(/(^|-)([a-z0-9])/g,(_,__,c)=>c.toUpperCase());
    const def=(lucide.icons||{})[pascal];
    if(def&&Array.isArray(def)&&def.length>=3&&Array.isArray(def[2])){
      _svgCache[name]=def[2].map(([tag,attrs])=>{
        const a=Object.entries(attrs||{}).map(([k,v])=>k+'="'+v+'"').join(' ');
        return '<'+tag+' '+a+'/>';
      }).join('');
      return;
    }
  }catch(e){}
  // Strategy 2: DOM fallback — append to body so createIcons can find it
  try{
    const tmp=document.createElement('div');
    tmp.style.cssText='position:fixed;left:-9999px;top:-9999px;pointer-events:none;opacity:0';
    tmp.innerHTML='<i data-lucide="'+name+'"></i>';
    document.body.appendChild(tmp);
    lucide.createIcons({nodes:[tmp]});
    const svg=tmp.querySelector('svg');
    if(svg)_svgCache[name]=svg.innerHTML;
    tmp.remove();
  }catch(e){}
};
const Icon=({name,size=16,style={}})=>{
  _resolveIcon(name);
  return React.createElement('svg',{xmlns:'http://www.w3.org/2000/svg',width:size,height:size,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round',style:{display:'inline-block',flexShrink:0,...style},dangerouslySetInnerHTML:{__html:_svgCache[name]||''}});
};

// - RESPONSIVE HOOK -
// isMobileUA: true if the browser is on a phone/tablet, regardless of viewport.
// This is the reliable ground-truth when served over HTTPS (e.g. GitHub Pages),
// where some Android browsers report a larger layout viewport on first paint.
const isMobileUA=()=>/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile/i.test(navigator.userAgent);

const useIsMobile=(breakpoint=768)=>{
  const detect=()=>{
    // UA check wins: if it's a real mobile device, always use mobile layout.
    if(isMobileUA())return true;
    try{
      const mq=window.matchMedia(`(max-width:${breakpoint}px)`);
      return mq.matches || window.innerWidth<=breakpoint;
    }catch{return window.innerWidth<=breakpoint;}
  };
  const [autoMobile,setAutoMobile]=useState(detect);
  useEffect(()=>{
    // Re-run once DOM is fully painted to catch late viewport settling
    setAutoMobile(detect());
    const mq=window.matchMedia(`(max-width:${breakpoint}px)`);
    // UA won't change at runtime, so only listen for resize (desktop responsive testing)
    const handler=()=>{ if(!isMobileUA()) setAutoMobile(detect()); };
    mq.addEventListener('change',handler);
    return()=>{ mq.removeEventListener('change',handler); };
  },[breakpoint]);
  return autoMobile;
};

// - INDEXEDDB IMAGE STORE (unlimited local storage) -
// Images are stored as Blobs in IndexedDB (no 5 MB quota like localStorage).
// The app state only holds a lightweight reference: "idb://<key>".
// At render time, useIdbUrl() resolves these references to object URLs.
const IDB_NAME='boardhub_images';
const IDB_STORE='images';
let _idb=null;
let _idbPending=null;

// FIX 1: Reset the cached IDB connection whenever it closes unexpectedly.
const _resetIdb=()=>{ _idb=null; _idbPending=null; };

const openIdb=()=>{
  // If we have a valid open connection, reuse it
  if(_idb && _idb.objectStoreNames){
    try{ _idb.transaction(IDB_STORE,'readonly').abort(); return Promise.resolve(_idb); }
    catch{ _idb=null; /* connection was stale - fall through to re-open */ }
  }
  // Coalesce concurrent open requests
  if(_idbPending)return _idbPending;
  _idbPending=new Promise((res,rej)=>{
    const req=indexedDB.open(IDB_NAME,1);
    req.onupgradeneeded=e=>e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess=e=>{
      _idb=e.target.result;
      _idbPending=null;
      _idb.onclose=_resetIdb;
      _idb.onerror=()=>_resetIdb();
      _idb.onversionchange=()=>{ _idb.close(); _resetIdb(); };
      res(_idb);
    };
    req.onerror=e=>{ _resetIdb(); rej(e.target.error); };
  });
  return _idbPending;
};

const idbPut=(key,blob)=>openIdb().then(db=>new Promise((res,rej)=>{
  try{
    const tx=db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).put(blob,key);
    tx.oncomplete=()=>res();
    tx.onerror=e=>{ _resetIdb(); rej(e.target.error); };
  }catch(e){ _resetIdb(); rej(e); }
}));

const idbGet=(key)=>openIdb().then(db=>new Promise((res,rej)=>{
  try{
    const req=db.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get(key);
    req.onsuccess=e=>res(e.target.result);
    req.onerror=e=>{ _resetIdb(); rej(e.target.error); };
  }catch(e){ _resetIdb(); rej(e); }
}));

const idbDel=(key)=>openIdb().then(db=>new Promise((res,rej)=>{
  try{
    const tx=db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).delete(key);
    tx.oncomplete=()=>res();
    tx.onerror=e=>{ _resetIdb(); rej(e.target.error); };
  }catch(e){ _resetIdb(); rej(e); }
}));

// Hook: given an image src (may be idb://key, https://, or data:), returns a displayable URL.
// Checks _objUrlCache synchronously so prefetched images render with zero flash.
const _objUrlCache={};
// In-flight deduplication: if two components request the same key simultaneously,
// they share one IDB transaction instead of each opening their own.
const _inflightFetch={};
const useIdbUrl=(src)=>{
  const getInitial=()=>{
    if(!src)return '';
    if(!src.startsWith('idb://'))return src;
    return _objUrlCache[src.slice(6)]||'';
  };
  const [url,setUrl]=React.useState(getInitial);
  React.useEffect(()=>{
    if(!src){setUrl('');return;}
    if(!src.startsWith('idb://')){setUrl(src);return;}
    const key=src.slice(6);
    // Already cached — no async needed
    if(_objUrlCache[key]){setUrl(_objUrlCache[key]);return;}
    let cancelled=false;
    // Reuse any in-flight fetch for the same key to avoid duplicate IDB transactions
    if(!_inflightFetch[key]){
      _inflightFetch[key]=idbGet(key).then(blob=>{
        if(!blob){delete _inflightFetch[key];return '';}
        if(!_objUrlCache[key])_objUrlCache[key]=URL.createObjectURL(blob);
        delete _inflightFetch[key];
        return _objUrlCache[key];
      }).catch(()=>{delete _inflightFetch[key];return '';});
    }
    _inflightFetch[key].then(u=>{ if(!cancelled)setUrl(u); });
    return ()=>{ cancelled=true; };
  },[src]);
  return url;
};

// Img component that auto-resolves idb:// references
const Img=({src,...props})=>{
  const url=useIdbUrl(src);
  if(!url)return null;
  return <img src={url} loading="lazy" decoding="async" {...props}/>;
};

// BgImg: a <div> whose background-image auto-resolves idb:// refs
const BgImg=({src,className,style,children,...props})=>{
  const url=useIdbUrl(src);
  return <div className={className} style={{...style,backgroundImage:url?`url(${url})`:'none'}} {...props}>{children}</div>;
};

// Video detection helper — checks extension in any URL format (idb://, https://, data:)
const isVideoSrc=src=>{
  if(!src||typeof src!=='string')return false;
  return /\.(mp4|webm|mov|avi|mkv|m4v|ogv)(\?|$|#)/i.test(src);
};

// Vid component: auto-resolves idb:// references for video elements
const Vid=({src,...props})=>{
  const url=useIdbUrl(src);
  if(!url)return null;
  return <video src={url} {...props}/>;
};

// Media component: renders Img or Vid based on source
const Media=({src,videoProps,imgProps,...shared})=>{
  if(isVideoSrc(src))return <Vid src={src} {...shared} {...(videoProps||{})}/>;
  return <Img src={src} {...shared} {...(imgProps||{})}/>;
};

// - LAZY FIREBASE LOADER -
// Firebase SDK (~400KB) is loaded AFTER first paint to avoid blocking render.
let _fbScriptsLoaded=false;
let _fbScriptsPromise=null;

const _loadFirebaseScripts=()=>{
  if(_fbScriptsLoaded)return Promise.resolve();
  if(_fbScriptsPromise)return _fbScriptsPromise;
  const urls=[
    'https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js',
    'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js',
    'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js',
    'https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js',
  ];
  // Load sequentially — each script depends on the previous
  _fbScriptsPromise=urls.reduce((chain,src)=>
    chain.then(()=>new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src=src;s.onload=res;s.onerror=rej;
      document.head.appendChild(s);
    }))
  ,Promise.resolve()).then(()=>{_fbScriptsLoaded=true;}).catch(e=>{
    console.warn('[BoardHub] Firebase scripts failed to load:',e);
    _fbScriptsPromise=null; // allow retry
  });
  return _fbScriptsPromise;
};

const initFirebase=async()=>{
  if(_fbReady)return true;
  await _loadFirebaseScripts();
  if(typeof firebase==='undefined')return false;
  const saved=loadFbCfg();
  const cfg=saved.apiKey?saved:DEFAULT_FB_CFG;
  if(!cfg.apiKey)return false;
  try{
    if(!firebase.apps.length)firebase.initializeApp(cfg);
    _fbAuth=firebase.auth();
    _fbDb=firebase.firestore();
    _fbStorage=firebase.storage();
    _fbDb.enablePersistence({synchronizeTabs:true}).catch(()=>{});
    _fbReady=true;
    return true;
  }catch(e){console.error('[BoardHub] Firebase init:',e);return false;}
};

// Upload a file to Firebase Storage, return permanent CDN URL
const uploadToFirebaseStorage=async(file,uid)=>{
  if(!_fbStorage||!uid)throw new Error('Firebase Storage not available');
  const ext=(file.name||'img').split('.').pop()||'jpg';
  const key='img_'+Date.now()+'_'+Math.random().toString(36).slice(2)+'.'+ext;
  const ref=_fbStorage.ref(`users/${uid}/images/${key}`);
  await ref.put(file,{contentType:file.type||'image/jpeg'});
  return await ref.getDownloadURL();
};

// Imgur fallback — anonymous client-ID upload
const IMGUR_CLIENT_ID='546c25a59c58ad7';
const _uploadImgur=async(file)=>{
  const b64=await readFile(file);
  const body=new FormData();
  body.append('image',b64.split(',')[1]);
  body.append('type','base64');
  const ac=new AbortController();const _t=setTimeout(()=>ac.abort(),15000);
  const res=await fetch('https://api.imgur.com/3/image',{method:'POST',headers:{Authorization:`Client-ID ${IMGUR_CLIENT_ID}`},body,signal:ac.signal});
  clearTimeout(_t);
  const json=await res.json();
  if(json.success)return json.data.link;
  throw new Error('Imgur upload failed');
};

// IDB local fallback
const _storeIdb=async(file)=>{
  const ext=(file.name||'').split('.').pop()||'bin';
  const key='media_'+Date.now()+'_'+Math.random().toString(36).slice(2)+'.'+ext;
  await idbPut(key,file);
  return 'idb://'+key;
};

const _isVideoFile=f=>/^video\//i.test(f.type||'');
const _uploadSingle=async(file)=>{

    try{return await uploadToFirebaseStorage(file,_fbAuth.currentUser.uid);}
    catch(e){console.warn('[BoardHub] Firebase Storage failed:',e.message);}

  console.warn('[BoardHub] Falling back to local IDB. File will NOT sync across devices.');
  return await _storeIdb(file);
};

const BULK_UPLOAD_DELAY_MS=1100;
const uploadImages=async(files,onProgress)=>{
  const results=[];
  for(let i=0;i<files.length;i++){
    results.push(await _uploadSingle(files[i]));
    if(onProgress)onProgress(i+1,files.length);
    // Only delay on Imgur path (Firebase has no rate limit)
    if(i<files.length-1&&(!_fbReady||!_fbAuth?.currentUser)){
      await new Promise(r=>setTimeout(r,BULK_UPLOAD_DELAY_MS));
    }
  }
  return results;
};

// Re-upload all local IDB images to the cloud, return updated state
const reuploadLocalImages=async(state,onProgress)=>{
  const keys=[...collectIdbKeys(state)];
  if(keys.length===0)return state;
  const map={};
  for(let i=0;i<keys.length;i++){
    const key=keys[i];
    try{
      const blob=await idbGet(key);
      if(blob){
        const file=new File([blob],key,{type:blob.type||'image/jpeg'});
        let url=null;
        if(_fbReady&&_fbAuth?.currentUser){try{url=await uploadToFirebaseStorage(file,_fbAuth.currentUser.uid);}catch{}}
        if(!url){try{url=await _uploadImgur(file);}catch{}}
        if(url)map['idb://'+key]=url;
      }
    }catch(e){console.warn('[BoardHub] Re-upload failed for',key,e);}
    if(onProgress)onProgress(i+1,keys.length);
    if(!(_fbReady&&_fbAuth?.currentUser)&&i<keys.length-1){
      await new Promise(r=>setTimeout(r,BULK_UPLOAD_DELAY_MS));
    }
  }
  return rehydrateIdbRefs(state,map);
};
// Strip idb:// and base64 refs — these are local-only and never go to Firebase/Gist
const isLocalImg=v=>typeof v==='string'&&(v.startsWith('data:image')||v.startsWith('idb://'));
const stripBase64=obj=>{
  if(Array.isArray(obj))return obj.map(stripBase64);
  if(obj&&typeof obj==='object'){const out={};for(const k of Object.keys(obj))out[k]=stripBase64(obj[k]);return out;}
  if(isLocalImg(obj))return '';
  return obj;
};

// Resolve idb:// keys \u2192 base64 data URLs (used for manual JSON export)
const blobToBase64=blob=>new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(blob);});
const resolveIdbRefs=async obj=>{
  if(Array.isArray(obj))return Promise.all(obj.map(resolveIdbRefs));
  if(obj&&typeof obj==='object'){const out={};for(const k of Object.keys(obj))out[k]=await resolveIdbRefs(obj[k]);return out;}
  if(typeof obj==='string'&&obj.startsWith('idb://')){
    try{const blob=await idbGet(obj.slice(6));if(blob)return await blobToBase64(blob);}catch{}
    return '';
  }
  return obj;
};

// Build a self-contained JSON export (images embedded as base64)
const buildSyncPayload=async(state,includeImages=true)=>{
  const resolved=includeImages?await resolveIdbRefs(state):stripBase64(state);
  return JSON.stringify({...resolved,_v:'3.0',_exported:new Date().toISOString()});
};

// Collect every unique idb:// key referenced in the state tree
const collectIdbKeys=(obj,set=new Set())=>{
  if(Array.isArray(obj)){obj.forEach(x=>collectIdbKeys(x,set));}
  else if(obj&&typeof obj==='object'){Object.values(obj).forEach(x=>collectIdbKeys(x,set));}
  else if(typeof obj==='string'&&obj.startsWith('idb://'))set.add(obj.slice(6));
  return set;
};

// Replace idb:// refs in obj using a { 'idb://key': 'https://...' } map
const rehydrateIdbRefs=(obj,map)=>{
  if(Array.isArray(obj))return obj.map(x=>rehydrateIdbRefs(x,map));
  if(obj&&typeof obj==='object'){const out={};for(const k of Object.keys(obj))out[k]=rehydrateIdbRefs(obj[k],map);return out;}
  if(typeof obj==='string'&&obj.startsWith('idb://')&&map[obj])return map[obj];
  return obj;
};

const POMO_LS = 'boardhub_pomo_v3';

const pomoLoad = function() {
  try {
    var s = localStorage.getItem(POMO_LS);
    if (s) {
      var parsed = JSON.parse(s);
      // Migrate old format that used dailySeconds/historicalSeconds
      if (typeof parsed.dailySeconds !== 'undefined') {
        var today2 = new Date().toISOString().slice(0, 10);
        var days2 = {};
        if (parsed.dailySeconds > 0) days2[today2] = parsed.dailySeconds;
        return { days: days2 };
      }
      return parsed;
    }
    // Try older key
    var old = localStorage.getItem('boardhub_pomodoro_stats');
    if (old) {
      var p2 = JSON.parse(old);
      var t2 = new Date().toISOString().slice(0, 10);
      var d2 = {};
      if (p2.dailySeconds > 0) d2[t2] = p2.dailySeconds;
      return { days: d2 };
    }
  } catch(e) {}
  return { days: {} };
};

const pomoSave = function(d) {
  try { localStorage.setItem(POMO_LS, JSON.stringify(d)); } catch(e) {}
};

const pomoTodayKey = function() {
  return new Date().toISOString().slice(0, 10);
};

const pomoFmtSecs = function(secs) {
  var h = Math.floor(secs / 3600);
  var m = Math.floor((secs % 3600) / 60);
  if (h > 0) return h + 'h ' + m + 'm';
  if (m > 0) return m + 'm';
  return secs + 's';
};

const pomoFmtDay = function(dateStr) {
  try {
    var d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('pt-BR', { weekday: 'short', day: 'numeric', month: 'short' });
  } catch(e) { return dateStr; }
};

const pomoFmtMonth = function(mk) {
  try {
    var parts = mk.split('-');
    return new Date(+parts[0], +parts[1]-1, 1).toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
  } catch(e) { return mk; }
};

// Web Audio sounds — elevator music aesthetic
// Shared AudioContext — avoids browser's ~6 concurrent context limit
let _sharedAudioCtx = null;
const _getAudioCtx = () => {
  try {
    if (!_sharedAudioCtx || _sharedAudioCtx.state === 'closed') {
      _sharedAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (_sharedAudioCtx.state === 'suspended') _sharedAudioCtx.resume();
    return _sharedAudioCtx;
  } catch(e) { return null; }
};
// _playNote used by medal sounds (routes to ctx.destination directly)
const _playNote = (ctx, freq, startT, vol, decay, type='triangle', detune=0) => {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, startT);
  if(detune) osc.detune.setValueAtTime(detune, startT);
  gain.gain.setValueAtTime(0, startT);
  gain.gain.linearRampToValueAtTime(vol, startT + 0.018);
  gain.gain.exponentialRampToValueAtTime(0.001, startT + decay);
  osc.start(startT); osc.stop(startT + decay + 0.05);
};

// Convolution reverb — creates a warm, roomy ambience
const _makeReverb = (ctx, secs=1.8) => {
  const len = Math.ceil(ctx.sampleRate * secs);
  const buf = ctx.createBuffer(2, len, ctx.sampleRate);
  for(let ch=0; ch<2; ch++){
    const d = buf.getChannelData(ch);
    for(let i=0; i<len; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 2.2) * 0.5;
  }
  const conv = ctx.createConvolver();
  conv.buffer = buf;
  return conv;
};

const playPomoSound = (type) => {
  try {
    const ctx = _getAudioCtx();
    if (!ctx) return;

    // Reverb wet/dry chain
    const reverb   = _makeReverb(ctx);
    const dryBus   = ctx.createGain();
    const wetBus   = ctx.createGain();
    dryBus.gain.value = 0.62;
    wetBus.gain.value = 0.42;
    reverb.connect(wetBus);
    wetBus.connect(ctx.destination);
    dryBus.connect(ctx.destination);

    // All notes feed into this bus → split to dry + reverb
    const bus = ctx.createGain();
    bus.connect(dryBus);
    bus.connect(reverb);

    const note = (freq, t, vol, decay, type='triangle', detune=0) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(bus);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t);
      if(detune) osc.detune.setValueAtTime(detune, t);
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(vol, t + 0.04);   // soft mallet attack
      gain.gain.exponentialRampToValueAtTime(0.001, t + decay);
      osc.start(t); osc.stop(t + decay + 0.15);
    };

    const T = ctx.currentTime;

    if (type === 'work_end') {
      // Grand lobby chime — lush Cmaj9 descending arpeggio, 5 notes over ~1.5s
      // B4 → G4 → E4 → C4 → G3  (warm, resolved, "you may proceed")
      [
        [493.88, 0.00, 0.24, 2.8],
        [392.00, 0.30, 0.22, 2.6],
        [329.63, 0.60, 0.21, 2.5],
        [261.63, 0.90, 0.20, 2.4],
        [196.00, 1.20, 0.16, 2.2],
      ].forEach(([f,dt,v,d]) => {
        note(f,  T+dt, v,    d,      'triangle');
        note(f,  T+dt, v*0.15, d*0.7, 'sine', 3); // warmth shimmer
      });
    } else if (type === 'break_end') {
      // Single resonant lobby ding — A5, clean and clear with a fading bloom
      note(880.00, T,      0.22, 3.0, 'triangle');
      note(880.00, T,      0.09, 2.2, 'sine', 2.5);
      note(1174.66,T+0.01, 0.06, 1.8, 'sine');        // soft maj3rd overtone
    } else if (type === 'pause') {
      // Two descending notes — a settling "going down" fifth, G4→D4
      note(392.00, T,      0.16, 1.4, 'triangle');
      note(293.66, T+0.22, 0.14, 1.3, 'triangle');
    } else if (type === 'start') {
      // Rising pentatonic triad — C5→E5→G5, optimistic lift
      note(523.25, T,      0.18, 1.5, 'triangle');
      note(659.25, T+0.20, 0.18, 1.5, 'triangle');
      note(783.99, T+0.40, 0.20, 1.7, 'triangle');
    }
  } catch(e) {}
};

// Medal achievement sounds — escalating celebration
const playMedalSound = (level) => {
  try {
    const ctx = _getAudioCtx();
    if (!ctx) return;
    const t0 = ctx.currentTime;
    if (level === 'bronze') {
      // Warm 3-note rise — modest win
      [[523.25,0],[659.25,.18],[783.99,.36]].forEach(([f,dt])=>{
        _playNote(ctx, f, t0+dt, 0.28, 1.0, 'triangle');
      });
    } else if (level === 'silver') {
      // Sparkling 4-note shimmer
      [[587.33,0],[739.99,.16],[880,.32],[1046.5,.48]].forEach(([f,dt])=>{
        _playNote(ctx, f, t0+dt, 0.26, 1.2, 'triangle');
        _playNote(ctx, f, t0+dt, 0.10, 0.9, 'sine', 6);
      });
    } else if (level === 'golden') {
      // Triumphant fanfare — ascending chord + harmony
      const melody = [[523.25,0],[659.25,.14],[783.99,.28],[1046.5,.42],[1318.5,.56]];
      const harmony = [[659.25,0],[783.99,.14],[987.77,.28],[1244,.42],[1567,.56]];
      melody.forEach(([f,dt])=>{ _playNote(ctx, f, t0+dt, 0.28, 1.4, 'triangle'); });
      harmony.forEach(([f,dt])=>{ _playNote(ctx, f, t0+dt, 0.12, 1.0, 'sine', 8); });
      // final chord bloom
      [523.25,659.25,783.99].forEach(f=>{ _playNote(ctx, f*2, t0+0.78, 0.14, 1.8, 'triangle'); });
    } else if (level === 'diamond') {
      // Full cascading celebration
      const cascade = [
        [523.25,0],[659.25,.1],[783.99,.2],[987.77,.3],[1174.66,.4],
        [1318.5,.5],[1567.98,.6],[2093,.7]
      ];
      cascade.forEach(([f,dt],i)=>{
        _playNote(ctx, f, t0+dt, 0.24, 1.6, 'triangle');
        _playNote(ctx, f, t0+dt, 0.10, 1.2, 'sine', 5);
      });
      // Rich chord at peak
      [523.25,659.25,783.99,1046.5].forEach((f,i)=>{
        _playNote(ctx, f*2, t0+0.85+i*0.06, 0.16, 2.2, 'triangle');
      });
    }
  } catch(e) {}
};

const PomodoroTimer = ({ pomoData, setPomoData }) => {
  const FOCUS_SECS = 30 * 60;
  const BREAK_SECS = 5 * 60;

  // Restore persisted timer state (survives tab switches and browser minimize)
  const _initState = () => {
    const saved = pomoTimerLoad();
    if (saved && saved.isActive && saved.endTimestamp) {
      const remaining = Math.max(0, Math.ceil((saved.endTimestamp - Date.now()) / 1000));
      return { timeLeft: remaining, isActive: remaining > 0, mode: saved.mode || 'focus', endTimestamp: saved.endTimestamp };
    }
    if (saved) return { timeLeft: saved.timeLeft ?? FOCUS_SECS, isActive: false, mode: saved.mode || 'focus', endTimestamp: null };
    return { timeLeft: FOCUS_SECS, isActive: false, mode: 'focus', endTimestamp: null };
  };
  const _init = _initState();

  const [timeLeft, setTimeLeft] = useState(_init.timeLeft);
  const [isActive, setIsActive] = useState(_init.isActive);
  const [mode, setMode] = useState(_init.mode);
  const [showStats, setShowStats] = useState(false);
  const modeRef = useRef(mode);
  const timeLeftRef = useRef(_init.timeLeft);
  const isActiveRef = useRef(_init.isActive);
  const unsavedSecsRef = useRef(0);
  const pendingSecsRef = useRef(0);
  const [displayUnsaved,setDisplayUnsaved]=useState(0); // mirrors unsavedSecsRef for re-render
  const endTimestampRef = useRef(_init.endTimestamp ?? (_init.isActive ? (Date.now() + _init.timeLeft * 1000) : null));
  modeRef.current = mode;
  timeLeftRef.current = timeLeft;
  isActiveRef.current = isActive;

  const requestNotifPermission = () => {
    if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
  };
  const fireNotification = (title, body) => {
    if ('Notification' in window && Notification.permission === 'granted') new Notification(title, { body, icon: '' });
  };

  // Persist timer state to localStorage so background tabs stay in sync
  const persistTimerState = (active, tLeft, m) => {
    if (active && tLeft > 0) {
      pomoTimerSave({ isActive: true, mode: m, endTimestamp: Date.now() + tLeft * 1000, timeLeft: tLeft });
    } else {
      pomoTimerSave({ isActive: false, mode: m, timeLeft: tLeft });
    }
  };

  // Flush unsaved seconds to state — stored in a ref so effects always call the latest version
  const flushPomoSecsRef = useRef(null);
  flushPomoSecsRef.current = () => {
    if (unsavedSecsRef.current > 0) {
      const secs = unsavedSecsRef.current;
      unsavedSecsRef.current = 0;
      setDisplayUnsaved(0);
      pendingSecsRef.current += secs;
      setPomoData(prev => {
        const key = pomoTodayKey();
        const newDays = { ...prev.days };
        newDays[key] = (newDays[key] || 0) + secs;
        pendingSecsRef.current = Math.max(0, pendingSecsRef.current - secs);
        return { days: newDays };
      });
    }
  };
  const flushPomoSecs = () => flushPomoSecsRef.current && flushPomoSecsRef.current();

  // Flush on unmount or when timer stops
  useEffect(() => {
    return () => flushPomoSecsRef.current && flushPomoSecsRef.current();
  }, [isActive]);

  // Recalculate elapsed time when tab becomes visible again
  useEffect(() => {
    const onVisible = () => {
      if (document.visibilityState === 'visible' && isActiveRef.current && endTimestampRef.current) {
        const remaining = Math.max(0, Math.ceil((endTimestampRef.current - Date.now()) / 1000));
        setTimeLeft(remaining);
        timeLeftRef.current = remaining;
      }
    };
    document.addEventListener('visibilitychange', onVisible);
    return () => document.removeEventListener('visibilitychange', onVisible);
  }, []);

  useEffect(() => {
    if (!isActive) return;
    // Only anchor if not already set (toggle() or localStorage restore already set it)
    if (!endTimestampRef.current) {
      endTimestampRef.current = Date.now() + timeLeftRef.current * 1000;
    }
    persistTimerState(true, timeLeftRef.current, modeRef.current);

    const id = setInterval(() => {
      // Always derive time from wall clock — immune to tab throttling
      const remaining = endTimestampRef.current
        ? Math.max(0, Math.ceil((endTimestampRef.current - Date.now()) / 1000))
        : timeLeftRef.current - 1;

      if (remaining <= 0) {
        if (modeRef.current === 'focus') {
          flushPomoSecs();
          playPomoSound('work_end');
          fireNotification('Pomodoro', 'Sessão de foco encerrada! Hora de pausar. ☕');
          setMode('break');
          modeRef.current = 'break';
          setTimeLeft(BREAK_SECS);
          timeLeftRef.current = BREAK_SECS;
          // Auto-start break — reset end anchor and keep interval running
          endTimestampRef.current = Date.now() + BREAK_SECS * 1000;
          persistTimerState(true, BREAK_SECS, 'break');
          return; // interval keeps running
        } else {
          clearInterval(id);
          playPomoSound('break_end');
          fireNotification('Pomodoro', 'Pausa encerrada! Pronto para focar?');
          setMode('focus');
          modeRef.current = 'focus';
          setTimeLeft(FOCUS_SECS);
          timeLeftRef.current = FOCUS_SECS;
          setIsActive(false);
          endTimestampRef.current = null;
          persistTimerState(false, FOCUS_SECS, 'focus');
          return;
        }
      }

      setTimeLeft(remaining);
      if (modeRef.current === 'focus') {
        const prev = timeLeftRef.current;
        const delta = Math.max(0, prev - remaining);
        unsavedSecsRef.current += delta;
        setDisplayUnsaved(unsavedSecsRef.current); // trigger re-render for "Hoje" counter
        if (unsavedSecsRef.current >= 30) flushPomoSecs();
      }
      timeLeftRef.current = remaining;
      // Refresh persist every ~10s
      if (remaining % 10 === 0) persistTimerState(true, remaining, modeRef.current);
    }, 500); // Poll every 500ms for snappy display; wall-clock corrects drift
    return () => clearInterval(id);
  }, [isActive]);

  const toggle = () => {
    requestNotifPermission();
    setIsActive(a => {
      const next = !a;
      if (next) {
        // Starting — set end anchor
        playPomoSound('start');
        endTimestampRef.current = Date.now() + timeLeftRef.current * 1000;
        persistTimerState(true, timeLeftRef.current, modeRef.current);
      } else {
        // Pausing
        playPomoSound('pause');
        endTimestampRef.current = null;
        persistTimerState(false, timeLeftRef.current, modeRef.current);
        flushPomoSecs();
      }
      return next;
    });
  };
  const reset = () => {
    setIsActive(false);
    endTimestampRef.current = null;
    setMode('focus');
    modeRef.current = 'focus';
    setTimeLeft(FOCUS_SECS);
    timeLeftRef.current = FOCUS_SECS;
    persistTimerState(false, FOCUS_SECS, 'focus');
    flushPomoSecs();
  };

  const mins = Math.floor(timeLeft / 60);
  const secs = timeLeft % 60;
  const timeStr = (mins < 10 ? '0' : '') + mins + ':' + (secs < 10 ? '0' : '') + secs;
  const pct = mode === 'focus' ? timeLeft / FOCUS_SECS : timeLeft / BREAK_SECS;
  const isFocus = mode === 'focus';
  const todaySecs = ((pomoData.days || {})[pomoTodayKey()]) || 0;
  const todayDisplay = todaySecs + displayUnsaved + pendingSecsRef.current;

  // Day medal tiers — Bronze: 2h, Silver: 4h, Gold: 6h, Diamond: 8h
  const DAY_TIERS = [
    { level: 'none',    icon: '⭐', name: 'Iniciante', color: 'var(--muted)', floor: 0        },
    { level: 'bronze',  icon: '🥉', name: 'Bronze',    color: '#CD7F32',      floor: 2 * 3600 },
    { level: 'silver',  icon: '🥈', name: 'Prata',     color: '#94A3B8',      floor: 4 * 3600 },
    { level: 'golden',  icon: '🏆', name: 'Ouro',      color: '#FBBF24',      floor: 6 * 3600 },
    { level: 'diamond', icon: '💎', name: 'Diamante',  color: '#60A5FA',      floor: 8 * 3600 },
  ];
  const getStarLevel = (secs) => {
    for (let i = DAY_TIERS.length - 1; i >= 0; i--)
      if (secs >= DAY_TIERS[i].floor) return DAY_TIERS[i];
    return DAY_TIERS[0];
  };

  const currentStar = getStarLevel(todayDisplay);
  const prevStarLevelRef = React.useRef(currentStar.level);
  React.useEffect(()=>{
    if(prevStarLevelRef.current !== currentStar.level && currentStar.level !== 'none'){
      playMedalSound(currentStar.level);
    }
    prevStarLevelRef.current = currentStar.level;
  },[currentStar.level]);
  const nextStarTier = DAY_TIERS.find(t => t.floor > currentStar.floor) || null;
  const nextStar = nextStarTier || null;
  const progressToNext = nextStarTier
    ? Math.min(100, ((todayDisplay - currentStar.floor) / (nextStarTier.floor - currentStar.floor)) * 100)
    : 100;

  // Month medal tiers — Bronze: 40h, Silver: 80h, Gold: 120h, Diamond: 160h
  const MONTH_TIERS = [
    { level: 'none',    icon: '⭐', name: 'Iniciante', color: 'var(--muted)', floor: 0          },
    { level: 'bronze',  icon: '🥉', name: 'Bronze',    color: '#CD7F32',      floor: 40 * 3600  },
    { level: 'silver',  icon: '🥈', name: 'Prata',     color: '#94A3B8',      floor: 80 * 3600  },
    { level: 'golden',  icon: '🏆', name: 'Ouro',      color: '#FBBF24',      floor: 120 * 3600 },
    { level: 'diamond', icon: '💎', name: 'Diamante',  color: '#60A5FA',      floor: 160 * 3600 },
  ];
  const getMonthMedal = (secs) => {
    for (let i = MONTH_TIERS.length - 1; i >= 0; i--)
      if (secs >= MONTH_TIERS[i].floor) return MONTH_TIERS[i];
    return MONTH_TIERS[0];
  };

  // - Stats data -
  const dayEntries = useMemo(() => {
    const entries = Object.entries(pomoData.days || {});
    const filtered = entries.filter(e => e[0] !== '_total' && e[0].length === 10 && e[1] > 0);
    filtered.sort((a, b) => b[0].localeCompare(a[0]));
    return filtered.slice(0, 60);
  }, [pomoData]);

  const monthEntries = useMemo(() => {
    const months = {};
    for (const [day, s] of Object.entries(pomoData.days || {})) {
      if (day === '_total' || day.length !== 10) continue;
      const mk = day.slice(0, 7);
      months[mk] = (months[mk] || 0) + s;
    }
    const result = Object.entries(months);
    result.sort((a, b) => b[0].localeCompare(a[0]));
    return result;
  }, [pomoData]);

  const [statsTab, setStatsTab] = useState('days');
  const maxDay   = dayEntries.reduce((m, e) => Math.max(m, e[1]), 1);
  const maxMonth = monthEntries.reduce((m, e) => Math.max(m, e[1]), 1);
  const totalAll = dayEntries.reduce((sum, e) => sum + e[1], 0);

  return (
    <div style={{marginBottom:0}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:7}}>
        <span className="label">Pomodoro</span>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{display:'inline-flex',alignItems:'center',gap:6,padding:'3px 10px',borderRadius:20,background:isFocus?'rgba(28,25,23,.06)':'#E8F5EC',color:isFocus?'var(--muted)':'#276b3e',fontSize:'.7rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.07em'}}>
            <Icon name={isFocus?'brain':'coffee'} size={11}/>
            {isFocus ? 'Foco' : 'Pausa'}
          </div>
          <button
            className="btn btn-ghost"
            onClick={()=>setShowStats(s=>!s)}
            title="Histórico de foco"
            style={{padding:'4px 8px',borderRadius:6,background:showStats?'var(--text)':'transparent',color:showStats?'white':'var(--muted)'}}
          >
            <Icon name="timer" size={14}/>
          </button>
        </div>
      </div>

      {/* Timer card */}
      {!showStats && (
        <div className="card" style={{padding:'12px 16px',display:'flex',alignItems:'center',gap:14}}>
          <div style={{position:'relative',width:76,height:76,flexShrink:0}}>
            <svg width="76" height="76" style={{position:'absolute',top:0,left:0,transform:'rotate(-90deg)'}}>
              <circle cx="38" cy="38" r={34} fill="none" stroke="var(--border)" strokeWidth="4"/>
              <circle cx="38" cy="38" r={34} fill="none" stroke={isFocus?'var(--text)':'#276b3e'} strokeWidth="4" strokeDasharray={2*Math.PI*34} strokeDashoffset={2*Math.PI*34*(1-pct)} strokeLinecap="round" style={{transition:'stroke-dashoffset .8s cubic-bezier(.4,0,.2,1),stroke .4s'}}/>
            </svg>
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <span style={{fontFamily:'Cormorant Garamond,serif',fontSize:'1.25rem',fontWeight:500,letterSpacing:'-0.02em'}}>{timeStr}</span>
            </div>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:5}}>
              <button className="btn btn-outline" onClick={toggle} style={{flex:1,justifyContent:'center',padding:'5px 10px',fontSize:'.78rem'}}>
                <Icon name={isActive?'pause':'play'} size={12}/>
                {isActive ? 'Pausar' : (isFocus ? 'Iniciar' : 'Retomar')}
              </button>
              <button className="btn btn-ghost" onClick={reset} title="Reiniciar" style={{padding:5}}>
                <Icon name="rotate-ccw" size={13}/>
              </button>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:4}}>
              <div style={{fontSize:'.67rem',color:'var(--muted)',display:'flex',alignItems:'center',gap:4}}>
                <Icon name="clock" size={10}/> Hoje: <strong style={{color:'var(--text)'}}>{pomoFmtSecs(todayDisplay)}</strong> em foco
              </div>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <div style={{display:'flex',alignItems:'center',gap:3,padding:'2px 6px',borderRadius:12,background:currentStar.level==='none'?'var(--bg)':currentStar.color+'20',border:`1px solid ${currentStar.level==='none'?'var(--border)':currentStar.color+'40'}`}}>
                  <span style={{fontSize:'.95rem',lineHeight:1}}>{currentStar.icon}</span>
                  <span style={{fontSize:'.62rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.05em',color:currentStar.level==='none'?'var(--muted)':currentStar.color}}>{currentStar.name}</span>
                </div>
                {nextStar && (
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{height:3,background:'var(--bg)',borderRadius:2,overflow:'hidden',position:'relative'}}>
                      <div style={{height:'100%',width:Math.min(100,progressToNext)+'%',background:currentStar.color,borderRadius:2,transition:'width 0.5s ease'}}/>
                    </div>
                    <div style={{fontSize:'.58rem',color:'var(--muted)',marginTop:1,textAlign:'right'}}>{Math.round(progressToNext)}% → {nextStar.name}</div>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Stats panel - replaces timer card inline */}
      {showStats && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setShowStats(false)}>
          <div style={{background:'var(--surface)',borderRadius:18,border:'1px solid var(--border)',width:'100%',maxWidth:440,maxHeight:'80vh',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(28,25,23,.15)',overflow:'hidden'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'20px 24px',borderBottom:'1px solid var(--border)',flexShrink:0}}>
              <h2 className="serif" style={{fontSize:'1.5rem',fontWeight:400,margin:0}}>Historico de Foco</h2>
              <button className="btn btn-ghost" onClick={()=>setShowStats(false)} style={{padding:6}}><Icon name="x" size={18}/></button>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',borderBottom:'1px solid var(--border)',flexShrink:0}}>
              <div style={{padding:'14px 20px',textAlign:'center',borderRight:'1px solid var(--border)'}}>
                <div style={{fontSize:'.6rem',textTransform:'uppercase',letterSpacing:'.08em',color:'var(--muted)',marginBottom:4}}>Hoje</div>
                <div style={{fontSize:'1.2rem',fontWeight:600,fontFamily:'Cormorant Garamond,serif'}}>{pomoFmtSecs(todayDisplay)}</div>
              </div>
              <div style={{padding:'14px 20px',textAlign:'center',borderRight:'1px solid var(--border)'}}>
                <div style={{fontSize:'.6rem',textTransform:'uppercase',letterSpacing:'.08em',color:'var(--muted)',marginBottom:4}}>Estrela</div>
                <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
                  <span style={{fontSize:'1.5rem',lineHeight:1}}>{currentStar.icon}</span>
                  <span style={{fontSize:'.75rem',fontWeight:700,color:currentStar.color}}>{currentStar.name}</span>
                </div>
              </div>
              <div style={{padding:'14px 20px',textAlign:'center'}}>
                <div style={{fontSize:'.6rem',textTransform:'uppercase',letterSpacing:'.08em',color:'var(--muted)',marginBottom:4}}>Total</div>
                <div style={{fontSize:'1.2rem',fontWeight:600,fontFamily:'Cormorant Garamond,serif'}}>{pomoFmtSecs(totalAll)}</div>
              </div>
            </div>
            <div style={{display:'flex',borderBottom:'1px solid var(--border)',flexShrink:0}}>
              {['days','months'].map(t=>(
                <button key={t} onClick={()=>setStatsTab(t)} style={{flex:1,padding:'10px 0',border:'none',background:'none',cursor:'pointer',fontFamily:'Figtree,sans-serif',fontSize:'.82rem',fontWeight:500,color:statsTab===t?'var(--text)':'var(--muted)',borderBottom:statsTab===t?'2px solid var(--text)':'2px solid transparent',marginBottom:-1,transition:'all .15s'}}>
                  {t==='days'?'Por Dia':'Por Mes'}
                </button>
              ))}
            </div>
            <div style={{flex:1,overflowY:'auto',padding:'16px 24px'}}>
              {statsTab==='days'&&(dayEntries.length===0
                ?<p style={{fontSize:'.85rem',color:'var(--muted)',textAlign:'center',padding:'32px 0',margin:0}}>Nenhuma sessao registrada.</p>
                :<div style={{display:'flex',flexDirection:'column',gap:12}}>
                  {dayEntries.map(([day,s])=>{
                    const dayStar = getStarLevel(s);
                    return(
                    <div key={day}>
                      <div style={{display:'flex',justifyContent:'space-between',marginBottom:4,alignItems:'center'}}>
                        <div style={{display:'flex',alignItems:'center',gap:6}}>
                          <span style={{fontSize:'.82rem',fontWeight:500}}>{pomoFmtDay(day)}</span>
                          {dayStar.level !== 'none' && (
                            <span style={{fontSize:'.9rem',lineHeight:1}} title={dayStar.name}>{dayStar.icon}</span>
                          )}
                        </div>
                        <span style={{fontSize:'.82rem',fontWeight:600}}>{pomoFmtSecs(s)}</span>
                      </div>
                      <div style={{height:5,background:'var(--bg)',borderRadius:3,overflow:'hidden'}}>
                        <div style={{height:'100%',width:Math.round(s/maxDay*100)+'%',background:dayStar.level !== 'none' ? dayStar.color : 'var(--text)',borderRadius:3}}/>
                      </div>
                    </div>
                  )})}
                </div>
              )}
              {statsTab==='months'&&(monthEntries.length===0
                ?<p style={{fontSize:'.85rem',color:'var(--muted)',textAlign:'center',padding:'32px 0',margin:0}}>Nenhuma sessao registrada.</p>
                :<div style={{display:'flex',flexDirection:'column',gap:16}}>
                  {monthEntries.map(([mk,s])=>{
                    const daysInMonth=dayEntries.filter(e=>e[0].slice(0,7)===mk);
                    const mMedal=getMonthMedal(s);
                    const mNext=MONTH_TIERS.find(t=>t.floor>mMedal.floor)||null;
                    const mPct=mNext?Math.min(100,((s-mMedal.floor)/(mNext.floor-mMedal.floor))*100):100;
                    return(
                      <div key={mk}>
                        <div style={{display:'flex',justifyContent:'space-between',marginBottom:4,alignItems:'center'}}>
                          <div style={{display:'flex',alignItems:'center',gap:6}}>
                            <span style={{fontSize:'.85rem',fontWeight:600,textTransform:'capitalize'}}>{pomoFmtMonth(mk)}</span>
                            <span title={mMedal.name} style={{fontSize:'1rem',lineHeight:1}}>{mMedal.icon}</span>
                          </div>
                          <span style={{fontSize:'.85rem',fontWeight:700}}>{pomoFmtSecs(s)}</span>
                        </div>
                        <div style={{height:6,background:'var(--bg)',borderRadius:3,overflow:'hidden',marginBottom:2}}>
                          <div style={{height:'100%',width:mPct+'%',background:mMedal.level!=='none'?mMedal.color:'var(--muted)',borderRadius:3,transition:'width .3s'}}/>
                        </div>
                        {mNext&&<div style={{fontSize:'.6rem',color:'var(--muted)',marginBottom:6,textAlign:'right'}}>{Math.round(mPct)}% → {mNext.name}</div>}
                        <div style={{paddingLeft:8}}>
                          {daysInMonth.map(([d,ds])=>(
                            <div key={d} style={{display:'flex',justifyContent:'space-between',padding:'2px 0'}}>
                              <span style={{fontSize:'.74rem',color:'var(--muted)'}}>{pomoFmtDay(d)}</span>
                              <span style={{fontSize:'.74rem',color:'var(--muted)'}}>{pomoFmtSecs(ds)}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// Drag-to-reorder hook — used by IdeasLab, Clients, Mentors
const useDragReorder = (setList) => {
  const srcId = useRef(null);
  const [dragId,  setDragId]  = useState(null);
  const [overId,  setOverId]  = useState(null);
  const start = (e, id) => {
    srcId.current = id; setDragId(id);
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', String(id));
  };
  const over = (e, id) => { e.preventDefault(); e.dataTransfer.dropEffect='move'; setOverId(id); };
  const drop = (e, id) => {
    e.preventDefault(); setOverId(null); setDragId(null);
    if (!srcId.current || srcId.current === id) { srcId.current = null; return; }
    setList(prev => {
      const arr = [...prev];
      const fi = arr.findIndex(x => x.id === srcId.current);
      const ti = arr.findIndex(x => x.id === id);
      if (fi < 0 || ti < 0) return prev;
      const [item] = arr.splice(fi, 1);
      arr.splice(ti, 0, item);
      return arr;
    });
    srcId.current = null;
  };
  const end = () => { srcId.current = null; setDragId(null); setOverId(null); };
  return { start, over, drop, end, dragId, overId };
};

                <div key={p.id} className="compact-row" onClick={()=>onSelect(p)}>
                  <div className="compact-row-thumb">
                    {p.cover
                      ?<Img src={p.cover} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
                      :<div style={{width:'100%',height:'100%',background:'var(--bg)'}}/>
                    }
                  </div>
                  <div className="compact-row-info">
                    <div className="compact-row-title">{p.title}</div>
                    <div className="compact-row-meta">{p.client} · <span className={`tag ${statusTag(p.status)}`} style={{display:'inline',padding:'1px 6px',fontSize:'.65rem'}}>{p.status}</span></div>
                  </div>
                  <Icon name="chevron-right" size={16} style={{color:'var(--muted)',flexShrink:0}}/>
                </div>
              ))}
              {visible.length===0&&<div style={{textAlign:'center',padding:40,color:'var(--muted)',fontSize:'.9rem'}}>Nenhum projeto encontrado.</div>}
            </div>
          ):(
            /* Desktop: card grid (and trash on both) */
            <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'repeat(3,1fr)',gap:isMobile?12:16}}>
            {visible.map(p=>(
              <div key={p.id} className="card" style={{overflow:'hidden',display:'flex',flexDirection:'column',cursor:trash?'default':'pointer',opacity:trash?0.85:1,position:'relative'}}
                onClick={()=>!trash&&onSelect(p)}>
                {!trash&&(
                  <button onClick={e=>{e.stopPropagation();softDelete(p.id);}} title="Mover para lixeira"
                    className="card-delete-btn">
                    <Icon name="trash-2" size={12}/>
                  </button>
                )}
                <div style={{height:140,position:'relative',backgroundColor:'#E8E3DC'}}>
                  <BgImg src={p.cover} style={{position:'absolute',inset:0,width:'100%',height:'100%',backgroundSize:'cover',backgroundPosition:'center'}}/>
                  <div style={{position:'absolute',top:10,right:10,background:'rgba(252,251,249,.92)',backdropFilter:'blur(4px)',borderRadius:5,padding:'3px 8px'}}>
                    <span style={{fontSize:'.65rem',fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--muted)'}}>{p.type==='work'?'Trabalho':'Pessoal'}</span>
                  </div>
                </div>
                <div style={{padding:'16px 18px',flex:1,display:'flex',flexDirection:'column',justifyContent:'space-between'}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:'.92rem',marginBottom:3}}>{p.title}</div>
                    <div style={{fontSize:'.75rem',color:'var(--muted)'}}>{p.client}</div>
                  </div>
                  {!trash?(
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:14,paddingTop:12,borderTop:'1px solid var(--border)'}}>
                      <span className={`tag ${statusTag(p.status)}`}>{p.status}</span>
                      <span style={{fontSize:'.72rem',color:'var(--muted)'}}>{p.deadline}</span>
                    </div>
                  ):(
                    <div style={{marginTop:14,paddingTop:12,borderTop:'1px solid var(--border)',display:'flex',gap:6}}>
                      <button onClick={e=>{e.stopPropagation();restore(p.id);}} className="btn btn-outline" style={{flex:1,justifyContent:'center',padding:'5px 0',fontSize:'.78rem'}}><Icon name="refresh-cw" size={11}/> Restaurar</button>
                      <button onClick={e=>{e.stopPropagation();hardDelete(p.id);}} className="btn btn-danger" style={{flex:1,justifyContent:'center',padding:'5px 0',fontSize:'.78rem'}}><Icon name="trash-2" size={11}/> Excluir</button>
                    </div>
                  )}
                </div>
              </div>
            ))}
            {visible.length===0&&<div style={{gridColumn:'1/-1',textAlign:'center',padding:48,color:'var(--muted)',fontSize:'.9rem'}}>{trash?'Lixeira vazia.':'Nenhum projeto encontrado.'}</div>}
            </div>
          )}
        </div>

        {/* RIGHT: tasks sidebar hub - hidden on mobile */}
        {!trash&&!isMobile&&(
          <div style={{width:280,flexShrink:0,position:'sticky',top:48}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
              <span className="label">Tarefas Pendentes</span>
              <span style={{fontSize:'.7rem',color:'var(--muted)',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:20,padding:'1px 8px'}}>
                {activeProjsWithTasks.reduce((s,p)=>(s+(p.projectTasks||[]).filter(t=>t.status!=='Concluído').length),0)}
              </span>
            </div>
            {activeProjsWithTasks.length===0?(
              <div className="card" style={{padding:'24px 20px',textAlign:'center'}}>
                <Icon name="check-circle" size={24} style={{display:'block',margin:'0 auto 10px',opacity:.25}}/>
                <p style={{fontSize:'.82rem',color:'var(--muted)',margin:0}}>Nenhuma tarefa pendente.</p>
              </div>
            ):(
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {activeProjsWithTasks.map(p=>{
                  const pending=(p.projectTasks||[]).filter(t=>t.status!=='Concluído')
                    .sort((a,b)=>PTASK_STATUS_ORDER.indexOf(a.status)-PTASK_STATUS_ORDER.indexOf(b.status));
                  return(
                    <div key={p.id} className="card" style={{padding:'14px 16px',overflow:'hidden'}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,paddingBottom:10,borderBottom:'1px solid var(--border)'}}>
                        <BgImg src={p.cover} style={{width:20,height:20,borderRadius:5,flexShrink:0,backgroundSize:'cover',backgroundPosition:'center',backgroundColor:'var(--bg)'}}/>
                        <span style={{fontWeight:600,fontSize:'.78rem',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.title}</span>
                        <span style={{fontSize:'.68rem',color:'var(--muted)',flexShrink:0}}>{pending.length}</span>
                      </div>
                      <div style={{display:'flex',flexDirection:'column',gap:5}}>
                        {pending.map(t=>(
                          <div key={t.id} style={{display:'flex',alignItems:'flex-start',gap:7}}>
                            <span style={{display:'inline-block',flexShrink:0,fontSize:'.58rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.05em',padding:'2px 6px',borderRadius:3,marginTop:1,background:statusBg[t.status]||'#F0EDE9',color:statusColor[t.status]||'var(--muted)'}}>
                              {t.status}
                            </span>
                            <span style={{fontSize:'.78rem',color:'var(--text)',lineHeight:1.4}}>{t.text}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
});

      <Icon name="plus" size={12}/> Adicionar mentor
    </button>
  );
  const save=()=>{
    if(!name.trim())return;
    const mentor={id:Date.now(),name:name.trim(),area:area.trim(),medium:'',notes:'',links:'',active:true,main:false,photo:'',photos:[],deleted:false};

      <button onClick={save} className="btn btn-dark" style={{padding:'6px 12px',fontSize:'.78rem'}}><Icon name="check" size={12}/></button>
