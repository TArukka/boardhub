<title>BoardHub — Storyboard OS</title>
<!--
  BoardHub v17 — Responsive Build
  Inherits all v16 optimizations plus:
  • Auto-detects mobile via matchMedia hook (768px breakpoint)
  • Desktop: fixed sidebar, full layouts
  • Mobile: hamburger drawer, stacked columns, list→detail navigation
  • All grids collapse to 1-column on mobile
  • Gantt chart wraps in horizontal scroll container
  • ProjectDetail cover compact, Animatics/Research use list→editor pattern
  • IdeasLab: note list + tasks stack vertically, detail replaces list
  • All modals slide up as bottom sheets on mobile
  • Tab bars scroll horizontally on mobile
  • Touch-friendly: larger tap targets via CSS media queries
-->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F4F1ED;--surface:#FDFCFA;--border:#E8E3DC;--border-2:#D5CCBF;--text:#1C1917;--muted:#78716C;}
*,*::before,*::after{box-sizing:border-box;}
body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--text);margin:0;}
h1,h2,h3,.serif{font-family:'Cormorant Garamond',serif;}
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:10px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;transition:border-color .2s,box-shadow .2s;}
.card:hover{border-color:var(--border-2);box-shadow:0 4px 20px rgba(28,25,23,.05);}
.card-click{cursor:pointer;}.card-click:hover{border-color:var(--text)!important;box-shadow:0 4px 20px rgba(28,25,23,.07)!important;}
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:8px;font-family:'Figtree',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .18s;border:none;outline:none;}
.btn-dark{background:var(--text);color:white;}.btn-dark:hover{opacity:.85;transform:translateY(-1px);}
.btn-outline{background:transparent;color:var(--muted);border:1px solid var(--border);}.btn-outline:hover{border-color:var(--text);color:var(--text);}
.btn-ghost{background:transparent;color:var(--muted);border:none;padding:6px 10px;border-radius:6px;}.btn-ghost:hover{color:var(--text);background:var(--bg);}
.btn-danger{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA;}.btn-danger:hover{background:#FEE2E2;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:.85rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;background:transparent;border:none;outline:none;width:100%;font-family:'Figtree',sans-serif;letter-spacing:.01em;}
.nav-item:hover{background:rgba(28,25,23,.05);color:var(--text);}.nav-item.active{background:var(--text);color:white;}
.tag{display:inline-block;font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;padding:3px 8px;border-radius:4px;}
.tag-green{background:#E8F5EC;color:#276b3e;}.tag-yellow{background:#FEF9E7;color:#92700b;}.tag-gray{background:#F0EDE9;color:var(--muted);}.tag-red{background:#FDEDED;color:#9B1C1C;}.tag-blue{background:#EFF6FF;color:#1e40af;}
.input-bare{background:transparent;outline:none;border-bottom:1px solid var(--border);font-family:'Figtree',sans-serif;color:var(--text);transition:border-color .2s;}.input-bare:focus{border-color:var(--text);}
.input-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-family:'Figtree',sans-serif;font-size:.85rem;color:var(--text);outline:none;transition:border-color .2s;width:100%;}.input-box:focus{border-color:var(--text);}
.label{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
.tab-btn{padding:10px 0;margin-right:24px;background:none;border:none;cursor:pointer;font-family:'Figtree',sans-serif;font-size:.85rem;font-weight:500;transition:all .15s;margin-bottom:-1px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp .35s ease both;}
@keyframes overlayIn{from{opacity:0;}to{opacity:1;}}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.overlay{position:fixed;inset:0;background:rgba(28,25,23,.55);z-index:100;display:flex;align-items:center;justify-content:center;animation:overlayIn .2s ease;padding:20px;}
.overlay-offset{position:fixed;inset:0;background:rgba(28,25,23,.55);z-index:100;display:flex;align-items:center;justify-content:center;animation:overlayIn .2s ease;padding:20px;padding-left:calc(220px + 20px);}
.modal{background:var(--surface);border-radius:18px;border:1px solid var(--border);padding:32px;width:100%;animation:modalIn .25s ease;box-shadow:0 20px 60px rgba(28,25,23,.15);max-height:90vh;overflow-y:auto;}
.upload-zone{border:2px dashed var(--border);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s,background .2s;padding:24px;text-align:center;color:var(--muted);}
.upload-zone:hover{border-color:var(--text);background:rgba(28,25,23,.02);color:var(--text);}
.cover-wrap{position:relative;}.cover-edit-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;opacity:0;transition:all .25s;cursor:pointer;}
.cover-wrap:hover .cover-edit-overlay{background:rgba(0,0,0,.45);opacity:1;}
.task-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}.task-row:last-child{border-bottom:none;}
.task-check{width:18px;height:18px;border-radius:5px;border:2px solid var(--border-2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;background:transparent;}
.task-check.done{background:var(--text);border-color:var(--text);}.task-check.done::after{content:'';width:5px;height:9px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px);display:block;}
@keyframes lbIn{from{opacity:0;transform:scale(.94);}to{opacity:1;transform:scale(1);}}
.lightbox{position:fixed;inset:0;background:rgba(10,8,6,.92);z-index:200;display:flex;align-items:center;justify-content:center;cursor:zoom-out;}
.lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:8px;animation:lbIn .2s ease;cursor:default;}
.ptask-pill{display:inline-flex;align-items:center;gap:4px;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:3px 9px;border-radius:20px;cursor:pointer;border:none;font-family:'Figtree',sans-serif;transition:all .12s;}
.ptask-Pendente{background:#F0EDE9;color:var(--muted);}.ptask-Fazendo{background:#FEF9E7;color:#92700b;}.ptask-Concluído{background:#E8F5EC;color:#276b3e;}.ptask-Atrasado{background:#FDEDED;color:#9B1C1C;}
@keyframes toastPop{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.save-toast{position:fixed;bottom:20px;left:calc(220px + 50%);transform:translateX(-50%);background:var(--text);color:white;padding:8px 18px;border-radius:30px;font-size:.78rem;font-weight:500;z-index:999;animation:toastPop .25s ease;display:flex;align-items:center;gap:7px;pointer-events:none;white-space:nowrap;}

/* Gantt styles */
.gantt-bar{transition:opacity .12s,box-shadow .12s;}.gantt-bar:hover{opacity:.88;}
.gantt-row-left:hover{background:rgba(28,25,23,.04)!important;}

/* Hover utilities — replaces onMouseEnter/Leave JS handlers */
.hover-text:hover{color:var(--text)!important;}
.hover-danger:hover{color:#DC2626!important;}
.hover-surface:hover{background:var(--surface);}
.hover-border-text:hover{border-color:var(--text)!important;}
.text-link{color:var(--muted);transition:color .15s;}.text-link:hover{color:var(--text)!important;}
.text-link-danger{color:var(--muted);transition:color .15s;}.text-link-danger:hover{color:#DC2626!important;}

/* Pomodoro stats slide-in panel */
@keyframes slideInStats{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}

/* ─── BOTTOM TAB BAR ────────────────────────────────────────────────────── */
.bottom-tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:80;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:stretch;justify-content:space-around;padding:4px 0 env(safe-area-inset-bottom,0);height:56px;}
.bottom-tab-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;flex:1;border:none;background:none;cursor:pointer;font-family:'Figtree',sans-serif;font-size:.62rem;font-weight:600;color:var(--muted);padding:6px 2px;transition:color .15s;-webkit-tap-highlight-color:transparent;letter-spacing:.02em;}
.bottom-tab-item.active{color:var(--text);}
.bottom-tab-item:active{opacity:.7;}
@keyframes moreSheetIn{from{opacity:0;transform:translateY(100%);}to{opacity:1;transform:translateY(0);}}
@keyframes moreOverlayIn{from{opacity:0;}to{opacity:1;}}
.more-sheet-overlay{position:fixed;inset:0;background:rgba(28,25,23,.45);z-index:90;animation:moreOverlayIn .2s ease;}
.more-sheet{position:fixed;bottom:0;left:0;right:0;z-index:91;background:var(--surface);border-radius:18px 18px 0 0;padding:12px 16px env(safe-area-inset-bottom,16px);animation:moreSheetIn .25s ease;max-height:70vh;overflow-y:auto;}
.more-sheet-handle{width:36px;height:4px;border-radius:4px;background:var(--border-2);margin:0 auto 16px;}
.more-sheet-item{display:flex;align-items:center;gap:14px;padding:14px 12px;border-radius:10px;border:none;background:none;cursor:pointer;font-family:'Figtree',sans-serif;font-size:.95rem;font-weight:500;color:var(--text);width:100%;transition:background .15s;-webkit-tap-highlight-color:transparent;}
.more-sheet-item:active{background:var(--bg);}
.more-sheet-item.active-sheet{background:var(--bg);font-weight:600;}
/* Mobile header bar */
.mobile-header{position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.mobile-header-title{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:500;letter-spacing:-.02em;}
/* FAB */
.fab{position:fixed;bottom:72px;right:16px;width:56px;height:56px;border-radius:50%;background:var(--text);color:white;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(28,25,23,.25);z-index:70;transition:transform .15s;-webkit-tap-highlight-color:transparent;}
.fab:active{transform:scale(.92);}

/* ─── RESPONSIVE ────────────────────────────────────────────────────────── */
@media(max-width:768px){
  /* Prevent horizontal scroll */
  html,body{overflow-x:hidden!important;max-width:100vw!important;}
  /* Global spacing — room for bottom tab */
  .main-mobile{margin-left:0!important;padding:16px 16px 72px!important;padding-top:0!important;min-height:calc(100vh - 56px)!important;overflow-x:hidden!important;width:100%!important;box-sizing:border-box!important;}
  .fade-up{animation:none!important;max-width:100%!important;box-sizing:border-box!important;}
  
  /* Overlay / Modals */
  .overlay,.overlay-offset{padding:0!important;padding-left:0!important;align-items:flex-end!important;}
  .modal{border-radius:18px 18px 0 0!important;max-height:92vh!important;padding:24px 20px!important;}
  
  /* Save toast — above tab bar */
  .save-toast{left:50%!important;bottom:72px!important;}
  
  /* Cards */
  .card{border-radius:12px;}
  
  /* Tag — readable on mobile */
  .tag{padding:5px 10px;font-size:.72rem;}
  
  /* Buttons — 48px touch targets */
  .btn{padding:12px 18px;font-size:.9rem;min-height:44px;}
  .btn-ghost{padding:10px 12px;min-height:44px;}
  .nav-item{padding:14px 16px;font-size:.95rem;}
  
  /* Input — 16px prevents iOS zoom */
  .input-box{padding:12px 14px;font-size:16px!important;min-height:48px;}
  textarea{font-size:16px!important;}
  select{font-size:16px!important;min-height:44px;}
  input{font-size:16px!important;}
  
  /* Label — readable */
  .label{font-size:.72rem;}
  
  /* Tab buttons — larger tap area */
  .tab-btn{margin-right:0;font-size:.88rem;padding:12px 16px;}
  
  /* Upload zone */
  .upload-zone{padding:20px;}
  
  /* Cover edit — always show on mobile (no hover) */
  .cover-wrap .cover-edit-overlay{background:rgba(0,0,0,.3)!important;opacity:1!important;}
  
  /* Compact list rows for mobile */
  .compact-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);background:var(--surface);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .1s;min-height:64px;}
  .compact-row:active{background:var(--bg);}
  .compact-row:last-child{border-bottom:none;}
  .compact-row-thumb{width:44px;height:44px;border-radius:8px;flex-shrink:0;background-size:cover;background-position:center;background-color:var(--bg);}
  .compact-row-info{flex:1;min-width:0;}
  .compact-row-title{font-weight:600;font-size:.92rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px;}
  .compact-row-meta{font-size:.78rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  
  /* Segmented tabs */
  .seg-tabs{display:flex;background:var(--bg);border-radius:10px;padding:3px;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:16px;}
  .seg-tab{flex:1;min-width:0;padding:10px 8px;border-radius:8px;border:none;cursor:pointer;font-family:'Figtree',sans-serif;font-size:.84rem;font-weight:600;text-align:center;white-space:nowrap;transition:all .15s;background:transparent;color:var(--muted);}
  .seg-tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08);}
  
  /* Vertical timeline */
  .vtimeline-item{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--border);min-height:48px;}
  .vtimeline-item:last-child{border-bottom:none;}
  .vtimeline-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:2px solid var(--border-2);}
  .vtimeline-dot.done{background:var(--text);border-color:var(--text);}
  .vtimeline-text{flex:1;font-size:.9rem;font-weight:500;}
  .vtimeline-date{font-size:.78rem;color:var(--muted);flex-shrink:0;}
}
</style>

// ─── UTILS ────────────────────────────────────────────────────────────────────
const statusTag=s=>({'Em Andamento':'tag-green','Pausado':'tag-yellow','Concluído':'tag-gray','Cancelado':'tag-red'}[s]||'tag-gray');

// Icon: renders lucide icons as pure React SVGs with one-time caching per icon name.
// Two strategies: (1) read directly from lucide.icons registry (fast, no DOM)
// (2) fallback: temporarily inject into document, let createIcons process, extract SVG.
const _svgCache={};
const _resolveIcon=(name)=>{
  if(_svgCache[name])return;
  // Strategy 1: lucide.icons registry — each entry is [tag, defaultAttrs, children]
  try{
    const pascal=name.replace(/(^|-)([a-z0-9])/g,(_,__,c)=>c.toUpperCase());
    const def=(lucide.icons||{})[pascal];
    if(def&&Array.isArray(def)&&def.length>=3&&Array.isArray(def[2])){
      _svgCache[name]=def[2].map(([tag,attrs])=>{
        const a=Object.entries(attrs||{}).map(([k,v])=>k+'="'+v+'"').join(' ');
        return '<'+tag+' '+a+'/>';
      }).join('');
      return;
    }
  }catch(e){}
  // Strategy 2: DOM fallback — append to body so createIcons can find it
  try{
    const tmp=document.createElement('div');
    tmp.style.cssText='position:fixed;left:-9999px;top:-9999px;pointer-events:none;opacity:0';
    tmp.innerHTML='<i data-lucide="'+name+'"></i>';
    document.body.appendChild(tmp);
    lucide.createIcons();
    const svg=tmp.querySelector('svg');

};

const LAYOUT_LS='boardhub_layout_override';
const useLayoutMode=(breakpoint=768)=>{
  const [physical,setPhysical]=useState(()=>window.matchMedia(`(max-width:${breakpoint}px)`).matches);
  const [override,setOverride]=useState(()=>{try{return localStorage.getItem(LAYOUT_LS)||null;}catch{return null;}});
  useEffect(()=>{
    const mq=window.matchMedia(`(max-width:${breakpoint}px)`);
    setPhysical(mq.matches);
    const h=e=>setPhysical(e.matches);
    mq.addEventListener('change',h);
    return()=>mq.removeEventListener('change',h);
  },[breakpoint]);
  const toggle=()=>setOverride(prev=>{
    const next=prev?null:(physical?'desktop':'mobile');
    try{next?localStorage.setItem(LAYOUT_LS,next):localStorage.removeItem(LAYOUT_LS);}catch{}
    return next;
  });
  const isMobile=override?override==='mobile':physical;
  return [isMobile,toggle];
};

// ─── INDEXEDDB IMAGE STORE (unlimited local storage) ─────────────────────────
// Images are stored as Blobs in IndexedDB (no 5 MB quota like localStorage).
// The app state only holds a lightweight reference: "idb://<key>".
// At render time, useIdbUrl() resolves these references to object URLs.
const IDB_NAME='boardhub_images';
const IDB_STORE='images';
let _idb=null;
const openIdb=()=>new Promise((res,rej)=>{
  if(_idb)return res(_idb);
  const req=indexedDB.open(IDB_NAME,1);
  req.onupgradeneeded=e=>e.target.result.createObjectStore(IDB_STORE);
  req.onsuccess=e=>{_idb=e.target.result;res(_idb);};
  req.onerror=e=>rej(e.target.error);
});
const idbPut=(key,blob)=>openIdb().then(db=>new Promise((res,rej)=>{
  const tx=db.transaction(IDB_STORE,'readwrite');
  tx.objectStore(IDB_STORE).put(blob,key);
  tx.oncomplete=()=>res();tx.onerror=e=>rej(e.target.error);
}));
const idbGet=(key)=>openIdb().then(db=>new Promise((res,rej)=>{
  const req=db.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get(key);
  req.onsuccess=e=>res(e.target.result);req.onerror=e=>rej(e.target.error);
}));
const idbDel=(key)=>openIdb().then(db=>new Promise((res,rej)=>{
  const tx=db.transaction(IDB_STORE,'readwrite');
  tx.objectStore(IDB_STORE).delete(key);
  tx.oncomplete=()=>res();tx.onerror=e=>rej(e.target.error);
}));

// Hook: given an image src (may be idb://key, https://, or data:), returns a displayable URL.
const _objUrlCache={};
const useIdbUrl=(src)=>{
  const [url,setUrl]=React.useState(()=>src&&!src.startsWith('idb://')?src:'');
  React.useEffect(()=>{
    if(!src){setUrl('');return;}
    if(!src.startsWith('idb://')){setUrl(src);return;}
    const key=src.slice(6);
    if(_objUrlCache[key]){setUrl(_objUrlCache[key]);return;}
    idbGet(key).then(blob=>{
      if(!blob){setUrl('');return;}
      const u=URL.createObjectURL(blob);
      _objUrlCache[key]=u;
      setUrl(u);
    }).catch(()=>setUrl(''));
  },[src]);
  return url;
};

// Img component that auto-resolves idb:// references
const Img=({src,...props})=>{
  const url=useIdbUrl(src);
  if(!url)return null;
  return <img src={url} {...props}/>;
};

// Upload: try Imgur first (works when online), otherwise store in IndexedDB.
const IMGUR_CLIENT_ID='546c25a59c58ad7';
const uploadImage=async file=>{
  // 1. Try Imgur
  try{
    const b64=await readFile(file);
    const body=new FormData();
    body.append('image',b64.split(',')[1]);
    body.append('type','base64');
    const res=await fetch('https://api.imgur.com/3/image',{method:'POST',headers:{Authorization:`Client-ID ${IMGUR_CLIENT_ID}`},body,signal:AbortSignal.timeout(8000)});
    const json=await res.json();
    if(json.success)return json.data.link; // https:// URL — stored in state as-is
  }catch{/* offline or quota exceeded — fall through */}
  // 2. Store blob in IndexedDB, keep only a tiny key in state
  const key='img_'+Date.now()+'_'+Math.random().toString(36).slice(2);
  await idbPut(key,file);
  return 'idb://'+key;
};

// Strip idb:// and base64 refs before Gist sync (they are local-only)
const isLocalImg=v=>typeof v==='string'&&(v.startsWith('data:image')||v.startsWith('idb://'));
const stripBase64=obj=>{
  if(Array.isArray(obj))return obj.map(stripBase64);
  if(obj&&typeof obj==='object'){const out={};for(const k of Object.keys(obj))out[k]=stripBase64(obj[k]);return out;}
  if(isLocalImg(obj))return '';
  return obj;
};

const POMO_LS = 'boardhub_pomo_v3';

const pomoLoad = function() {
  try {
    var s = localStorage.getItem(POMO_LS);
    if (s) {
      var parsed = JSON.parse(s);
      // Migrate old format that used dailySeconds/historicalSeconds
      if (typeof parsed.dailySeconds !== 'undefined') {
        var today2 = new Date().toISOString().slice(0, 10);
        var days2 = {};
        if (parsed.dailySeconds > 0) days2[today2] = parsed.dailySeconds;
        return { days: days2 };
      }
      return parsed;
    }
    // Try older key
    var old = localStorage.getItem('boardhub_pomodoro_stats');
    if (old) {
      var p2 = JSON.parse(old);
      var t2 = new Date().toISOString().slice(0, 10);
      var d2 = {};
      if (p2.dailySeconds > 0) d2[t2] = p2.dailySeconds;
      return { days: d2 };
    }
  } catch(e) {}
  return { days: {} };
};

const pomoSave = function(d) {
  try { localStorage.setItem(POMO_LS, JSON.stringify(d)); } catch(e) {}
};

const pomoTodayKey = function() {
  return new Date().toISOString().slice(0, 10);
};

const pomoFmtSecs = function(secs) {
  var h = Math.floor(secs / 3600);
  var m = Math.floor((secs % 3600) / 60);
  if (h > 0) return h + 'h ' + m + 'm';
  if (m > 0) return m + 'm';
  return secs + 's';
};

const pomoFmtDay = function(dateStr) {
  try {
    var d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('pt-BR', { weekday: 'short', day: 'numeric', month: 'short' });
  } catch(e) { return dateStr; }
};

const pomoFmtMonth = function(mk) {
  try {
    var parts = mk.split('-');
    return new Date(+parts[0], +parts[1]-1, 1).toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
  } catch(e) { return mk; }
};

// ─── POMODORO TIMER (with built-in stats panel) ───────────────────────────────
const PomodoroTimer = ({ pomoData, setPomoData }) => {
  const FOCUS_SECS = 25 * 60;
  const BREAK_SECS = 5 * 60;
  const [timeLeft, setTimeLeft] = useState(FOCUS_SECS);
  const [isActive, setIsActive] = useState(false);
  const [mode, setMode] = useState('focus');
  const [showStats, setShowStats] = useState(false);
  const modeRef = useRef('focus');
  const timeLeftRef = useRef(FOCUS_SECS);
  const unsavedSecsRef = useRef(0);
  modeRef.current = mode;
  timeLeftRef.current = timeLeft;

  const requestNotifPermission = () => {
    if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
  };
  const fireNotification = (title, body) => {
    if ('Notification' in window && Notification.permission === 'granted') new Notification(title, { body });
  };

  // Flush unsaved seconds to state
  const flushPomoSecs = () => {
    if (unsavedSecsRef.current > 0) {
      const secs = unsavedSecsRef.current;
      unsavedSecsRef.current = 0;
      setPomoData(prev => {
        const key = pomoTodayKey();
        const newDays = { ...prev.days };
        newDays[key] = (newDays[key] || 0) + secs;
        return { days: newDays };
      });
    }
  };

  // Flush on unmount or when timer stops
  useEffect(() => {
    return () => flushPomoSecs();
  }, [isActive]);

  useEffect(() => {
    if (!isActive) return;
    const id = setInterval(() => {
      const current = timeLeftRef.current;
      if (current <= 1) {
        clearInterval(id);
        setTimeLeft(0);
        if (modeRef.current === 'focus') {
          flushPomoSecs();
          fireNotification('Pomodoro', 'Sessão de foco encerrada! Hora de pausar. ☕');
          setMode('break');
          setTimeLeft(BREAK_SECS);
        } else {
          fireNotification('Pomodoro', 'Pausa encerrada! Pronto para focar? 🧠');
          setMode('focus');
          setTimeLeft(FOCUS_SECS);
          setIsActive(false);
        }
        return;
      }
      setTimeLeft(t => t - 1);
      if (modeRef.current === 'focus') {
        unsavedSecsRef.current += 1;
        // Batch: flush to state every 30 seconds instead of every tick
        if (unsavedSecsRef.current >= 30) flushPomoSecs();
      }
    }, 1000);
    return () => clearInterval(id);
  }, [isActive]);

  const toggle = () => { requestNotifPermission(); setIsActive(a => !a); };
  const reset  = () => { setIsActive(false); setTimeLeft(mode === 'focus' ? FOCUS_SECS : BREAK_SECS); };

  const mins = Math.floor(timeLeft / 60);
  const secs = timeLeft % 60;
  const timeStr = (mins < 10 ? '0' : '') + mins + ':' + (secs < 10 ? '0' : '') + secs;
  const pct = mode === 'focus' ? timeLeft / FOCUS_SECS : timeLeft / BREAK_SECS;
  const r = 46;
  const circ = 2 * Math.PI * r;
  const offset = circ * (1 - pct);
  const isFocus = mode === 'focus';
  const todaySecs = ((pomoData.days || {})[pomoTodayKey()]) || 0;
  const todayDisplay = todaySecs + unsavedSecsRef.current;

  // ── Stats data ──
  const dayEntries = useMemo(() => {
    const entries = Object.entries(pomoData.days || {});
    const filtered = entries.filter(e => e[0] !== '_total' && e[0].length === 10 && e[1] > 0);
    filtered.sort((a, b) => b[0].localeCompare(a[0]));
    return filtered.slice(0, 60);
  }, [pomoData]);

  const monthEntries = useMemo(() => {
    const months = {};
    for (const [day, s] of Object.entries(pomoData.days || {})) {
      if (day === '_total' || day.length !== 10) continue;
      const mk = day.slice(0, 7);
      months[mk] = (months[mk] || 0) + s;
    }
    const result = Object.entries(months);
    result.sort((a, b) => b[0].localeCompare(a[0]));
    return result;
  }, [pomoData]);

  const [statsTab, setStatsTab] = useState('days');
  const maxDay   = dayEntries.reduce((m, e) => Math.max(m, e[1]), 1);
  const maxMonth = monthEntries.reduce((m, e) => Math.max(m, e[1]), 1);
  const totalAll = dayEntries.reduce((sum, e) => sum + e[1], 0);

  return (
    <div style={{marginBottom:20}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <span className="label">Pomodoro</span>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{display:'inline-flex',alignItems:'center',gap:6,padding:'3px 10px',borderRadius:20,background:isFocus?'rgba(28,25,23,.06)':'#E8F5EC',color:isFocus?'var(--muted)':'#276b3e',fontSize:'.7rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.07em'}}>
            <Icon name={isFocus?'brain':'coffee'} size={11}/>
            {isFocus ? 'Foco' : 'Pausa'}
          </div>
          <button
            className="btn btn-ghost"
            onClick={()=>setShowStats(s=>!s)}
            title="Histórico de foco"
            style={{padding:'4px 8px',borderRadius:6,background:showStats?'var(--text)':'transparent',color:showStats?'white':'var(--muted)'}}
          >
            <Icon name="timer" size={14}/>
          </button>
        </div>
      </div>

      {/* Timer card */}
      {!showStats && (
        <div className="card" style={{padding:'20px 24px',display:'flex',flexDirection:'column',alignItems:'center',gap:14}}>
          <div style={{position:'relative',width:110,height:110}}>
            <svg width="110" height="110" style={{position:'absolute',top:0,left:0,transform:'rotate(-90deg)'}}>
              <circle cx="55" cy="55" r={r} fill="none" stroke="var(--border)" strokeWidth="5"/>
              <circle cx="55" cy="55" r={r} fill="none" stroke={isFocus?'var(--text)':'#276b3e'} strokeWidth="5" strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" style={{transition:'stroke-dashoffset 1s linear,stroke .4s'}}/>
            </svg>
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <span style={{fontFamily:'Cormorant Garamond,serif',fontSize:'1.75rem',fontWeight:500,letterSpacing:'-0.02em'}}>{timeStr}</span>
            </div>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <button className="btn btn-outline" onClick={toggle} style={{minWidth:100,justifyContent:'center',padding:'7px 16px'}}>
              <Icon name={isActive?'pause':'play'} size={15}/>
              {isActive ? 'Pausar' : (isFocus ? 'Iniciar' : 'Retomar')}
            </button>
            <button className="btn btn-ghost" onClick={reset} title="Reiniciar" style={{padding:8}}>
              <Icon name="rotate-ccw" size={15}/>
            </button>
          </div>
          <div style={{fontSize:'.72rem',color:'var(--muted)',display:'flex',alignItems:'center',gap:5}}>
            <Icon name="clock" size={11}/> Hoje: <strong style={{color:'var(--text)'}}>{pomoFmtSecs(todayDisplay)}</strong> em foco
          </div>
        </div>

      {/* Stats panel — replaces timer card inline */}

        <div className="overlay-offset" onClick={e=>e.target===e.currentTarget&&setShowStats(false)}>

                <div style={{fontSize:'1.2rem',fontWeight:600,fontFamily:'Cormorant Garamond,serif'}}>{pomoFmtSecs(totalAll)}</div>
              </div>

            <div style={{display:'flex',borderBottom:'1px solid var(--border)',flexShrink:0}}>
              {['days','months'].map(t=>(

              ))}
            </div>
            <div style={{flex:1,overflowY:'auto',padding:'16px 24px'}}>
              {statsTab==='days'&&(dayEntries.length===0
                ?<p style={{fontSize:'.85rem',color:'var(--muted)',textAlign:'center',padding:'32px 0',margin:0}}>Nenhuma sessao registrada.</p>
                :<div style={{display:'flex',flexDirection:'column',gap:12}}>
                  {dayEntries.map(([day,s])=>(
                    <div key={day}>
                      <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                        <span style={{fontSize:'.82rem',fontWeight:500}}>{pomoFmtDay(day)}</span>
                        <span style={{fontSize:'.82rem',fontWeight:600}}>{pomoFmtSecs(s)}</span>
                      </div>
                      <div style={{height:5,background:'var(--bg)',borderRadius:3,overflow:'hidden'}}>
                        <div style={{height:'100%',width:Math.round(s/maxDay*100)+'%',background:'var(--text)',borderRadius:3}}/>
                      </div>
                    </div>
                  ))}
                </div>
              )}
              {statsTab==='months'&&(monthEntries.length===0
                ?<p style={{fontSize:'.85rem',color:'var(--muted)',textAlign:'center',padding:'32px 0',margin:0}}>Nenhuma sessao registrada.</p>
                :<div style={{display:'flex',flexDirection:'column',gap:16}}>
                  {monthEntries.map(([mk,s])=>{
                    const daysInMonth=dayEntries.filter(e=>e[0].slice(0,7)===mk);
                    return(
                      <div key={mk}>
                        <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                          <span style={{fontSize:'.85rem',fontWeight:600,textTransform:'capitalize'}}>{pomoFmtMonth(mk)}</span>
                          <span style={{fontSize:'.85rem',fontWeight:700}}>{pomoFmtSecs(s)}</span>
                        </div>
                        <div style={{height:6,background:'var(--bg)',borderRadius:3,overflow:'hidden',marginBottom:6}}>
                          <div style={{height:'100%',width:Math.round(s/maxMonth*100)+'%',background:'var(--text)',borderRadius:3}}/>
                        </div>
                        <div style={{paddingLeft:8}}>
                          {daysInMonth.map(([d,ds])=>(
                            <div key={d} style={{display:'flex',justifyContent:'space-between',padding:'2px 0'}}>
                              <span style={{fontSize:'.74rem',color:'var(--muted)'}}>{pomoFmtDay(d)}</span>
                              <span style={{fontSize:'.74rem',color:'var(--muted)'}}>{pomoFmtSecs(ds)}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
const Dashboard=({projects,notes,mentors,tasks,setTasks,setView,setNotes,pomoData,setPomoData,isMobile})=>{
  const active=useMemo(()=>projects.filter(p=>!p.deleted&&p.status==='Em Andamento'),[projects]);
  const recentNotes=useMemo(()=>notes.filter(n=>!n.deleted).slice(0,3),[notes]);
  const allPTasks=useMemo(()=>active.flatMap(p=>(p.projectTasks||[]).filter(t=>t.status!=='Concluído').map(t=>({...t,projectTitle:p.title}))),[active]);
  const h=new Date().getHours();
  const greeting=h<12?'Bom dia':h<18?'Boa tarde':'Boa noite';
  const [newTask,setNewTask]=useState('');

  const stats=[
    {label:'Projetos Ativos',value:active.length,icon:'folder-open',view:'projects'},

    {label:'Atividades Pendentes',value:tasks.filter(t=>!t.done).length,icon:'list-checks',view:'dashboard'}

  const addTask=()=>{if(!newTask.trim())return;setTasks(p=>[...p,{id:Date.now(),text:newTask.trim(),done:false,noteId:null}]);setNewTask('');};
  const toggleTask=id=>setTasks(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t));
  const removeTask=id=>setTasks(p=>p.filter(t=>t.id!==id));

        <p style={{color:'var(--muted)',fontSize:'.9rem'}}>{new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p>

          <div key={s.label} className="card card-click" onClick={()=>setView(s.view)} style={isMobile?{padding:'14px 12px',display:'flex',flexDirection:'column',gap:6,alignItems:'center',textAlign:'center'}:{padding:'24px 28px',display:'flex',flexDirection:'column',gap:12}}>
            <span style={{fontSize:isMobile?'1.6rem':'2.2rem',fontWeight:600,fontFamily:'Cormorant Garamond,serif',lineHeight:1}}>{s.value}</span>

              <div style={{width:32,height:32,borderRadius:8,backgroundColor:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name={s.icon} size={15}/></div>
            </div>}
            <span style={{fontSize:isMobile?'.68rem':'.8rem',color:'var(--muted)',fontWeight:500,lineHeight:1.2}}>{s.label}</span>
          </div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'1fr 1fr',gap:20}}>
        {/* LEFT: projects + project tasks */}
        <div style={{display:'flex',flexDirection:'column',gap:20}}>
          {/* Projetos ativos */}

            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <span className="label">Em andamento</span>

                  <div style={{flex:1,minWidth:0}}>

          </div>

      {mentors.filter(m=>!m.deleted&&m.main).length>0&&(

// ─── NEW PROJECT MODAL ────────────────────────────────────────────────────────
const NewProjectModal=({onSave,onClose,isMobile})=>{
  const [form,setForm]=useState({title:'',client:'',type:'work',status:'Em Andamento',startDate:'',deadline:'',notes:'',cover:'',mentors:[],researchImages:[],researchNotes:[],projectTasks:[],timelineEvents:[],deleted:false});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const coverRef=useRef();
  const handleCover=async e=>{const file=e.target.files[0];if(!file)return;set('cover',await uploadImage(file));};
  const save=()=>{if(!form.title.trim())return;onSave({...form,id:Date.now(),cover:form.cover||'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=1200'});};
  return(
    <Modal title="Novo Projeto" onClose={onClose} width={isMobile?'100%':520} offsetSidebar={!isMobile}>
      <div style={{display:'flex',flexDirection:'column',gap:16}}>
        <div onClick={()=>coverRef.current.click()} style={{height:isMobile?100:120,borderRadius:10,overflow:'hidden',cursor:'pointer',position:'relative',backgroundColor:'var(--bg)',border:'2px dashed var(--border)',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',color:'var(--muted)',gap:8,fontSize:'.82rem'}}
          onMouseEnter={e=>e.currentTarget.style.borderColor='var(--text)'} onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
          {form.cover?<img src={form.cover} style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover'}}/>:<><Icon name="image" size={22}/><span>Clique para adicionar capa</span></>}
          {form.cover&&<div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.45)',display:'flex',alignItems:'center',justifyContent:'center',color:'white',gap:6,fontSize:'.82rem'}}><Icon name="camera" size={16}/>Trocar</div>}
          <input ref={coverRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleCover}/>
        </div>
        <Field label="Título *"><input className="input-box" value={form.title} onChange={e=>set('title',e.target.value)} placeholder="Ex: Comercial Nike Summer"/></Field>
        <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'1fr 1fr',gap:12}}>
          <Field label="Cliente"><input className="input-box" value={form.client} onChange={e=>set('client',e.target.value)} placeholder="Ex: Wieden+Kennedy"/></Field>
          <Field label="Tipo"><select className="input-box" value={form.type} onChange={e=>set('type',e.target.value)} style={{cursor:'pointer'}}><option value="work">Trabalho</option><option value="personal">Pessoal</option></select></Field>
        </div>
        <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'1fr 1fr 1fr',gap:12}}>
          <Field label="Status"><select className="input-box" value={form.status} onChange={e=>set('status',e.target.value)} style={{cursor:'pointer'}}><option>Em Andamento</option><option>Pausado</option><option>Concluído</option><option>Cancelado</option></select></Field>
          <Field label="Início"><input className="input-box" type="date" value={form.startDate} onChange={e=>set('startDate',e.target.value)}/></Field>
          <Field label="Deadline"><input className="input-box" type="date" value={form.deadline} onChange={e=>set('deadline',e.target.value)}/></Field>
        </div>
        <Field label="Notas iniciais"><textarea className="input-box" rows={3} value={form.notes} onChange={e=>set('notes',e.target.value)} placeholder="Briefing, referências..." style={{resize:'none',lineHeight:1.7}}/></Field>
        <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:4}}>
          <button className="btn btn-outline" onClick={onClose}>Cancelar</button>
          <button className="btn btn-dark" onClick={save}><Icon name="check" size={14}/> Criar Projeto</button>
        </div>
      </div>
    </Modal>
  );
};

            <div className="card" style={{overflow:'hidden',borderRadius:12}}>
              {visible.map(p=>(
                <div key={p.id} className="compact-row" onClick={()=>onSelect(p)}>
                  <div className="compact-row-thumb" style={{backgroundImage:p.cover?`url(${p.cover})`:'none'}}/>
                  <div className="compact-row-info">
                    <div className="compact-row-title">{p.title}</div>
                    <div className="compact-row-meta">{p.client} · <span className={`tag ${statusTag(p.status)}`} style={{display:'inline',padding:'1px 6px',fontSize:'.65rem'}}>{p.status}</span></div>
                  </div>
                  <Icon name="chevron-right" size={16} style={{color:'var(--muted)',flexShrink:0}}/>
                </div>
              ))}
              {visible.length===0&&<div style={{textAlign:'center',padding:40,color:'var(--muted)',fontSize:'.9rem'}}>Nenhum projeto encontrado.</div>}
            </div>
          ):(
            /* Desktop: card grid (and trash on both) */
            <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'repeat(3,1fr)',gap:isMobile?12:16}}>
            {visible.map(p=>(
              <div key={p.id} className="card" style={{overflow:'hidden',display:'flex',flexDirection:'column',cursor:trash?'default':'pointer',opacity:trash?.85:1,position:'relative'}}
                onClick={()=>!trash&&onSelect(p)}>
                {!trash&&(
                  <button onClick={e=>{e.stopPropagation();softDelete(p.id);}} title="Mover para lixeira"
                    style={{position:'absolute',top:8,left:8,background:'rgba(28,25,23,.55)',backdropFilter:'blur(4px)',border:'none',borderRadius:6,padding:'4px 6px',cursor:'pointer',color:'white',opacity:0,transition:'opacity .2s',zIndex:2}}
                    onMouseEnter={e=>{e.currentTarget.style.opacity=1;}}
                    onMouseLeave={e=>{e.currentTarget.style.opacity=0;}}>
                    <Icon name="trash-2" size={12}/>
                  </button>
                )}
                <div style={{height:140,backgroundImage:p.cover?`url(${p.cover})`:'none',backgroundSize:'cover',backgroundPosition:'center',position:'relative',backgroundColor:'#E8E3DC'}}>
                  <div style={{position:'absolute',top:10,right:10,background:'rgba(252,251,249,.92)',backdropFilter:'blur(4px)',borderRadius:5,padding:'3px 8px'}}>
                    <span style={{fontSize:'.65rem',fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--muted)'}}>{p.type==='work'?'Trabalho':'Pessoal'}</span>
                  </div>
                </div>
                <div style={{padding:'16px 18px',flex:1,display:'flex',flexDirection:'column',justifyContent:'space-between'}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:'.92rem',marginBottom:3}}>{p.title}</div>
                    <div style={{fontSize:'.75rem',color:'var(--muted)'}}>{p.client}</div>
                  </div>
                  {!trash?(
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:14,paddingTop:12,borderTop:'1px solid var(--border)'}}>
                      <span className={`tag ${statusTag(p.status)}`}>{p.status}</span>
                      <span style={{fontSize:'.72rem',color:'var(--muted)'}}>{p.deadline}</span>
                    </div>
                  ):(
                    <div style={{marginTop:14,paddingTop:12,borderTop:'1px solid var(--border)',display:'flex',gap:6}}>
                      <button onClick={e=>{e.stopPropagation();restore(p.id);}} className="btn btn-outline" style={{flex:1,justifyContent:'center',padding:'5px 0',fontSize:'.78rem'}}><Icon name="refresh-cw" size={11}/> Restaurar</button>
                      <button onClick={e=>{e.stopPropagation();hardDelete(p.id);}} className="btn btn-danger" style={{flex:1,justifyContent:'center',padding:'5px 0',fontSize:'.78rem'}}><Icon name="trash-2" size={11}/> Excluir</button>
                    </div>
                  )}
                </div>
              </div>
            ))}
            {visible.length===0&&<div style={{gridColumn:'1/-1',textAlign:'center',padding:48,color:'var(--muted)',fontSize:'.9rem'}}>{trash?'Lixeira vazia.':'Nenhum projeto encontrado.'}</div>}
            </div>
          )}
        </div>

        {/* RIGHT: tasks sidebar hub — hidden on mobile */}
        {!trash&&!isMobile&&(
          <div style={{width:280,flexShrink:0,position:'sticky',top:48}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
              <span className="label">Tarefas Pendentes</span>
              <span style={{fontSize:'.7rem',color:'var(--muted)',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:20,padding:'1px 8px'}}>
                {activeProjsWithTasks.reduce((s,p)=>(s+(p.projectTasks||[]).filter(t=>t.status!=='Concluído').length),0)}
              </span>
            </div>
            {activeProjsWithTasks.length===0?(
              <div className="card" style={{padding:'24px 20px',textAlign:'center'}}>
                <Icon name="check-circle" size={24} style={{display:'block',margin:'0 auto 10px',opacity:.25}}/>
                <p style={{fontSize:'.82rem',color:'var(--muted)',margin:0}}>Nenhuma tarefa pendente.</p>
              </div>
            ):(
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {activeProjsWithTasks.map(p=>{
                  const pending=(p.projectTasks||[]).filter(t=>t.status!=='Concluído')
                    .sort((a,b)=>PTASK_STATUS_ORDER.indexOf(a.status)-PTASK_STATUS_ORDER.indexOf(b.status));
                  return(
                    <div key={p.id} className="card" style={{padding:'14px 16px',overflow:'hidden'}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,paddingBottom:10,borderBottom:'1px solid var(--border)'}}>
                        <div style={{width:20,height:20,borderRadius:5,flexShrink:0,backgroundImage:p.cover?`url(${p.cover})`:'none',backgroundSize:'cover',backgroundPosition:'center',backgroundColor:'var(--bg)'}}/>
                        <span style={{fontWeight:600,fontSize:'.78rem',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.title}</span>
                        <span style={{fontSize:'.68rem',color:'var(--muted)',flexShrink:0}}>{pending.length}</span>
                      </div>
                      <div style={{display:'flex',flexDirection:'column',gap:5}}>
                        {pending.map(t=>(
                          <div key={t.id} style={{display:'flex',alignItems:'flex-start',gap:7}}>
                            <span style={{display:'inline-block',flexShrink:0,fontSize:'.58rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.05em',padding:'2px 6px',borderRadius:3,marginTop:1,background:statusBg[t.status]||'#F0EDE9',color:statusColor[t.status]||'var(--muted)'}}>
                              {t.status}
                            </span>
                            <span style={{fontSize:'.78rem',color:'var(--text)',lineHeight:1.4}}>{t.text}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
};

// ─── ADD MENTOR INLINE ────────────────────────────────────────────────────────
const AddMentorInline=({onAdd})=>{
  const [open,setOpen]=useState(false);

  const [area,setArea]=useState('');
  if(!open)return(
    <button onClick={()=>setOpen(true)} className="btn btn-ghost"
      style={{padding:'4px 10px',fontSize:'.75rem',color:'var(--muted)',border:'1px dashed var(--border)',borderRadius:8,width:'100%',justifyContent:'center',gap:6}}>
      <Icon name="plus" size={12}/> Adicionar mentor
    </button>
  );
  const save=()=>{
    if(!name.trim())return;
    const mentor={id:Date.now(),name:name.trim(),area:area.trim(),medium:'',notes:'',links:'',active:true,main:false,photo:'',photos:[],deleted:false};
    onAdd(mentor);
    setName('');setArea('');setOpen(false);
  };
  return(
    <div style={{display:'flex',gap:8,alignItems:'center',padding:'8px 0',flexWrap:'wrap'}}>

        placeholder="Nome do mentor..." className="input-box" style={{flex:2,minWidth:120,fontSize:'.8rem',padding:'6px 10px'}}/>
      <input value={area} onChange={e=>setArea(e.target.value)} onKeyDown={e=>e.key==='Enter'&&save()}
        placeholder="Área (ex: Narrativa)" className="input-box" style={{flex:2,minWidth:100,fontSize:'.8rem',padding:'6px 10px'}}/>
      <button onClick={save} className="btn btn-dark" style={{padding:'6px 12px',fontSize:'.78rem'}}><Icon name="check" size={12}/></button>

};

// ─── GANTT TIMELINE ───────────────────────────────────────────────────────────
const PTASK_STATUSES=['Pendente','Fazendo','Concluído','Atrasado'];
const PTASK_NEXT={'Pendente':'Fazendo','Fazendo':'Concluído','Concluído':'Atrasado','Atrasado':'Pendente'};

const GANTT_COLORS={
  'Pendente': {bar:'#EDE8E1',text:'#6B6460',border:'#C8BEB4',dot:'#B5ABA0'},
  'Fazendo':  {bar:'#FEF3C7',text:'#92700B',border:'#FCD34D',dot:'#F59E0B'},
  'Concluído':{bar:'#D1FAE5',text:'#065F46',border:'#6EE7B7',dot:'#10B981'},
  'Atrasado': {bar:'#FEE2E2',text:'#991B1B',border:'#FCA5A5',dot:'#EF4444'},
};

const daysBetween=(a,b)=>Math.round((new Date(b)-new Date(a))/86400000);
const addDays=(dateStr,days)=>{const d=new Date(dateStr+'T12:00:00');d.setDate(d.getDate()+days);return d.toISOString().slice(0,10);};
const todayISO=()=>new Date().toISOString().slice(0,10);
const fmtShort=d=>{if(!d)return'';const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});};

const GanttTimeline=({tasks,onUpdateTasks,projectStart,projectEnd})=>{
  const today=todayISO();
  const [selectedId,setSelectedId]=useState(null);
  const [editDraft,setEditDraft]=useState(null);
  const [newTaskName,setNewTaskName]=useState('');
  const dragRef=useRef(null);
  const [, forceUpdate]=useState(0);

  // ── Compute chart bounds ──────────────────────────────────────────────────
  let chartStart=projectStart||today;
  let chartEnd=projectEnd||addDays(today,45);
  tasks.forEach(t=>{
    if(t.startDate&&t.startDate<chartStart)chartStart=t.startDate;
    if(t.dueDate&&t.dueDate>chartEnd)chartEnd=t.dueDate;
  });
  chartStart=addDays(chartStart,-5);
  chartEnd=addDays(chartEnd,12);
  const totalDays=Math.max(1,daysBetween(chartStart,chartEnd));
  const DAY_W=36;
  const ROW_H=46;
  const HEADER_H=52;
  const LEFT_W=220;

  // ── Month + week header data ──────────────────────────────────────────────
  const months=[];
  let cur=new Date(chartStart+'T12:00:00');
  const endDt=new Date(chartEnd+'T12:00:00');
  while(cur<=endDt){
    const mStart=cur.toISOString().slice(0,10);
    const label=cur.toLocaleDateString('pt-BR',{month:'short',year:'2-digit'}).replace('.',' ');
    const next=new Date(cur.getFullYear(),cur.getMonth()+1,1);
    const mEnd=next>endDt?chartEnd:next.toISOString().slice(0,10);
    months.push({label,days:daysBetween(mStart,mEnd)});
    cur=next;
  }

  const weekMarkers=[];
  for(let i=0;i<=totalDays;i+=7){
    const d=addDays(chartStart,i);
    const dt=new Date(d+'T12:00:00');
    weekMarkers.push({offset:i*DAY_W,label:dt.getDate()+'/'+(dt.getMonth()+1)});
  }

  const todayOffset=daysBetween(chartStart,today)*DAY_W;
  const gridW=totalDays*DAY_W;

  // ── Bar geometry ───────────────────────────────────────────────────────────
  const barGeom=t=>{
    const s=t.startDate||(projectStart||today);
    const e=t.dueDate||(projectEnd||addDays(today,7));
    const left=Math.max(0,daysBetween(chartStart,s))*DAY_W;
    const width=Math.max(DAY_W,(daysBetween(s,e)+1)*DAY_W);
    return{left,width};
  };

  // ── Drag ──────────────────────────────────────────────────────────────────
  const startDrag=(e,taskId,type)=>{
    e.preventDefault();e.stopPropagation();
    const t=tasks.find(x=>x.id===taskId);if(!t)return;
    const origStart=t.startDate||(projectStart||today);
    const origEnd=t.dueDate||(projectEnd||addDays(today,7));
    dragRef.current={taskId,type,startX:e.clientX,origStart,origEnd};
    const onMove=me=>{
      if(!dragRef.current)return;
      const dx=me.clientX-dragRef.current.startX;
      const delta=Math.round(dx/DAY_W);
      const{taskId,type,origStart,origEnd}=dragRef.current;
      let ns,ne;
      if(type==='move'){ns=addDays(origStart,delta);ne=addDays(origEnd,delta);}
      else if(type==='left'){ns=addDays(origStart,delta);ne=origEnd;if(ns>=ne)ns=addDays(ne,-1);}
      else{ns=origStart;ne=addDays(origEnd,delta);if(ne<=ns)ne=addDays(ns,1);}
      onUpdateTasks(tasks.map(x=>x.id===taskId?{...x,startDate:ns,dueDate:ne}:x));
    };
    const onUp=()=>{dragRef.current=null;window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
  };

  // ── Edit ──────────────────────────────────────────────────────────────────
  const selectTask=t=>{setSelectedId(t.id);setEditDraft({...t,startDate:t.startDate||(projectStart||today),dueDate:t.dueDate||(projectEnd||addDays(today,7)),notes:t.notes||''});};
  const saveEdit=()=>{if(!editDraft)return;onUpdateTasks(tasks.map(t=>t.id===editDraft.id?{...editDraft}:t));setSelectedId(null);setEditDraft(null);};
  const deleteTask=()=>{if(!editDraft)return;onUpdateTasks(tasks.filter(t=>t.id!==editDraft.id));setSelectedId(null);setEditDraft(null);};
  const cycleStatus=id=>{const upd=tasks.map(t=>t.id===id?{...t,status:PTASK_NEXT[t.status]||'Pendente'}:t);onUpdateTasks(upd);if(editDraft&&editDraft.id===id)setEditDraft(d=>({...d,status:PTASK_NEXT[d.status]||'Pendente'}));};
  const addTask=()=>{
    if(!newTaskName.trim())return;
    const id=Date.now();
    const s=projectStart||today;
    const e=projectEnd||addDays(today,7);
    onUpdateTasks([...tasks,{id,text:newTaskName.trim(),status:'Pendente',startDate:s,dueDate:e,notes:''}]);
    setNewTaskName('');
  };

  return(
    <div className="card" style={{padding:0,overflow:'hidden',marginBottom:20}}>
      {/* Top bar */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 20px',borderBottom:'1px solid var(--border)',background:'var(--surface)'}}>
        <div>
          <span className="label">Timeline do Projeto</span>
          <span style={{fontSize:'.72rem',color:'var(--muted)',marginLeft:8}}>Arraste para reagendar · clique para editar</span>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <input value={newTaskName} onChange={e=>setNewTaskName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addTask()}
            placeholder="Nome da tarefa..."
            style={{border:'1px solid var(--border)',borderRadius:7,padding:'6px 11px',fontSize:'.8rem',fontFamily:'Figtree,sans-serif',outline:'none',backgroundColor:'var(--bg)',color:'var(--text)',width:190,transition:'border-color .2s'}}
            onFocus={e=>e.target.style.borderColor='var(--text)'} onBlur={e=>e.target.style.borderColor='var(--border)'}/>
          <button onClick={addTask} className="btn btn-dark" style={{padding:'6px 14px',fontSize:'.8rem'}}><Icon name="plus" size={13}/> Adicionar</button>
        </div>
      </div>

      {/* Grid */}
      <div style={{display:'flex',position:'relative'}}>
        {/* Left panel */}
        <div style={{width:LEFT_W,flexShrink:0,borderRight:'1px solid var(--border)',zIndex:2,background:'var(--surface)'}}>
          <div style={{height:HEADER_H,borderBottom:'1px solid var(--border)',background:'var(--bg)',display:'flex',alignItems:'flex-end',padding:'0 14px 10px'}}>
            <span style={{fontSize:'.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--muted)'}}>Tarefa</span>
          </div>
          {tasks.length===0&&(
            <div style={{padding:'28px 16px',textAlign:'center',color:'var(--muted)',fontSize:'.82rem'}}>
              <Icon name="calendar-plus" size={24} style={{display:'block',margin:'0 auto 10px',opacity:.3}}/>
              Adicione tarefas para começar.
            </div>
          )}
          {tasks.map(t=>{
            const colors=GANTT_COLORS[t.status]||GANTT_COLORS['Pendente'];
            const isSelected=selectedId===t.id;
            return(
              <div key={t.id} onClick={()=>isSelected?(setSelectedId(null),setEditDraft(null)):selectTask(t)}
                style={{height:ROW_H,display:'flex',alignItems:'center',gap:8,padding:'0 14px',borderBottom:'1px solid var(--border)',cursor:'pointer',
                  background:isSelected?'rgba(28,25,23,.05)':'transparent',transition:'background .15s'}}>
                <button onClick={e=>{e.stopPropagation();cycleStatus(t.id);}} style={{width:12,height:12,borderRadius:'50%',background:colors.dot,border:'none',cursor:'pointer',flexShrink:0,padding:0,transition:'transform .15s'}}
                  title={`Status: ${t.status}`} onMouseEnter={e=>e.currentTarget.style.transform='scale(1.4)'} onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}/>
                <span style={{fontSize:'.83rem',fontWeight:500,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                  textDecoration:t.status==='Concluído'?'line-through':'none',color:t.status==='Concluído'?'var(--muted)':'var(--text)'}}>{t.text}</span>
              </div>
            );
          })}
        </div>

        {/* Scrollable chart */}
        <div style={{flex:1,overflowX:'auto',overflowY:'hidden',position:'relative'}}>
          <div style={{width:gridW,position:'relative',minWidth:'100%'}}>
            {/* Month row */}
            <div style={{height:HEADER_H/2,display:'flex',borderBottom:'1px solid var(--border)',background:'var(--bg)'}}>
              {months.map((m,i)=>(
                <div key={i} style={{width:m.days*DAY_W,flexShrink:0,borderRight:'1px solid var(--border)',display:'flex',alignItems:'center',padding:'0 10px',
                  fontSize:'.68rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--muted)'}}>
                  {m.label}
                </div>
              ))}
            </div>
            {/* Week sub-header */}
            <div style={{height:HEADER_H/2,background:'var(--bg)',borderBottom:'2px solid var(--border)',position:'relative'}}>
              {weekMarkers.map((mk,i)=>(
                <div key={i} style={{position:'absolute',left:mk.offset,height:'100%',display:'flex',alignItems:'center',paddingLeft:5,
                  fontSize:'.62rem',color:'var(--muted)',borderLeft:'1px solid var(--border)'}}>
                  {mk.label}
                </div>
              ))}
            </div>

            {/* Task rows */}
            {tasks.map((t,i)=>{
              const{left,width}=barGeom(t);
              const colors=GANTT_COLORS[t.status]||GANTT_COLORS['Pendente'];
              const isSelected=selectedId===t.id;
              return(
                <div key={t.id} style={{height:ROW_H,position:'relative',borderBottom:'1px solid var(--border)',background:i%2===0?'transparent':'rgba(28,25,23,.015)'}}>
                  {weekMarkers.map((mk,j)=>(
                    <div key={j} style={{position:'absolute',left:mk.offset,top:0,bottom:0,borderLeft:'1px dashed var(--border)',opacity:.6,pointerEvents:'none'}}/>
                  ))}
                  {/* Bar */}
                  <div
                    onMouseDown={e=>startDrag(e,t.id,'move')}
                    onClick={e=>{e.stopPropagation();isSelected?(setSelectedId(null),setEditDraft(null)):selectTask(t);}}
                    title={`${t.text}\n${fmtShort(t.startDate)} → ${fmtShort(t.dueDate)}`}
                    style={{
                      position:'absolute',left,width,height:28,top:(ROW_H-28)/2,
                      background:colors.bar,border:`1.5px solid ${isSelected?'var(--text)':colors.border}`,borderRadius:7,
                      cursor:'grab',display:'flex',alignItems:'center',
                      boxShadow:isSelected?'0 0 0 2px var(--text)':'0 1px 4px rgba(28,25,23,.09)',
                      userSelect:'none',transition:'box-shadow .15s,border-color .15s',
                    }}>
                    {/* Left resize */}
                    <div onMouseDown={e=>startDrag(e,t.id,'left')} style={{width:10,height:'100%',cursor:'ew-resize',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:'6px 0 0 6px',zIndex:1}}
                      title="Arrastar início"><span style={{fontSize:9,color:colors.text,opacity:.5,lineHeight:1}}>⠿</span></div>
                    <div style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:'.68rem',fontWeight:600,color:colors.text,userSelect:'none'}}>{width>60?t.text:''}</div>
                    {/* Right resize */}
                    <div onMouseDown={e=>startDrag(e,t.id,'right')} style={{width:10,height:'100%',cursor:'ew-resize',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:'0 6px 6px 0',zIndex:1}}
                      title="Arrastar prazo"><span style={{fontSize:9,color:colors.text,opacity:.5,lineHeight:1}}>⠿</span></div>
                  </div>
                </div>
              );
            })}

            {/* Today line */}
            {todayOffset>=0&&todayOffset<=gridW&&(
              <div style={{position:'absolute',left:todayOffset,top:0,bottom:0,width:2,background:'#EF4444',pointerEvents:'none',zIndex:10}}>
                <div style={{position:'absolute',top:HEADER_H-18,left:'50%',transform:'translateX(-50%)',background:'#EF4444',color:'white',
                  fontSize:'.52rem',fontWeight:800,padding:'2px 5px',borderRadius:3,whiteSpace:'nowrap',letterSpacing:'.06em'}}>HOJE</div>
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Edit drawer */}
      {editDraft&&(
        <div style={{borderTop:'2px solid var(--text)',padding:'20px 24px',background:'var(--surface)',display:'flex',gap:14,flexWrap:'wrap',alignItems:'flex-end',animation:'fadeUp .2s ease'}}>
          <div style={{flex:2,minWidth:160}}>
            <label style={{fontSize:'.62rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.09em',color:'var(--muted)',display:'block',marginBottom:5}}>Tarefa</label>
            <input value={editDraft.text} onChange={e=>setEditDraft({...editDraft,text:e.target.value})} className="input-box" style={{width:'100%'}} autoFocus
              onKeyDown={e=>e.key==='Enter'&&saveEdit()}/>
          </div>
          <div style={{minWidth:130}}>
            <label style={{fontSize:'.62rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.09em',color:'var(--muted)',display:'block',marginBottom:5}}>Início</label>
            <input type="date" value={editDraft.startDate||''} onChange={e=>setEditDraft({...editDraft,startDate:e.target.value})} className="input-box"/>
          </div>
          <div style={{minWidth:130}}>
            <label style={{fontSize:'.62rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.09em',color:'var(--muted)',display:'block',marginBottom:5}}>Prazo</label>
            <input type="date" value={editDraft.dueDate||''} onChange={e=>setEditDraft({...editDraft,dueDate:e.target.value})} className="input-box"/>
          </div>
          <div style={{minWidth:130}}>

};

// Auto-mark tasks as Atrasado if past their dueDate and not Concluído
const applyAutoLate=tasks=>{
  const today=new Date();today.setHours(0,0,0,0);
  return (tasks||[]).map(t=>{
    if(t.status==='Concluído')return t;
    if(!t.dueDate)return t;
    const due=new Date(t.dueDate);due.setHours(0,0,0,0);
    if(due<today&&t.status!=='Atrasado')return{...t,status:'Atrasado'};
    return t;
  });
};
