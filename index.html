                      <Icon name="chevron-right" size={13}/>
                    </button>
                    <Icon name="folder" size={13} style={{flexShrink:0,color:isMiniActive?'white':'var(--muted)'}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:'.82rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:isMiniActive?'white':'var(--text)'}}>{m.title}</div>
                    </div>
                    <span style={{fontSize:'.58rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.05em',padding:'1px 5px',borderRadius:3,flexShrink:0,
                      background:isMiniActive?'rgba(255,255,255,.2)':'var(--bg)',color:isMiniActive?'rgba(255,255,255,.8)':'var(--muted)'}}>{m.status==='Em Andamento'?'Ativo':m.status==='Aprovado'?'OK':m.status==='Revisão'?'Rev':m.status}</span>
                  </div>
                  {/* Expanded inner notes */}
                  {expanded&&(
                    <div style={{paddingLeft:20,display:'flex',flexDirection:'column',gap:2,marginTop:2,marginBottom:2}}>
                      {(m.innerNotes||[]).map(n=>{
                        const isNoteActive=activeInnerNoteId===n.id&&activeMiniId===m.id;
                        return(
                          <div key={n.id} onClick={()=>{setActiveMiniId(m.id);setActiveInnerNoteId(n.id);}}
                            style={{display:'flex',alignItems:'center',gap:6,padding:'6px 10px',borderRadius:6,cursor:'pointer',
                              border:`1px solid ${isNoteActive?'var(--text)':'transparent'}`,
                              background:isNoteActive?'var(--surface)':'transparent',transition:'all .15s'}}
                            onMouseEnter={e=>{if(!isNoteActive)e.currentTarget.style.background='var(--surface)';}}
                            onMouseLeave={e=>{if(!isNoteActive)e.currentTarget.style.background='transparent';}}>
                            <Icon name="file-text" size={11} style={{flexShrink:0,color:'var(--muted)'}}/>
                            <span style={{fontSize:'.78rem',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,color:isNoteActive?'var(--text)':'var(--muted)'}}>{n.title||'Sem título'}</span>
                          </div>
                        );
                      })}
                      <button onClick={e=>{e.stopPropagation();setActiveMiniId(m.id);addInnerNote();if(!expandedMiniIds.has(m.id)){const s=new Set(expandedMiniIds);s.add(m.id);setExpandedMiniIds(s);}}}
                        style={{display:'flex',alignItems:'center',gap:5,padding:'5px 10px',borderRadius:6,border:'1px dashed var(--border)',background:'transparent',cursor:'pointer',fontFamily:'Figtree,sans-serif',fontSize:'.74rem',color:'var(--muted)',transition:'all .15s',marginTop:2}}
                        onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--text)';e.currentTarget.style.color='var(--text)';}}
                        onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--muted)';}}>
                        <Icon name="plus" size={10}/> Nova nota
                      </button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          )}

          {/* Right: editor panel */}
          {(!isMobile||activeMiniId)&&(
          <div className="card" style={{flex:1,padding:isMobile?20:28,display:'flex',flexDirection:'column',minWidth:0}}>
            {isMobile&&activeMiniId&&(
              <button onClick={()=>{setActiveMiniId(null);setActiveInnerNoteId(null);}} className="btn btn-ghost" style={{alignSelf:'flex-start',marginBottom:12,padding:'8px 12px',fontSize:'.88rem'}}>
                <Icon name="arrow-left" size={16}/> Voltar aos animatics
              </button>
            )}
            {activeMini&&!activeInnerNoteId&&(
              /* Animatic editor: title, status, description, frames */
              <>
                <input ref={miniImgRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={handleMiniImgs}/>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,paddingBottom:12,borderBottom:'1px solid var(--border)'}}>
                  <input value={activeMini.title} onChange={e=>updateMini('title',e.target.value)}
                    style={{fontFamily:'Cormorant Garamond,serif',fontSize:'1.6rem',fontWeight:400,background:'transparent',border:'none',outline:'none',color:'var(--text)',flex:1,minWidth:0}}
                    placeholder="Título do animatic"/>
                  <div style={{display:'flex',gap:6,flexShrink:0,alignItems:'center'}}>
                    <select value={activeMini.status} onChange={e=>updateMini('status',e.target.value)}
                      style={{padding:'4px 10px',borderRadius:8,border:'1px solid var(--border)',fontFamily:'Figtree,sans-serif',fontSize:'.78rem',background:'var(--bg)',color:'var(--text)',outline:'none',cursor:'pointer'}}>
                      {MINI_STATUSES.map(s=><option key={s}>{s}</option>)}
                    </select>
                    <button onClick={()=>deleteMini(activeMini.id)} className="btn btn-ghost text-link-danger" style={{padding:6}}>
                      <Icon name="trash-2" size={16}/>
                    </button>
                  </div>
                </div>
                <textarea value={activeMini.notes} onChange={e=>updateMini('notes',e.target.value)}
                  placeholder="Notas, intenções, referências para este animatic..."
                  style={{resize:'none',background:'transparent',border:'none',outline:'none',fontSize:'.9rem',fontFamily:'Figtree,sans-serif',lineHeight:1.8,color:'var(--text)',minHeight:80,marginBottom:16}}/>
                {(activeMini.frames||[]).length>0&&(
                  <div style={{display:'grid',gridTemplateColumns:isMobile?'repeat(2,1fr)':'repeat(3,1fr)',gap:isMobile?8:10,marginBottom:14}}>
                    {(activeMini.frames||[]).map((img,i)=>(
                      <div key={i} style={{position:'relative',borderRadius:8,overflow:'hidden',aspectRatio:'16/9',background:'var(--bg)'}}>
                        <Img src={img} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
                        <button onClick={()=>{const f=[...(activeMini.frames||[])];f.splice(i,1);updateMini('frames',f);}} style={{position:'absolute',top:5,right:5,background:'rgba(28,25,23,.7)',border:'none',borderRadius:'50%',width:22,height:22,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'white'}}><Icon name="x" size={11}/></button>
                      </div>
                    ))}
                  </div>
                )}
                <button className="btn btn-outline" style={{alignSelf:'flex-start',padding:'6px 14px',fontSize:'.8rem'}} onClick={()=>miniImgRef.current.click()}>
                  <Icon name="image-plus" size={13}/> Adicionar frames
                </button>
              </>
            )}
            {activeMini&&activeInnerNoteId&&(()=>{
              const innerNotes=activeMini.innerNotes||[];
              const note=innerNotes.find(n=>n.id===activeInnerNoteId)||null;
              if(!note)return null;
              return(
                <>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,paddingBottom:12,borderBottom:'1px solid var(--border)'}}>
                    <input value={note.title} onChange={e=>updateInnerNote('title',e.target.value)}
                      style={{fontFamily:'Cormorant Garamond,serif',fontSize:'1.6rem',fontWeight:400,background:'transparent',border:'none',outline:'none',color:'var(--text)',flex:1,minWidth:0}}
                      placeholder="Título da nota"/>
                    <button onClick={()=>deleteInnerNote(note.id)} className="btn btn-ghost text-link-danger" style={{padding:6,flexShrink:0}}>
                      <Icon name="trash-2" size={16}/>
                    </button>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14,background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,padding:'7px 12px'}}>
                    <Icon name="link" size={13} style={{color:'var(--muted)',flexShrink:0}}/>
                    <input value={note.url||''} onChange={e=>updateInnerNote('url',e.target.value)}
                      placeholder="Link de referência (https://...)"
                      style={{flex:1,background:'transparent',border:'none',outline:'none',fontFamily:'Figtree,sans-serif',fontSize:'.83rem',color:'var(--text)'}}/>
                    {note.url&&<a href={note.url} target="_blank" rel="noreferrer" style={{flexShrink:0,color:'var(--muted)'}} className="text-link"><Icon name="external-link" size={13}/></a>}
                  </div>
                  <textarea value={note.content||''} onChange={e=>updateInnerNote('content',e.target.value)}
                    placeholder="Notas, análises, referências..."
                    style={{resize:'none',background:'transparent',border:'none',outline:'none',fontSize:'.9rem',fontFamily:'Figtree,sans-serif',lineHeight:1.8,color:'var(--text)',minHeight:120,marginBottom:16}}/>
                  {(note.images||[]).length>0&&(
                    <div style={{display:'grid',gridTemplateColumns:isMobile?'repeat(2,1fr)':'repeat(3,1fr)',gap:isMobile?8:10,marginBottom:14}}>
                      {(note.images||[]).map((img,i)=>(
                        <div key={i} style={{position:'relative',borderRadius:8,overflow:'hidden',aspectRatio:'16/9',background:'var(--bg)'}}>
                          <Img src={img} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
                          <button onClick={()=>{const imgs=[...(note.images||[])];imgs.splice(i,1);updateInnerNote('images',imgs);}} style={{position:'absolute',top:5,right:5,background:'rgba(28,25,23,.7)',border:'none',borderRadius:'50%',width:22,height:22,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'white'}}><Icon name="x" size={11}/></button>
                        </div>
                      ))}
                    </div>
                  )}
                  <label style={{alignSelf:'flex-start'}}>
                    <button className="btn btn-outline" style={{padding:'6px 14px',fontSize:'.8rem'}} onClick={()=>document.getElementById('inner-note-img-'+activeInnerNoteId)?.click()}>
                      <Icon name="image-plus" size={13}/> Adicionar imagens
                    </button>
                    <input id={'inner-note-img-'+activeInnerNoteId} type="file" accept="image/*" multiple style={{display:'none'}} onChange={async e=>{
                      const files=Array.from(e.target.files);
                      const urls=await Promise.all(files.map(uploadImage));
                      updateInnerNote('images',[...(note.images||[]),...urls]);
                      e.target.value='';
                    }}/>
                  </label>
                </>
              );
            })()}
            {!activeMini&&!isMobile&&(
              <div style={{margin:'auto',textAlign:'center',color:'var(--muted)'}}>
                <Icon name="folder" size={28} style={{display:'block',margin:'0 auto 10px',opacity:.3}}/>
                <p style={{fontSize:'.85rem'}}>Selecione ou crie um animatic</p>
              </div>
            )}
          </div>
          )}
        </div>
      )}

      {tab==='Pesquisa'&&(
        <div style={{display:'flex',gap:16,minHeight:isMobile?0:480,flexDirection:isMobile?'column':'row'}}>
          {(!isMobile||(isMobile&&!activeResearchId))&&(
          <div style={{width:isMobile?'100%':200,flexShrink:0,display:'flex',flexDirection:'column',gap:8}}>
            <button className="btn btn-dark" style={{width:'100%',justifyContent:'center',marginBottom:4}} onClick={addResearchNote}><Icon name="plus" size={13}/> Nova Pesquisa</button>
            {(local.researchNotes||[]).length===0&&<div style={{fontSize:'.8rem',color:'var(--muted)',padding:'8px 4px',textAlign:'center'}}>Nenhuma pesquisa.</div>}
            {(local.researchNotes||[]).map(n=>(
              <div key={n.id} onClick={()=>setActiveResearchId(n.id)}
                style={{padding:'9px 12px',borderRadius:8,cursor:'pointer',border:`1px solid ${activeResearchId===n.id?'var(--text)':'transparent'}`,background:activeResearchId===n.id?'var(--surface)':'transparent',transition:'all .15s'}}
                onMouseEnter={e=>{if(activeResearchId!==n.id)e.currentTarget.style.background='var(--surface)';}}
                onMouseLeave={e=>{if(activeResearchId!==n.id)e.currentTarget.style.background='transparent';}}>
                <div style={{fontWeight:600,fontSize:'.82rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{n.title||'Sem título'}</div>
                <div style={{fontSize:'.7rem',color:'var(--muted)',marginTop:2}}>{n.date}</div>
              </div>
            ))}
          </div>
          )}
          {(!isMobile||activeResearchId)&&(
          <div className="card" style={{flex:1,padding:isMobile?20:28,display:'flex',flexDirection:'column',minWidth:0}}>
            {isMobile&&activeResearchId&&(
              <button onClick={()=>setActiveResearchId(null)} className="btn btn-ghost" style={{alignSelf:'flex-start',marginBottom:12,padding:'4px 8px',fontSize:'.78rem'}}>
                <Icon name="arrow-left" size={13}/> Voltar às pesquisas
              </button>
            )}
            {activeResearch?(
              <>
                <input ref={researchImgRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={e=>handleResearchImgUpload(activeResearchId,e)}/>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,paddingBottom:12,borderBottom:'1px solid var(--border)'}}>
                  <input value={activeResearch.title} onChange={e=>updateResearch('title',e.target.value)}
                    style={{fontFamily:'Cormorant Garamond,serif',fontSize:'1.6rem',fontWeight:400,background:'transparent',border:'none',outline:'none',color:'var(--text)',flex:1,minWidth:0}}
                    placeholder="Título da pesquisa"/>
                  <button onClick={()=>deleteResearch(activeResearch.id)} className="btn btn-ghost text-link-danger" style={{padding:6,flexShrink:0}}>
                    <Icon name="trash-2" size={16}/>
                  </button>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14,background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,padding:'7px 12px'}}>
                  <Icon name="link" size={13} style={{color:'var(--muted)',flexShrink:0}}/>
                  <input value={activeResearch.url||''} onChange={e=>updateResearch('url',e.target.value)}
                    placeholder="Link de referência (https://...)"
                    style={{flex:1,background:'transparent',border:'none',outline:'none',fontFamily:'Figtree,sans-serif',fontSize:'.83rem',color:'var(--text)'}}/>
                  {activeResearch.url&&<a href={activeResearch.url} target="_blank" rel="noreferrer" style={{flexShrink:0,color:'var(--muted)'}} className="text-link"><Icon name="external-link" size={13}/></a>}
                </div>
                <textarea value={activeResearch.content} onChange={e=>updateResearch('content',e.target.value)}
                  placeholder="Notas, análises, referências..."
                  style={{resize:'none',background:'transparent',border:'none',outline:'none',fontSize:'.9rem',fontFamily:'Figtree,sans-serif',lineHeight:1.8,color:'var(--text)',minHeight:120,marginBottom:16}}/>
                {/* Images — 3 column grid */}
                {(activeResearch.images||[]).length>0&&(
                  <div style={{display:'grid',gridTemplateColumns:isMobile?'repeat(2,1fr)':'repeat(3,1fr)',gap:isMobile?8:10,marginBottom:14}}>
                    {(activeResearch.images||[]).map((img,i)=>(
                      <div key={i} style={{position:'relative',borderRadius:8,overflow:'hidden',aspectRatio:'16/9',background:'var(--bg)'}}>
                        <Img src={img} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
                        <button onClick={()=>removeResearchImg(activeResearch.id,i)} style={{position:'absolute',top:5,right:5,background:'rgba(28,25,23,.7)',border:'none',borderRadius:'50%',width:22,height:22,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'white'}}><Icon name="x" size={11}/></button>
                      </div>
                    ))}
                  </div>
                )}
                <button className="btn btn-outline" style={{alignSelf:'flex-start',padding:'6px 14px',fontSize:'.8rem'}} onClick={()=>researchImgRef.current.click()}>
                  <Icon name="image-plus" size={13}/> Adicionar imagens
                </button>
              </>
            ):(
              !isMobile&&<div style={{margin:'auto',textAlign:'center',color:'var(--muted)'}}>
                <Icon name="book-open" size={28} style={{display:'block',margin:'0 auto 10px',opacity:.3}}/>
                <p style={{fontSize:'.85rem'}}>Selecione ou crie uma pesquisa</p>
              </div>
            )}
          </div>
          )}
        </div>
      )}
    </div>
  );
};

// ─── GALLERY ─────────────────────────────────────────────────────────────────
const Gallery=({posts,setPosts,isMobile})=>{
  const FOLDERS=[
    {id:'work',        label:'Work'},
    {id:'movie-studies',label:'Movie Studies'},
    {id:'sketchbooks', label:'Sketchbook'},
    {id:'gestures',    label:'Gesture'},
  ];
  const [activeFolder,setActiveFolder]=useState('work');
  const [selected,setSelected]=useState(null);
  const [lightbox,setLightbox]=useState(null);
  const [trash,setTrash]=useState(false);
  const [uploading,setUploading]=useState(false);
  const addImgRef=useRef();
  const active=posts.filter(p=>trash?p.deleted:(!p.deleted&&p.folder===activeFolder));
  const grouped=active.reduce((acc,p)=>{const key=new Date(p.date).toLocaleString('pt-BR',{month:'long',year:'numeric'});if(!acc[key])acc[key]=[];acc[key].push(p);return acc;},{});
  const upd=(field,value)=>{
    const updated={...selected,[field]:value};
    setSelected(updated);
    setPosts(prev=>prev.map(p=>p.id===updated.id?updated:p));
  };
  const handleAddImages=async e=>{
    const files=Array.from(e.target.files);
    setUploading(true);
    const urls=await Promise.all(files.map(uploadImage));
    setUploading(false);
    const merged=[...(selected.images||[]),...urls];
    upd('images',merged);
    e.target.value='';
  };
  const removeImg=idx=>{const imgs=[...selected.images];imgs.splice(idx,1);upd('images',imgs);};
  const softDelete=id=>setPosts(p=>p.map(x=>x.id===id?{...x,deleted:true}:x));
  const restore=id=>setPosts(p=>p.map(x=>x.id===id?{...x,deleted:false}:x));
  const hardDelete=id=>{if(window.confirm('Excluir permanentemente?')){setPosts(p=>p.filter(x=>x.id!==id));}};

  if(lightbox)return(
    <div className="lightbox" onClick={()=>setLightbox(null)}>
      <Img src={lightbox} onClick={e=>e.stopPropagation()} alt="" style={{maxWidth:'90vw',maxHeight:'90vh',objectFit:'contain',borderRadius:8}}/>
      <button onClick={()=>setLightbox(null)} style={{position:'fixed',top:20,right:20,background:'rgba(255,255,255,.12)',border:'none',borderRadius:'50%',width:40,height:40,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'white',backdropFilter:'blur(4px)'}}><Icon name="x" size={20}/></button>
    </div>
  );

  if(selected)return(
    <div className="fade-up" style={{maxWidth:960,margin:'0 auto'}}>
      <input ref={addImgRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={handleAddImages}/>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:24}}>
        <button className="btn btn-outline" onClick={()=>setSelected(null)}><Icon name="arrow-left" size={13}/> Voltar</button>
        <button className="btn btn-danger" onClick={()=>{softDelete(selected.id);setSelected(null);}}><Icon name="trash-2" size={13}/> Mover para Lixeira</button>
      </div>
      <div className="card" style={{padding:32}}>
        <input value={selected.title} onChange={e=>upd('title',e.target.value)}
          style={{fontSize:'2rem',fontWeight:400,background:'transparent',outline:'none',border:'none',borderBottom:'1px solid var(--border)',width:'100%',marginBottom:16,paddingBottom:8,color:'var(--text)',fontFamily:'Cormorant Garamond,serif'}}/>
        {/* Folder selector */}
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:20}}>
          <span className="label" style={{flexShrink:0}}>Pasta</span>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {FOLDERS.map(f=>(
              <button key={f.id} onClick={()=>upd('folder',f.id)}
                style={{padding:'3px 12px',borderRadius:20,border:`1px solid ${selected.folder===f.id?'var(--text)':'var(--border)'}`,background:selected.folder===f.id?'var(--text)':'transparent',color:selected.folder===f.id?'white':'var(--muted)',fontSize:'.75rem',fontWeight:600,cursor:'pointer',fontFamily:'Figtree,sans-serif',transition:'all .15s'}}>
                {f.label}
              </button>
            ))}
          </div>
        </div>
        <textarea value={selected.content} onChange={e=>upd('content',e.target.value)} placeholder="Análise, insights, observações..."
          style={{width:'100%',border:'1px solid var(--border)',borderRadius:10,padding:'16px 20px',fontSize:'.92rem',outline:'none',resize:'vertical',minHeight:160,fontFamily:'Figtree,sans-serif',lineHeight:1.8,color:'var(--text)',backgroundColor:'var(--bg)',marginBottom:24}}/>
        <div style={{display:'grid',gridTemplateColumns:isMobile?'repeat(2,1fr)':'repeat(3,1fr)',gap:isMobile?10:14}}>
          {selected.images.map((img,i)=>(
            <div key={i} style={{position:'relative',borderRadius:10,overflow:'hidden',aspectRatio:'16/9',background:'var(--bg)',cursor:'zoom-in'}} onClick={()=>setLightbox(img)}>
              <Img src={img} style={{width:'100%',height:'100%',objectFit:'cover',display:'block',transition:'transform .3s'}} onMouseEnter={e=>e.target.style.transform='scale(1.03)'} onMouseLeave={e=>e.target.style.transform='scale(1)'}/>
              <button onClick={e=>{e.stopPropagation();removeImg(i);}} style={{position:'absolute',top:6,right:6,background:'rgba(28,25,23,.7)',border:'none',borderRadius:'50%',width:24,height:24,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'white'}}><Icon name="x" size={11}/></button>
            </div>
          ))}
          <div className="upload-zone" style={{aspectRatio:'16/9',minHeight:0,opacity:uploading?.6:1,pointerEvents:uploading?'none':'auto'}} onClick={()=>addImgRef.current.click()}>
            <Icon name={uploading?'loader':'plus'} size={20} style={{marginBottom:6}}/><span style={{fontSize:'.75rem'}}>{uploading?'Enviando…':'Adicionar'}</span>
          </div>
        </div>
      </div>
    </div>
  );

  return(
    <div className="fade-up" style={{maxWidth:900,margin:'0 auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:isMobile?'center':'flex-end',marginBottom:isMobile?16:24,gap:12,flexWrap:'wrap'}}>
        <div><h1 className="serif" style={{fontSize:isMobile?'1.75rem':'2.6rem',fontWeight:300,letterSpacing:'-0.02em',marginBottom:4}}>Galeria</h1>
          {!isMobile&&<p style={{color:'var(--muted)',fontSize:'.85rem'}}>Acervo visual & estudos</p>}</div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>{setTrash(!trash);setSelected(null);}} className={`btn ${trash?'btn-danger':'btn-outline'}`}>
            <Icon name="trash-2" size={13}/>{trash?'Sair':'Lixeira'}{!trash&&posts.filter(p=>p.deleted).length>0&&` (${posts.filter(p=>p.deleted).length})`}
          </button>
          {!trash&&<button className="btn btn-dark" onClick={()=>{const n={id:Date.now(),folder:activeFolder,title:"Novo Estudo",date:new Date().toISOString().slice(0,10),content:"",images:[],deleted:false};setPosts([n,...posts]);setSelected(n);}}><Icon name="plus" size={14}/> Criar</button>}
        </div>
      </div>
      {trash&&<TrashBanner label="Galeria" onExit={()=>setTrash(false)}/>}
      {!trash&&(
        <div style={isMobile?{display:'flex',background:'var(--bg)',borderRadius:10,padding:3,gap:2,marginBottom:16}:{display:'flex',borderBottom:'1px solid var(--border)',marginBottom:24}}>
          {FOLDERS.map(f=><button key={f.id} onClick={()=>setActiveFolder(f.id)} className="tab-btn" style={{color:activeFolder===f.id?'var(--text)':'var(--muted)',borderBottom:activeFolder===f.id?'2px solid var(--text)':'2px solid transparent',whiteSpace:'nowrap'}}>{f.label}</button>)}
        </div>
      )}
      {Object.keys(grouped).length===0&&<div style={{textAlign:'center',padding:isMobile?40:60,color:'var(--muted)',fontSize:'.9rem'}}><Icon name="image" size={28} style={{display:'block',margin:'0 auto 12px',opacity:.3}}/>{trash?'Lixeira vazia.':'Pasta vazia.'}</div>}
      {Object.entries(grouped).map(([month,monthPosts])=>(
        <div key={month} style={{marginBottom:isMobile?24:36}}>
          <div style={{borderBottom:'1px solid var(--border)',paddingBottom:8,marginBottom:16}}><span className="label">{month}</span></div>
          <div style={{display:'grid',gridTemplateColumns:isMobile?'repeat(2,1fr)':'repeat(auto-fill,minmax(180px,1fr))',gap:isMobile?10:14}}>
            {monthPosts.map(post=>(
              <div key={post.id} className="card" style={{overflow:'hidden',cursor:trash?'default':'pointer'}} onClick={()=>!trash&&setSelected(post)}>
                <div style={{aspectRatio:'4/5',overflow:'hidden',backgroundColor:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  {post.images.length>0
                    ?<Img src={post.images[0]} style={{width:'100%',height:'100%',objectFit:'cover',display:'block',transition:'transform .4s'}} onMouseEnter={e=>!trash&&(e.target.style.transform='scale(1.06)')} onMouseLeave={e=>e.target.style.transform='scale(1)'}/>
                    :<Icon name="image" size={28} style={{opacity:.2}}/>}
                </div>
                <div style={{padding:'12px 14px'}}>
                  <div style={{fontWeight:600,fontSize:'.82rem',marginBottom:2}}>{post.title}</div>
                  <div style={{fontSize:'.72rem',color:'var(--muted)',marginBottom:trash?8:0}}>{post.date}</div>
                  {trash&&(
                    <div style={{display:'flex',gap:5}}>
                      <button onClick={e=>{e.stopPropagation();restore(post.id);}} className="btn btn-outline" style={{flex:1,justifyContent:'center',padding:'4px 0',fontSize:'.72rem'}}><Icon name="undo-2" size={10}/> Restaurar</button>
                      <button onClick={e=>{e.stopPropagation();hardDelete(post.id);}} className="btn btn-danger" style={{flex:1,justifyContent:'center',padding:'4px 0',fontSize:'.72rem'}}><Icon name="trash-2" size={10}/> Excluir</button>
                    </div>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
};

// ─── IDEAS ────────────────────────────────────────────────────────────────────
const IdeasLab=({notes,setNotes,tasks,setTasks,isMobile})=>{
  const [folder,setFolder]=useState('notes');
  const [activeId,setActiveId]=useState(()=>notes.find(n=>!n.deleted)?.id||null);
  const [newTask,setNewTask]=useState('');
  const visible=useMemo(()=>notes.filter(n=>folder==='notes'?!n.deleted:n.deleted),[notes,folder]);
  // Guard: only treat a note as active if it actually lives in the current folder
  const active=useMemo(()=>notes.find(n=>n.id===activeId&&(folder==='notes'?!n.deleted:n.deleted))||null,[notes,activeId,folder]);
  const newNote=()=>{const n={id:Date.now(),title:"Nova Nota",content:"",date:"Agora",deleted:false};setNotes(p=>[n,...p]);setActiveId(n.id);};
  const update=(field,value)=>setNotes(p=>p.map(n=>n.id===activeId?{...n,[field]:value}:n));
  const toggleTrash=id=>{setNotes(p=>p.map(n=>n.id===id?{...n,deleted:!n.deleted}:n));const next=notes.find(n=>n.id!==id&&(folder==='notes'?!n.deleted:n.deleted));setActiveId(next?.id||null);};
  const hardDelete=id=>{if(window.confirm('Excluir nota permanentemente?')){setNotes(p=>p.filter(n=>n.id!==id));const next=notes.find(n=>n.id!==id&&(folder==='notes'?!n.deleted:n.deleted));setActiveId(next?.id||null);}};
  const noteToTask=()=>{if(!active)return;setTasks(p=>[...p,{id:Date.now(),text:active.title,done:false,noteId:active.id}]);};
  const isAlreadyTask=active&&tasks.some(t=>t.noteId===active.id);
  const addTask=()=>{if(!newTask.trim())return;setTasks(p=>[...p,{id:Date.now(),text:newTask.trim(),done:false,noteId:null}]);setNewTask('');};
  const toggleTask=id=>setTasks(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t));
  const removeTask=id=>setTasks(p=>p.filter(t=>t.id!==id));
  return(
    <div className="fade-up" style={{maxWidth:1100,margin:'0 auto',height:isMobile?'auto':'calc(100vh - 80px)',display:'flex',gap:isMobile?0:20,flexDirection:isMobile?'column':'row'}}>
      {/* Left */}
      {(!isMobile||(isMobile&&!activeId))&&(
      <div style={{width:isMobile?'100%':200,flexShrink:0,display:'flex',flexDirection:'column',gap:14}}>
        <h1 className="serif" style={{fontSize:isMobile?'1.6rem':'2rem',fontWeight:300}}>Ideias</h1>
        <div style={{display:'flex',flexDirection:isMobile?'row':'column',gap:4}}>
          {[['notes','Notas'],['trash','Lixeira']].map(([v,l])=>(
            <button key={v} onClick={()=>{setFolder(v);const first=notes.find(n=>v==='notes'?!n.deleted:n.deleted);setActiveId(first?.id||null);}} style={{textAlign:'left',padding:'8px 12px',borderRadius:7,border:'none',fontFamily:'Figtree,sans-serif',fontSize:'.83rem',fontWeight:500,cursor:'pointer',background:folder===v?(v==='trash'?'#FEE2E2':'var(--text)'):'transparent',color:folder===v?(v==='trash'?'#991B1B':'white'):'var(--muted)',transition:'all .15s'}}>
              {l} <span style={{opacity:.6,fontSize:'.75rem'}}>({notes.filter(n=>v==='notes'?!n.deleted:n.deleted).length})</span>
            </button>
          ))}
        </div>
        <div style={{flex:isMobile?undefined:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:4}}>
          {visible.length===0&&<div style={{fontSize:'.8rem',color:'var(--muted)',padding:'8px 4px'}}>Nenhuma nota aqui.</div>}
          {visible.map(n=>(
            <div key={n.id} onClick={()=>setActiveId(n.id)}
              style={{padding:isMobile?'14px 14px':'10px 12px',borderRadius:8,cursor:'pointer',border:`1px solid ${activeId===n.id?'var(--text)':'transparent'}`,background:activeId===n.id?'var(--surface)':'transparent',transition:'all .15s',minHeight:isMobile?48:undefined}}
              onMouseEnter={e=>{if(activeId!==n.id)e.currentTarget.style.background='var(--surface)';}}
              onMouseLeave={e=>{if(activeId!==n.id)e.currentTarget.style.background='transparent';}}>
              <div style={{fontWeight:600,fontSize:'.82rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{n.title}</div>
              <div style={{fontSize:'.7rem',color:'var(--muted)',marginTop:2}}>{n.date}</div>
            </div>
          ))}
        </div>
        {folder==='notes'&&<button className="btn btn-dark" style={{width:'100%',justifyContent:'center'}} onClick={newNote}><Icon name="plus" size={14}/> Nova Nota</button>}
      </div>
      )}
      {/* Center */}
      {(!isMobile||activeId)&&(
      <div className="card" style={{flex:1,padding:isMobile?20:32,display:'flex',flexDirection:'column',minWidth:0,marginTop:isMobile?12:0}}>
        {isMobile&&activeId&&(
          <button onClick={()=>setActiveId(null)} className="btn btn-ghost" style={{alignSelf:'flex-start',marginBottom:12,padding:'8px 12px',fontSize:'.88rem'}}>
            <Icon name="arrow-left" size={16}/> Voltar às notas
          </button>
        )}
        {active?(
          <>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,borderBottom:'1px solid var(--border)',paddingBottom:12}}>
              <input value={active.title} onChange={e=>update('title',e.target.value)} disabled={folder==='trash'}
                style={{fontFamily:'Cormorant Garamond,serif',fontSize:'1.8rem',fontWeight:400,background:'transparent',border:'none',outline:'none',color:'var(--text)',flex:1,minWidth:0}}/>
              <div style={{display:'flex',gap:4,flexShrink:0}}>
                {folder==='notes'&&<button onClick={noteToTask} disabled={isAlreadyTask} title={isAlreadyTask?"Já na lista":"Adicionar à lista"} className="btn btn-ghost" style={{padding:6,opacity:isAlreadyTask?.4:1}}><Icon name="check-square" size={16}/></button>}
                <button onClick={()=>toggleTrash(active.id)} className="btn btn-ghost" style={{padding:6}}
                  onMouseEnter={e=>e.currentTarget.style.color=folder==='notes'?'#DC2626':'#276b3e'} onMouseLeave={e=>e.currentTarget.style.color='var(--muted)'}>
                  <Icon name={folder==='notes'?'trash-2':'undo-2'} size={17}/>
                </button>
                {folder==='trash'&&<button onClick={()=>hardDelete(active.id)} className="btn btn-ghost text-link-danger" style={{padding:6}} title="Excluir permanentemente"><Icon name="trash" size={17}/></button>}
              </div>
            </div>
            <textarea value={active.content} onChange={e=>update('content',e.target.value)} disabled={folder==='trash'} placeholder="Comece a escrever..."
              style={{flex:1,resize:'none',background:'transparent',border:'none',outline:'none',fontSize:'.95rem',fontFamily:'Figtree,sans-serif',lineHeight:1.9,color:'var(--text)',opacity:folder==='trash'?.5:1}}/>
          </>
        ):(
          !isMobile&&<div style={{margin:'auto',textAlign:'center',color:'var(--muted)'}}>
            <Icon name="file-text" size={28} style={{display:'block',margin:'0 auto 10px'}}/>
            <p style={{fontSize:'.85rem'}}>Selecione ou crie uma nota</p>
          </div>
        )}
      </div>
      )}
      {/* Right tasks — below on mobile, sidebar on desktop */}
      {(!isMobile||!activeId)&&(
      <div style={{width:isMobile?'100%':260,flexShrink:0,marginTop:isMobile?16:0}}>
        <div className="card" style={{height:isMobile?'auto':'100%',padding:20,display:'flex',flexDirection:'column'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,paddingBottom:12,borderBottom:'1px solid var(--border)'}}>
            <span className="label">Atividades</span>
            <span style={{fontSize:'.72rem',color:'var(--muted)'}}>{tasks.filter(t=>!t.done).length} pendentes</span>
          </div>
          <div style={{display:'flex',gap:6,marginBottom:12}}>
            <input value={newTask} onChange={e=>setNewTask(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addTask()}
              placeholder="Nova atividade..." style={{flex:1,background:'transparent',border:'none',outline:'none',borderBottom:'1px solid var(--border)',fontFamily:'Figtree,sans-serif',fontSize:'.82rem',color:'var(--text)',paddingBottom:3}}/>
            <button onClick={addTask} className="btn btn-dark" style={{padding:'3px 8px'}}><Icon name="plus" size={12}/></button>
          </div>
          <div style={{flex:isMobile?undefined:1,overflowY:'auto'}}>
            {tasks.length===0&&<p style={{fontSize:'.8rem',color:'var(--muted)',textAlign:'center',marginTop:16}}>Nenhuma atividade.</p>}
            {tasks.map(t=>(
              <div key={t.id} className="task-row" style={{padding:'7px 0'}}>
                <div className={`task-check ${t.done?'done':''}`} onClick={()=>toggleTask(t.id)}/>
                <span style={{flex:1,fontSize:'.82rem',textDecoration:t.done?'line-through':'none',color:t.done?'var(--muted)':'var(--text)',lineHeight:1.4,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.text}</span>
                <button onClick={()=>removeTask(t.id)} className="btn btn-ghost" style={{padding:2,flexShrink:0}}><Icon name="x" size={12}/></button>
              </div>
            ))}
          </div>
        </div>
      </div>
      )}
    </div>
  );
};

// ─── SOCIAL ───────────────────────────────────────────────────────────────────
const SOCIAL_PLATFORMS=['Instagram','LinkedIn','Twitter/X','TikTok','YouTube','Behance'];

const Social=({posts,setPosts,isMobile})=>{
  const [text,setText]=useState('');
  const [platform,setPlatform]=useState('Instagram');
  const [editId,setEditId]=useState(null);
  const [trash,setTrash]=useState(false);
  const [templates,setTemplates]=useState(()=>{
    try{const s=localStorage.getItem('boardhub_social_templates');return s?JSON.parse(s):socialTemplates;}catch{return socialTemplates;}
  });
  const [editingTpl,setEditingTpl]=useState(null); // {index,label,text} or {index:-1,...} for new
  const saveTemplates=t=>{setTemplates(t);try{localStorage.setItem('boardhub_social_templates',JSON.stringify(t));}catch{}};

  const activePosts=posts.filter(p=>!p.deleted);
  const trashedPosts=posts.filter(p=>p.deleted);

  const savePost=()=>{
    if(!text.trim())return;
    if(editId){setPosts(p=>p.map(x=>x.id===editId?{...x,text,platform}:x));setEditId(null);}
    else setPosts(p=>[{id:Date.now(),text,date:new Date().toLocaleDateString('pt-BR'),platform,deleted:false},...p]);
    setText('');setPlatform('Instagram');
  };
  const startEdit=p=>{setText(p.text);setPlatform(p.platform||'Instagram');setEditId(p.id);setTrash(false);};
  const cancelEdit=()=>{setText('');setEditId(null);setPlatform('Instagram');};
  const softDelete=id=>setPosts(p=>p.map(x=>x.id===id?{...x,deleted:true}:x));
  const restore=id=>setPosts(p=>p.map(x=>x.id===id?{...x,deleted:false}:x));
  const hardDelete=id=>{if(window.confirm('Excluir permanentemente?')){setPosts(p=>p.filter(x=>x.id!==id));}};
  const changePostPlatform=(id,pl)=>setPosts(p=>p.map(x=>x.id===id?{...x,platform:pl}:x));
  const displayed=trash?trashedPosts:activePosts;

  // Template modal
  const openNewTpl=()=>setEditingTpl({index:-1,label:'',text:''});
  const openEditTpl=(i)=>setEditingTpl({index:i,...templates[i]});
  const saveTpl=()=>{
    if(!editingTpl.label.trim())return;
    const next=[...templates];
    if(editingTpl.index===-1)next.push({label:editingTpl.label,text:editingTpl.text});
    else next[editingTpl.index]={label:editingTpl.label,text:editingTpl.text};
    saveTemplates(next);setEditingTpl(null);
  };
  const deleteTpl=i=>{const next=templates.filter((_,idx)=>idx!==i);saveTemplates(next);};

  const platformColor=pl=>({Instagram:'#833AB4',LinkedIn:'#0A66C2','Twitter/X':'#000000',TikTok:'#010101',YouTube:'#FF0000',Behance:'#053EFF'}[pl]||'var(--text)');

  return(
    <div className="fade-up" style={{maxWidth:900,margin:'0 auto',width:'100%',boxSizing:'border-box'}}>
      {/* Template edit modal */}
      {editingTpl&&(
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setEditingTpl(null)}>
          <div className="modal" style={{maxWidth:480}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <h2 className="serif" style={{fontSize:'1.5rem',fontWeight:400,margin:0}}>{editingTpl.index===-1?'Novo Template':'Editar Template'}</h2>
              <button className="btn btn-ghost" onClick={()=>setEditingTpl(null)} style={{padding:6}}><Icon name="x" size={18}/></button>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <Field label="Nome do template">
                <input className="input-box" value={editingTpl.label} onChange={e=>setEditingTpl(t=>({...t,label:e.target.value}))} placeholder="Ex: Bastidores"/>
              </Field>
              <Field label="Texto">
                <textarea className="input-box" rows={6} value={editingTpl.text} onChange={e=>setEditingTpl(t=>({...t,text:e.target.value}))} placeholder="Escreva o template..." style={{resize:'vertical',lineHeight:1.7}}/>
              </Field>
              <div style={{display:'flex',justifyContent:'flex-end',gap:8}}>
                <button className="btn btn-outline" onClick={()=>setEditingTpl(null)}>Cancelar</button>
                <button className="btn btn-dark" onClick={saveTpl} disabled={!editingTpl.label.trim()}><Icon name="check" size={14}/> Salvar</button>
              </div>
            </div>
          </div>
        </div>
      )}

      <div style={{display:'flex',justifyContent:'space-between',alignItems:isMobile?'center':'flex-end',marginBottom:isMobile?16:24,gap:12,flexWrap:'wrap'}}>
        <h1 className="serif" style={{fontSize:isMobile?'1.75rem':'2.6rem',fontWeight:300,letterSpacing:'-0.02em'}}>Social Media</h1>
        <button onClick={()=>{setTrash(!trash);cancelEdit();}} className={`btn ${trash?'btn-danger':'btn-outline'}`}>
          <Icon name="trash-2" size={13}/>{trash?'Sair':'Lixeira'}{!trash&&trashedPosts.length>0&&` (${trashedPosts.length})`}
        </button>
      </div>
      {trash&&<TrashBanner label="Social Media" onExit={()=>setTrash(false)}/>}
      {!trash&&(
        <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'1fr 260px',gap:isMobile?16:20,marginBottom:isMobile?24:32}}>
          {/* Composer */}
          <div className="card" style={{padding:24,display:'flex',flexDirection:'column'}}>
            {editId&&<div style={{fontSize:'.75rem',color:'#92700b',marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
              <Icon name="pencil" size={11}/> Editando post — <button onClick={cancelEdit} style={{background:'none',border:'none',cursor:'pointer',color:'#DC2626',fontFamily:'Figtree,sans-serif',fontSize:'.75rem',padding:0}}>cancelar</button>
            </div>}
            <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="Escreva seu post..." style={{flex:1,minHeight:180,resize:'none',background:'transparent',border:'none',outline:'none',fontSize:'.95rem',fontFamily:'Figtree,sans-serif',lineHeight:1.8,color:'var(--text)'}}/>
            <div style={{borderTop:'1px solid var(--border)',paddingTop:12,marginTop:8,display:'flex',flexDirection:'column',gap:10}}>
              {/* Platform selector */}
              <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap',paddingBottom:0}}>
                <span className="label" style={{flexShrink:0}}>Plataforma</span>
                {SOCIAL_PLATFORMS.map(pl=>(
                  <button key={pl} onClick={()=>setPlatform(pl)}
                    style={{padding:'5px 12px',borderRadius:20,border:`1px solid ${platform===pl?platformColor(pl):'var(--border)'}`,background:platform===pl?platformColor(pl):'transparent',color:platform===pl?'white':'var(--muted)',fontSize:'.74rem',fontWeight:600,cursor:'pointer',fontFamily:'Figtree,sans-serif',transition:'all .15s'}}>
                    {pl}
                  </button>
                ))}
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:'.75rem',color:'var(--muted)'}}>{text.length} caracteres</span>
                <button className="btn btn-dark" onClick={savePost} disabled={!text.trim()} style={{opacity:text.trim()?1:.5}}><Icon name={editId?'check':'save'} size={13}/> {editId?'Atualizar':'Salvar Post'}</button>
              </div>
            </div>
          </div>
          {/* Templates */}
          <div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
              <span className="label">Templates</span>
              <button className="btn btn-ghost" style={{padding:'3px 8px',fontSize:'.72rem',gap:4}} onClick={openNewTpl}><Icon name="plus" size={12}/> Novo</button>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {templates.map((t,i)=>(
                <div key={i} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 14px',transition:'border-color .15s',position:'relative'}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor='var(--border-2)'} onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
                    <button onClick={()=>setText(t.text)} style={{fontWeight:600,fontSize:'.82rem',background:'none',border:'none',cursor:'pointer',fontFamily:'Figtree,sans-serif',color:'var(--text)',padding:0,textAlign:'left'}}>{t.label}</button>
                    <div style={{display:'flex',gap:2,flexShrink:0}}>
                      <button className="btn btn-ghost" style={{padding:'2px 5px'}} onClick={()=>openEditTpl(i)} title="Editar"><Icon name="pencil" size={12}/></button>
                      <button className="btn btn-ghost text-link-danger" style={{padding:'2px 5px'}} onClick={()=>deleteTpl(i)} title="Excluir"><Icon name="x" size={12}/></button>
                    </div>
                  </div>
                  <div style={{fontSize:'.73rem',color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',cursor:'pointer'}} onClick={()=>setText(t.text)}>{t.text}</div>
                </div>
              ))}
              {templates.length===0&&<div style={{fontSize:'.8rem',color:'var(--muted)',textAlign:'center',padding:'20px 0'}}>Nenhum template ainda.</div>}
            </div>
          </div>
        </div>
      )}
      {displayed.length>0&&(
        <div>
          <span className="label" style={{display:'block',marginBottom:16}}>{trash?'Posts na Lixeira':'Posts Salvos'}</span>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {displayed.map(p=>(
              <div key={p.id} className="card" style={{padding:isMobile?'14px 16px':'18px 22px',display:'flex',gap:isMobile?10:16,alignItems:'flex-start',flexDirection:isMobile?'column':'row'}}>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{margin:0,fontSize:'.88rem',lineHeight:1.7,color:'var(--text)',whiteSpace:'pre-wrap',wordBreak:'break-word'}}>{p.text}</p>
                  <div style={{marginTop:10,display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                    {/* Platform badge — clickable when not in trash */}
                    {!trash?(
                      <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                        {SOCIAL_PLATFORMS.map(pl=>(
                          <button key={pl} onClick={()=>changePostPlatform(p.id,pl)}
                            style={{padding:'3px 9px',borderRadius:20,border:`1px solid ${(p.platform||'Instagram')===pl?platformColor(pl):'var(--border)'}`,background:(p.platform||'Instagram')===pl?platformColor(pl):'transparent',color:(p.platform||'Instagram')===pl?'white':'var(--muted)',fontSize:'.68rem',fontWeight:600,cursor:'pointer',fontFamily:'Figtree,sans-serif',transition:'all .12s'}}>
                            {pl}
                          </button>
                        ))}
                      </div>
                    ):(
                      <span style={{fontSize:'.75rem',fontWeight:600,padding:'2px 9px',borderRadius:20,background:'var(--bg)',color:'var(--muted)',border:'1px solid var(--border)'}}>{p.platform||'Instagram'}</span>
                    )}
                    <span style={{fontSize:'.72rem',color:'var(--muted)'}}>{p.date}</span>
                  </div>
                </div>
                <div style={{display:'flex',gap:4,flexShrink:0}}>
                  {!trash?(
                    <><button className="btn btn-ghost" style={{padding:5}} onClick={()=>startEdit(p)}><Icon name="pencil" size={14}/></button>
                    <button className="btn btn-ghost" style={{padding:5}} onClick={()=>softDelete(p.id)}><Icon name="trash-2" size={14}/></button></>
                  ):(
                    <><button className="btn btn-outline" style={{padding:'4px 10px',fontSize:'.78rem'}} onClick={()=>restore(p.id)}><Icon name="undo-2" size={12}/> Restaurar</button>
                    <button className="btn btn-danger" style={{padding:'4px 10px',fontSize:'.78rem'}} onClick={()=>hardDelete(p.id)}><Icon name="trash-2" size={12}/> Excluir</button></>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
      {trash&&trashedPosts.length===0&&<div style={{textAlign:'center',padding:40,color:'var(--muted)',fontSize:'.85rem'}}>Lixeira vazia.</div>}
    </div>
  );
};

// ─── CLIENT DETAIL ────────────────────────────────────────────────────────────
